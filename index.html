    selRow("Signal", [{value:"analog",label:"Analog"},{value:"digital",label:"Digital"}], ()=>n.mode||"analog", v=>{ n.mode=v; refreshProp(); });
    if(n.mode==="digital"){
      numRow("Threshold %", ()=>Math.round((n.threshold||0.3)*100), v=>{ n.threshold=Math.min(1,Math.max(0,v/100)); });
      chkRow("Limit Axis",  ()=>n.limitAxis, v=>{ n.limitAxis=v; });
    }
    selRow("Keyboard",   KEYMODE_OPTS, ()=>n.keyMode||"off", v=>{ n.keyMode=v; });
    selRow("Controller", CNTL_OPTS,    ()=>n.cntlMode||"off", v=>{ n.cntlMode=v; });
    chkRow("Hide on PC", ()=>n.hideOnPc, v=>{ n.hideOnPc=v; });
  }
  if(n.type==="button"){
    selRow("Style",  STYLE_OPTS, ()=>n.style||"frame", v=>{ n.style=v; });
    colRow("Color",  OBJ_COLORS, ()=>n.color||"#e0892b", v=>{ n.color=v; });
    selRow("Output", [{value:"momentary",label:"Momentary"},{value:"toggle",label:"Toggle"},{value:"pulse",label:"Pulse"}], ()=>n.output||"momentary", v=>{ n.output=v; });
    selRow("Keyboard",   KEY_OPTS,  ()=>n.keyCode||"", v=>{ n.keyCode=v; });
    selRow("Controller", CNTL_OPTS, ()=>n.cntlBtn||"off", v=>{ n.cntlBtn=v; });
    chkRow("Hide on PC", ()=>n.hideOnPc, v=>{ n.hideOnPc=v; });
  }
  if(n.type==="keyboard"){
    selRow("Key", KEY_OPTS.filter(o=>o.value!==""), ()=>n.keyCode||" ", v=>{ n.keyCode=v; });
  }
  if(n.type==="sound"){ numRow("Pitch", ()=>n.pitch||440, v=>{ n.pitch=Math.max(50,v); });
    selRow("Wave", [{value:"square",label:"Square"},{value:"sine",label:"Sine"},{value:"triangle",label:"Triangle"},{value:"sawtooth",label:"Saw"}], ()=>n.wave||"square", v=>{ n.wave=v; }); }
  if(n.type==="velocity"){ numRow("Frames", ()=>n.frames||5, v=>{ n.frames=Math.max(1,Math.round(v)); }); }
  if(n.type==="contact"){ txtRow("With Tag", ()=>n.withTag||"", v=>{ n.withTag=v; }); }
  if(n.type==="bg"){ colRow("Color", OBJ_COLORS, ()=>n.color||"#0a0b10", v=>{ n.color=v; }); }
  if(n.type==="setting"){ numRow("Gravity", ()=>n.gravity||2200, v=>{ n.gravity=Math.max(0,v); });
    selRow("Screen", [{value:"yoko",label:"Yoko(横)"},{value:"tate",label:"Tate(縦)"}], ()=>n.orient||"yoko", v=>{ n.orient=v; });
    numRow("FPS", ()=>n.fps||60, v=>{ n.fps=Math.max(10,Math.min(120,Math.round(v))); }); }
  if(n.type==="shot"){
    txtRow("Destroy Tag", ()=>n.destroyTag||"", v=>{ n.destroyTag=v; });
    numRow("Bullet Speed", ()=>n.bulletSpd||400, v=>{ n.bulletSpd=v; });
    numRow("Bullet Size", ()=>n.bulletSize||14, v=>{ n.bulletSize=Math.max(2,v); });
    colRow("Bullet Color", OBJ_COLORS, ()=>n.bulletColor||"#ffe08a", v=>{ n.bulletColor=v; });
  }
  // 幾何プロパティ（STICK/BUTTONは独自UIなので除外）＝ Unity順: W/H → Angle → Color/Flip/Dynamics → Tag → Layer
  const hasGeom = d.object || d.stage==="text" || d.stage==="shot" || d.stage==="rotate";
  if(hasGeom){
    numRow("Width",  ()=>n.w||80,  v=>{ n.w=Math.max(16,v); });
    numRow("Height", ()=>n.h||80,  v=>{ n.h=Math.max(16,v); });
    numRow("Angle",  ()=>n.angle||0, v=>{ n.angle=v; });
  }
  if(d.object){
    colRow("Color", OBJ_COLORS, ()=>n.color, v=>{ n.color=v; });
    chkRow("Flip",     ()=>n.flip, v=>{ n.flip=v; });
    chkRow("Dynamics", ()=>n.dyn, v=>{ n.dyn=v; });
    numRow("Bounce",   ()=>Math.round((n.bounce||0)*100), v=>{ n.bounce=Math.min(1,Math.max(0,v/100)); });
    numRow("Friction", ()=>Math.round((n.friction||0)*100), v=>{ n.friction=Math.min(1,Math.max(0,v/100)); });
  }
  if(hasGeom){
    txtRow("Tag",   ()=>n.tag||"", v=>{ n.tag=v; });
    numRow("Layer", ()=>n.layer||50, v=>{ n.layer=Math.round(v); });
  }
  if(d.target){ // GETPOS / GETROT の対象オブジェクト
    const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent="TARGET";
    const sel=document.createElement("select");
    const none=document.createElement("option"); none.value=""; none.textContent="(none)"; sel.appendChild(none);
    nodes.filter(m=>NODE_TYPES[m.type].object).forEach(o=>{
      const op=document.createElement("option"); op.value=String(o.id);
      op.textContent=NODE_TYPES[o.type].label+" #"+o.id;
      if(n.target===o.id) op.selected=true; sel.appendChild(op); });
    sel.onchange=()=>{ n.target = sel.value ? parseInt(sel.value) : null; };
    r.appendChild(lb); r.appendChild(sel); propPanel.appendChild(r);
  }
  // 親子構造は端子ワイヤーで設定するため、Propertyには出さない
  // テクスチャ編集
  if(d.tex){
    const eb=document.createElement("button"); eb.className="del"; eb.style.background="#c79a10"; eb.style.borderColor="#e0c020";
    eb.textContent="EDIT TEXTURE";
    eb.onclick=()=> openTexEditor(n.id);
    propPanel.appendChild(eb);
  }
  const dup=document.createElement("button"); dup.className="del"; dup.style.background="#2f7a4a"; dup.style.borderColor="#3fa060";
  dup.textContent="DUPLICATE";
  dup.onclick=()=>{ const c=duplicateNodes([n.id]); const nid=c&&c.size?[...c][0]:n.id; propNode=nid; selected=nid; refreshProp(); };
  propPanel.appendChild(dup);
  const del=document.createElement("button"); del.className="del"; del.textContent="DELETE";
  del.onclick=()=>{ recordUndo(); removeNode(n.id); if(selected===n.id) selected=null; propNode=null; refreshProp(); };
  propPanel.appendChild(del);
  propPanel.style.display="block";
}

// ▶ ボタン：タップで再生/停止（Editor/Layout どちらからも再生できる）
document.getElementById("playBtn").onclick=()=> (mode==="play")?stopPlay():startPlay();

// =====================================================================
//  MENU ボタンのフリックメニュー（元デザイン準拠）
//  押したまま項目へドラッグ→離すと実行。タップだけでは何も起きない。
// =====================================================================
const menuBtn=document.getElementById("menuBtn");
const flick=document.getElementById("flick");
const FLICK_ITEMS=[
  { key:"newnode", label:"NEW NODE", color:"#2f5a8a", run:()=>{ if(mode==="edit") showCreateMenu(W/2, Math.max(120,H*0.4)); } },
  { key:"save", label:"SAVE", color:"#c0392b", run:()=>openSaveDialog() },
  { key:"load", label:"LOAD", color:"#2b6fd0", run:()=>openLoadDialog() },
  { key:"undo", label:"UNDO", color:"#6b5bd0", run:()=>undo() },
  { key:"redo", label:"REDO", color:"#6b5bd0", run:()=>redo() },
  { key:"fit",  label:"FIT",  color:"#1f7a3a", run:fitView },
  { key:"new",  label:"NEW",  color:"#555b68", run:doNew },
];
let flickEls=[], flickHot=null;
function openFlick(){
  flick.innerHTML=""; flickEls=[]; flickHot=null;
  const bx=W-14-72, by=98; // MENUボタンの位置
  // 先頭に Editor⇄Layout 切り替えを動的追加
  const modeItem = (mode==="layout")
    ? { label:"EDITOR", color:"#1f7a3a", run:()=>setMode("edit") }   // Editorテーマ=緑
    : { label:"LAYOUT", color:"#21b3d6", run:()=>setMode("layout") }; // Layoutテーマ=水色
  const items=[modeItem, ...FLICK_ITEMS];
  items.forEach((it,i)=>{
    const el=document.createElement("div"); el.className="fi"; el.textContent=it.label;
    el.style.background=it.color;
    el.style.left=(bx-165)+"px";            // MENUの左側に縦に並べる
    el.style.top =(by + i*68)+"px";
    el._it=it; flick.appendChild(el); flickEls.push(el);
    // タップでも実行できる（フリックしなくてもOK）
    el.addEventListener("pointerup", ev=>{ ev.stopPropagation(); const run=it.run; closeFlick(false); run(); });
  });
  flick.style.display="block";
}
function updateFlick(sx,sy){
  flickHot=null;
  for(const el of flickEls){
    const r=el.getBoundingClientRect();
    const hit = sx>=r.left&&sx<=r.right&&sy>=r.top&&sy<=r.bottom;
    el.classList.toggle("hot", hit);
    if(hit) flickHot=el._it;
  }
}
function closeFlick(run){
  if(run && flickHot) flickHot.run();
  flick.style.display="none"; flickEls=[]; flickHot=null;
}
function isFlickOpen(){ return flick.style.display==="block"; }
let flickMoved=false, flickDown={x:0,y:0};
menuBtn.addEventListener("pointerdown", e=>{ e.preventDefault();
  if(isFlickOpen()){ closeFlick(false); return; }   // 開いていれば閉じる（トグル）
  menuBtn.setPointerCapture(e.pointerId); openFlick(); flickMoved=false; flickDown={x:e.clientX,y:e.clientY}; });
menuBtn.addEventListener("pointermove", e=>{ if(!isFlickOpen()) return;
  if(Math.hypot(e.clientX-flickDown.x,e.clientY-flickDown.y)>12) flickMoved=true;
  updateFlick(e.clientX,e.clientY); });
menuBtn.addEventListener("pointerup", e=>{ if(!isFlickOpen()) return;
  try{ menuBtn.releasePointerCapture(e.pointerId); }catch(_){}
  if(flickMoved){ updateFlick(e.clientX,e.clientY); closeFlick(true); } // フリック：離した項目を実行
  else { updateFlick(-1,-1); }                                          // タップ：開いたまま項目選択待ち
});
menuBtn.addEventListener("pointercancel",()=>closeFlick(false));
// 項目外（オーバーレイ）タップで閉じる
flick.addEventListener("pointerdown", e=>{ if(e.target===flick) closeFlick(false); });

function doNew(){ if(confirm("すべて消去して新規作成しますか？")){ recordUndo(); nodes=[]; conns=[]; selected=null; multiSel.clear(); propNode=null; currentFile=""; view={x:0,y:0,s:1}; } }

// ===== 名前付きセーブスロット =====
let currentFile="";
function slotList(){ try{ return JSON.parse(localStorage.getItem("ng_slots")||"[]"); }catch(e){ return []; } }
function setSlotList(a){ localStorage.setItem("ng_slots", JSON.stringify(a)); }
function saveSlot(name){ if(!name) return; localStorage.setItem("ng_slot_"+name, serialize());
  const l=slotList(); if(!l.includes(name)){ if(l.length<64){ l.push(name); setSlotList(l);} } currentFile=name; }
function loadSlot(name){ const s=localStorage.getItem("ng_slot_"+name); if(s){ recordUndo(); deserialize(s); currentFile=name; } }
function deleteSlot(name){ localStorage.removeItem("ng_slot_"+name); localStorage.removeItem("ng_auto_"+name); setSlotList(slotList().filter(x=>x!==name)); }
function getAuto(name){ return localStorage.getItem("ng_auto_"+name)!=="0"; }
function setAuto(name,on){ localStorage.setItem("ng_auto_"+name, on?"1":"0"); }

// 汎用モーダル
function modal(build){ const ov=document.createElement("div");
  ov.style.cssText="position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center";
  const box=document.createElement("div");
  box.style.cssText="background:#1c2029;border:1px solid #3a4150;border-radius:14px;padding:16px;min-width:280px;max-width:90%;max-height:80%;overflow:auto;box-shadow:0 12px 36px rgba(0,0,0,.6)";
  ov.appendChild(box); ov.onclick=e=>{ if(e.target===ov) document.body.removeChild(ov); };
  build(box, ()=>{ if(ov.parentNode) document.body.removeChild(ov); });
  document.getElementById("app").appendChild(ov); return ov; }
function mkBtn(label,bg){ const b=document.createElement("button");
  b.textContent=label; b.style.cssText=`height:46px;padding:0 16px;border-radius:10px;border:1px solid #3a4150;background:${bg||'#242a37'};color:#fff;font-size:15px;font-weight:800;cursor:pointer`; return b; }
// カラーピッカー（Unity版パレット）
function openColorPicker(current, onPick){ modal((box,close)=>{
  const t=document.createElement("div"); t.textContent="COLOR"; t.style.cssText="color:#fff;font-size:18px;font-weight:800;margin-bottom:12px"; box.appendChild(t);
  const grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(9,1fr);gap:6px";
  UNITY_PALETTE.forEach(col=>{ const sw=document.createElement("div");
    sw.style.cssText=`width:30px;height:30px;border-radius:6px;background:${col};cursor:pointer;border:2px solid ${current===col?'#fff':'rgba(255,255,255,.2)'}`;
    sw.onclick=()=>{ onPick(col); close(); }; grid.appendChild(sw); });
  box.appendChild(grid);
}); }

function openSaveDialog(){ modal((box,close)=>{
  const t=document.createElement("div"); t.textContent="SAVE"; t.style.cssText="color:#fff;font-size:18px;font-weight:800;margin-bottom:12px"; box.appendChild(t);
  const nm=document.createElement("input"); nm.type="text"; nm.value=currentFile||"untitled";
  nm.style.cssText="width:100%;height:46px;border-radius:9px;border:1px solid #3a4150;background:#12141a;color:#fff;font-size:16px;font-weight:700;text-align:center;margin-bottom:12px"; box.appendChild(nm);
  const ar=document.createElement("label"); ar.style.cssText="display:flex;gap:10px;align-items:center;color:#c3cad8;font-size:14px;font-weight:700;margin-bottom:14px";
  const ac=document.createElement("input"); ac.type="checkbox"; ac.checked=getAuto(nm.value); ac.style.cssText="width:26px;height:26px";
  ar.appendChild(ac); ar.appendChild(document.createTextNode("AUTO SAVE")); box.appendChild(ar);
  const row=document.createElement("div"); row.style.cssText="display:flex;gap:10px";
  const sv=mkBtn("SAVE","#1f7a3a"), ca=mkBtn("CANCEL","#555b68"); sv.style.flex="1"; ca.style.flex="1";
  sv.onclick=()=>{ const nn=nm.value.trim()||"untitled"; saveSlot(nn); setAuto(nn,ac.checked); close(); };
  ca.onclick=close; row.appendChild(sv); row.appendChild(ca); box.appendChild(row);
}); }
function openLoadDialog(){ modal((box,close)=>{
  const t=document.createElement("div"); t.textContent="LOAD"; t.style.cssText="color:#fff;font-size:18px;font-weight:800;margin-bottom:12px"; box.appendChild(t);
  const list=slotList();
  if(!list.length){ const e=document.createElement("div"); e.textContent="保存データがありません"; e.style.cssText="color:#8a92a6;margin-bottom:12px"; box.appendChild(e); }
  list.forEach(name=>{ const r=document.createElement("div"); r.style.cssText="display:flex;gap:8px;margin-bottom:8px;align-items:center";
    const ld=mkBtn(name,"#2b6fd0"); ld.style.flex="1"; ld.style.justifyContent="flex-start"; ld.style.textAlign="left";
    ld.onclick=()=>{ loadSlot(name); close(); };
    const del=mkBtn("×","#a12b2b"); del.style.width="48px";
    del.onclick=()=>{ if(confirm(name+" を削除しますか？")){ deleteSlot(name); close(); openLoadDialog(); } };
    r.appendChild(ld); r.appendChild(del); box.appendChild(r); });
  const ca=mkBtn("CANCEL","#555b68"); ca.style.width="100%"; ca.onclick=close; box.appendChild(ca);
}); }

function serialize(){ return JSON.stringify({nodes,conns,nextId}); }
function deserialize(s){ const o=JSON.parse(s); nodes=o.nodes||[]; conns=o.conns||[]; nextId=o.nextId||1; selected=null; propNode=null; if(typeof multiSel!=="undefined") multiSel.clear();
  // 旧データ移行（size → w/h/angle など）
  nodes.forEach(n=>{ if(NODE_TYPES[n.type]&&isStage(n)){
    if(n.w==null) n.w=n.size||80; if(n.h==null) n.h=n.size||80; if(n.angle==null) n.angle=0;
    if(n.layoutX==null) n.layoutX=0; if(n.layoutY==null) n.layoutY=0;
    if(n.layer==null) n.layer=50; if(n.tag==null) n.tag="";
    if(n.type==="character"&&n.flip==null) n.flip=true;
    if(n.type==="text"&&n.text==null) n.text="TEXT";
    if(n.type==="text"&&n.fontSize==null) n.fontSize=40;
    if(n.type==="stick"){ if(n.mode==null)n.mode="analog"; if(n.threshold==null)n.threshold=0.3;
      if(n.limitAxis==null)n.limitAxis=false; if(n.visible==null)n.visible=true;
      if(n.style==null)n.style="frame"; if(n.keyMode==null)n.keyMode=(n.useKey?"wasd":"off");
      if(n.cntlMode==null)n.cntlMode="off"; if(n.hideOnPc==null)n.hideOnPc=false; }
    if(n.type==="button"){ if(n.output==null)n.output="momentary"; if(n.visible==null)n.visible=true;
      if(n.style==null)n.style="frame"; if(n.keyCode==null)n.keyCode=(n.useKey?" ":"");
      if(n.cntlBtn==null)n.cntlBtn="off"; if(n.hideOnPc==null)n.hideOnPc=false; }
  } });
  nodes.forEach(n=>{ if(NODE_TYPES[n.type]&&n.type==="keyboard"&&n.keyCode==null) n.keyCode=" "; });
  nodes.forEach(n=>{ if(isStage(n)&&n.parentNodeId) recomputeLocal(n); }); // 親子ローカル復元
}

function fitView(){
  if(nodes.length===0){ view={x:0,y:0,s:1}; return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const n of nodes){
    minx=Math.min(minx,n.x-NS/2); maxx=Math.max(maxx,n.x+NS/2);
    miny=Math.min(miny,n.y-NS/2); maxy=Math.max(maxy,n.y+NS/2); }
  const pad=50; const bw=maxx-minx+pad*2, bh=maxy-miny+pad*2;
  view.s=Math.min(1.4,Math.max(0.3, Math.min(W/bw,(H-20)/bh)));
  view.x=(minx+maxx)/2; view.y=(miny+maxy)/2;
}
// スマホ向け：全体を詰め込まず、読みやすい倍率で中央に寄せる
function centerReadable(){
  if(nodes.length===0){ view={x:0,y:0,s:1}; return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const n of nodes){ const h=nodeHeight(n.type);
    minx=Math.min(minx,n.x); maxx=Math.max(maxx,n.x);
    miny=Math.min(miny,n.y); maxy=Math.max(maxy,n.y); }
  view.x=(minx+maxx)/2; view.y=(miny+maxy)/2;
  view.s=0.75; // 文字が読みやすい倍率
}

// =====================================================================
//  デフォルトのサンプル（KEYで RECT を動かす）
// =====================================================================
function sample(){
  const stk=addNode("stick",-190,-130); stk.useKey=true; stk.layoutX=-230; stk.layoutY=150; // 画面スティック＋キーボード
  const spd=addNode("const",-190,90); spd.value=320;
  const mx=addNode("mul",70,-150);
  const my=addNode("mul",70,50);
  const rc=addNode("rect",330,-60); rc.color="#3ad0ff"; rc.dyn=true; // プレイヤー（重力ON）
  rc.w=70; rc.h=70; rc.layoutX=0; rc.layoutY=-200;
  connect(stk.id,0, mx.id,0); connect(spd.id,0, mx.id,1);
  connect(stk.id,1, my.id,0); connect(spd.id,0, my.id,1);
  connect(mx.id,0, rc.id,0);  connect(my.id,0, rc.id,1);
  // 静的な足場（重力OFF＝乗れるブロック）。床はこの足場のみ（画面下の自動床なし）
  const plat=addNode("rect",330,140); plat.color="#c084fc"; plat.dyn=false;
  plat.w=320; plat.h=40; plat.layoutX=0; plat.layoutY=80;
  centerReadable();
}
sample();

// =====================================================================
//  メインループ
// =====================================================================
let lastPropNode="__init__", lastMode="";
let playAcc=0, autoAcc=0;
function loop(t){
  const dt=Math.min(0.05,(t-lastT)/1000)||0; lastT=t;
  if(mode==="play"){
    const setN=nodes.find(n=>n.type==="setting"); const fps=setN?(setN.fps||60):60;
    playAcc+=dt; const step=1/fps;
    // 指定FPSでゲームを更新
    let guard=0; while(playAcc>=step && guard++<5){ playStep(step); playAcc-=step; }
  }
  // 自動セーブ（AUTO SAVEオンのスロットを30秒ごと）
  autoAcc+=dt; if(autoAcc>=30){ autoAcc=0; if(currentFile && getAuto(currentFile) && mode!=="play"){ try{ localStorage.setItem("ng_slot_"+currentFile, serialize()); }catch(e){} } }
  if(propNode!==lastPropNode || mode!==lastMode){ lastPropNode=propNode; lastMode=mode; refreshProp(); }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
