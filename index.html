<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12141a">
<title>nodegram web</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#12141a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; }
  #app { position:fixed; inset:0; }
  #cv { position:absolute; inset:0; display:block; }

  /* 右上コントローラ（▶ / MENU） */
  .cbtn { position:absolute; right:14px; width:72px; height:72px; border-radius:14px; z-index:12;
    display:flex; align-items:center; justify-content:center; font-weight:800; cursor:pointer;
    border:1px solid rgba(0,0,0,.35); user-select:none; }
  .cplay { top:14px; background:#1f7a3a; color:#fff; font-size:34px; }
  .cplay.stop { background:#a12b2b; }
  .cmenu { top:98px; background:#3b4250; color:#dff2ff; font-size:19px; letter-spacing:.03em; }
  .cmenu:active { background:#4a5262; }
  #flick { position:absolute; inset:0; z-index:11; display:none; }
  #flick .fi { position:absolute; width:150px; height:60px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:20px; font-weight:800; color:#fff; border:2px solid rgba(255,255,255,.25);
    background:#2b3140; box-shadow:0 6px 20px rgba(0,0,0,.5); }
  #flick .fi.hot { border-color:#fff; transform:scale(1.08); }
  .swatch { width:16px; height:16px; border-radius:4px; display:inline-block; margin-right:8px; vertical-align:-2px; }

  /* 再生中のオンスクリーン操作 */
  #pad { position:absolute; left:14px; bottom:14px; width:150px; height:150px; z-index:9; display:none;
    touch-action:none; }
  #pad .k { position:absolute; width:48px; height:48px; border-radius:10px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.25); }
  #pad .up{left:51px;top:0} #pad .down{left:51px;bottom:0} #pad .left{left:0;top:51px} #pad .right{right:0;top:51px}
  #hint { position:absolute; right:10px; bottom:10px; color:#8a92a6; font-size:12px; z-index:9; }
  .hidden { display:none !important; }

  /* テクスチャエディタ */
  #texBar { position:absolute; left:0; right:0; bottom:0; z-index:16; background:rgba(20,22,30,.96);
    border-top:1px solid #2a2e3a; padding:10px; display:none; }
  #texPalette { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:10px; max-height:120px; overflow-y:auto; }
  #texPalette .sw { width:30px; height:30px; border-radius:7px; border:2px solid #3a4150; cursor:pointer; flex:0 0 auto; }
  #texPalette .sw.sel { border-color:#fff; transform:scale(1.12); }
  #texPalette .sw.eraser { background:repeating-conic-gradient(#555 0% 25%, #888 0% 50%) 50%/14px 14px; }
  #texTools { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  #texTools .btn { height:44px; padding:0 16px; border-radius:10px; border:1px solid #333a49;
    background:#242a37; color:#e6e9ef; font-size:15px; font-weight:700; cursor:pointer; }
  #texTools .btn:active { background:#2f3646; }

  /* 背景長押しの Create New Node メニュー */
  #createMenu { position:absolute; z-index:20; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:12px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6);
    max-height:calc(100vh - 24px); overflow-y:auto; }
  #createMenu .title { color:#8a92a6; font-size:13px; font-weight:800; padding:2px 4px 10px; letter-spacing:.05em; }
  #createMenu .row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  #createMenu .ci { height:52px; padding:0 8px; border-radius:11px; border:1px solid rgba(0,0,0,.35);
    color:#fff; font-size:15px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;
    text-align:center; text-shadow:0 1px 2px rgba(0,0,0,.5); }
  #createMenu .ci:active { background:#2f3646; }

  /* 複数選択メニュー（Duplicate/Delete） */
  #multiMenu { position:absolute; z-index:21; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:10px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6); }
  #multiMenu .mi { height:52px; min-width:180px; padding:0 18px; border-radius:11px; border:1px solid #333a49;
    color:#fff; font-size:17px; font-weight:800; cursor:pointer; display:flex; align-items:center; margin:4px 0; }
  #multiMenu .mi.dup { background:#2b6fd0; } #multiMenu .mi.del { background:#a12b2b; }
  #multiMenu .mi:active { filter:brightness(1.2); }

  /* プロパティパネル（選択ノード） */
  #propPanel { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:15;
    background:rgba(28,32,42,.98); border:1px solid #3a4150; border-radius:14px; padding:16px 18px; display:none;
    min-width:240px; box-shadow:0 12px 36px rgba(0,0,0,.6); }
  #propPanel .pt { color:#fff; font-size:17px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; }
  #propPanel .pclose { margin-left:auto; width:34px; height:34px; border-radius:8px; border:1px solid #3a4150;
    background:#2a3040; color:#fff; font-size:20px; font-weight:800; cursor:pointer; line-height:1; }
  #propPanel .pclose:active { background:#3a4150; }
  #propPanel .prow { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  #propPanel label { color:#9aa3b5; font-size:13px; font-weight:700; }
  #propPanel input { flex:1; width:110px; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:18px; font-weight:700; text-align:center; }
  #propPanel input[type=checkbox] { flex:0 0 auto; width:32px; height:32px; }
  #propPanel select { flex:1; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:16px; font-weight:700; }
  #propPanel .del { width:100%; height:48px; border-radius:10px; border:1px solid #cc3b3b; background:#a12b2b;
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; }
  #propPanel .del:active { background:#cc3b3b; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <!-- 右上のコントローラ（元デザイン準拠：▶ と MENU） -->
  <div id="playBtn" class="cbtn cplay">▶</div>
  <div id="menuBtn" class="cbtn cmenu">MENU</div>
  <div id="flick"></div>

  <div id="pad">
    <div class="k up"    data-d="U"></div>
    <div class="k down"  data-d="D"></div>
    <div class="k left"  data-d="L"></div>
    <div class="k right" data-d="R"></div>
  </div>
  <div id="hint" class="hidden">矢印 / WASD で移動</div>

  <div id="createMenu"></div>
  <div id="multiMenu"></div>
  <div id="propPanel"></div>

  <!-- テクスチャエディタのツールバー -->
  <div id="texBar">
    <div id="texPalette"></div>
    <div id="texTools">
      <button class="btn" data-sz="8">8</button>
      <button class="btn" data-sz="16">16</button>
      <button class="btn" data-sz="32">32</button>
      <button class="btn" id="texClear">CLEAR</button>
      <button class="btn" id="texClose">CLOSE</button>
    </div>
  </div>
</div>

<script>
"use strict";
// Unity版のカラーパレット（プロジェクト由来）
const UNITY_PALETTE=["#ffffff","#f4e8ff","#ddb4ff","#c785ff","#e8fbff","#cdf8ff","#86edff","#f7ffe7","#e6ffb4","#d8ff85","#ffe8e8","#ffb4b4","#ff8685","#eeeeee","#8800ff","#500099","#21004b","#00d7ff","#00acce","#066f85","#acff00","#91db02","#538000","#fe0002","#cd0000","#800000","#dadada","#bc99db","#846d99","#5a5164","#9acedb","#587b7f","#32454b","#c3dc9a","#8a9a6b","#384b14","#db5554","#813d3c","#4b1515","#b5b5b5","#fee8ff","#fbb4ff","#f986fd","#e7f4fd","#b4d7ff","#85bfff","#cdffd5","#9affac","#65ff81","#fff2e9","#ffd5b3","#ffb985","#919191","#f300ff","#c101d0","#7b007f","#0080ff","#005fcd","#003781","#00da1a","#009b0c","#005700","#ff6900","#c95407","#7f3100","#6c6c6c","#d799da","#7e3d81","#48164b","#99b7db","#3c5d80","#152e4c","#83c48e","#57805e","#152e1b","#dcb598","#7f5a3f","#4a2e16","#494748","#ffe7f5","#ffb4e4","#ff86cd","#ebecff","#d1cdff","#a29aff","#e7fffa","#b3fff2","#85ffe8","#fffee9","#fffbb4","#fff000","#2a2a2a","#ff0098","#d2007b","#7f0049","#0d00ff","#0000b3","#00004b","#00ffd1","#00cea4","#008265","#fff000","#cebf00","#807700","#000000","#da9abf","#80506a","#4b1634","#b2afda","#656281","#3c374b","#98dacc","#699b92","#164c3f","#bfbc85","#817f58","#4a492d"];
// =====================================================================
//  nodegram (web prototype)  — Unityを使わないHTML版の骨組み
//  ・ノード編集：追加 / 移動 / 端子ドラッグで接続 / ×で削除 / 値編集
//  ・再生：ノードグラフを毎フレーム評価してオブジェクトを動かす
//  Canvas2Dのみ。外部ライブラリなし。1ファイルで動作。
// =====================================================================

// ---- ノード種別の定義（色は元nodegramのカテゴリ配色に対応）----
const NODE_TYPES = {
  const:  { label:"CONST",  glyph:"",     inputs:[],              outputs:["n"],     color:"#3aae4a" }, // 緑：入力/定数
  // 操作系（橙）
  stick:   { label:"STICK",    glyph:"STK",  inputs:[], outputs:["X","Y"],   color:"#e0892b", stage:"stick"  },
  button:  { label:"BUTTON",   glyph:"BTN",  inputs:[], outputs:["="],       color:"#e0892b", stage:"button" },
  keyboard:{ label:"KEYBOARD", glyph:"KBD",  inputs:[], outputs:["="],       color:"#e0892b" },
  touch:   { label:"TOUCH",    glyph:"TCH",  inputs:[], outputs:["X","Y","P"], color:"#e0892b" },
  // 計算系（青）
  add:    { label:"＋",   glyph:"＋",   inputs:["a","b"], outputs:["="], color:"#3b7ddd" },
  sub:    { label:"－",   glyph:"－",   inputs:["a","b"], outputs:["="], color:"#3b7ddd" },
  mul:    { label:"×",    glyph:"×",    inputs:["a","b"], outputs:["="], color:"#3b7ddd" },
  div:    { label:"÷",    glyph:"÷",    inputs:["a","b"], outputs:["="], color:"#3b7ddd" },
  root:   { label:"√",    glyph:"√",    inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  compare:{ label:"COMPARE", glyph:"＞",   inputs:["a","b"], outputs:["="], color:"#3b7ddd" },
  not:    { label:"NOT",     glyph:"！",   inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  arctan: { label:"POS ANGLE",  glyph:"PtA", inputs:["y","x"], outputs:["="], color:"#3b7ddd" },
  angletopos:{ label:"ANGLE POS", glyph:"AtP", inputs:["a"], outputs:["X","Y"], color:"#3b7ddd" },
  random: { label:"RANDOM",  glyph:"RND",  inputs:[],        outputs:["="], color:"#3b7ddd" },
  int:    { label:"INT",     glyph:"INT",  inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  // 応用計算系（水色）
  trigger:{ label:"TRIGGER", glyph:"DLY", inputs:["in","F"],      outputs:["="],     color:"#22b8c0" },
  counter:{ label:"COUNTER", glyph:"CNT", inputs:["up","rst"],    outputs:["="],     color:"#22b8c0" },
  var:    { label:"VAR",     glyph:"VAR", inputs:["val","set"],   outputs:["="],     color:"#22b8c0" },
  array:  { label:"ARRAY",   glyph:"ARR", inputs:["i","val","wr"],outputs:["="],     color:"#22b8c0" },
  getpos: { label:"GETPOS",  glyph:"GPS", inputs:[],              outputs:["X","Y"], color:"#22b8c0", target:true },
  getrot: { label:"GETROT",  glyph:"GRT", inputs:[],              outputs:["R"],     color:"#22b8c0", target:true },
  // 出力系（紫）
  text:     { label:"TEXT",   glyph:"T",    inputs:["val"],       outputs:[], color:"#8a3bd0", stage:"text"   },
  rect:     { label:"RECT",   glyph:"▭",   inputs:["vx","vy"],   outputs:[], color:"#8a3bd0", object:"rect"  },
  circle:   { label:"CIRCLE", glyph:"〇",   inputs:["vx","vy"],   outputs:[], color:"#8a3bd0", object:"circle"},
  character:{ label:"CHARACTER", glyph:"CHR", inputs:["vx","vy"], outputs:[], color:"#8a3bd0", object:"rect"  },
  shot:     { label:"SHOT",   glyph:"SHOT", inputs:["fire","spd"],outputs:[], color:"#8a3bd0", stage:"shot"   },
  sound:    { label:"SOUND",  glyph:"SND",  inputs:["play"],      outputs:[], color:"#8a3bd0" },
  // その他（黄）
  texture:  { label:"TEXTURE",glyph:"TEX",  inputs:["V"],         outputs:[], color:"#e0c020", tex:true },
  contact:  { label:"CONTACT",glyph:"CON",  inputs:[],            outputs:["="], color:"#e0c020", attach:true },
  onbreak:  { label:"ONBREAK",glyph:"BRK",  inputs:[],            outputs:["="], color:"#e0c020", attach:true },
  rotate:   { label:"ROTATE", glyph:"ROT",  inputs:["av"],        outputs:[], color:"#e0c020", stage:"rotate" },
  velocity: { label:"VELOCITY",glyph:"VEL", inputs:[],            outputs:["X","Y"], color:"#e0c020", target:true },
  screen:   { label:"SCREEN", glyph:"SCR",  inputs:[],            outputs:[], color:"#e0c020", target:true },
  // シーン設定（灰）
  bg:       { label:"BG",     glyph:"BG",   inputs:[],            outputs:[], color:"#6b7280" },
  setting:  { label:"SETTING",glyph:"SET",  inputs:[],            outputs:[], color:"#6b7280" },
};
const isStage = n => { const d=NODE_TYPES[n.type]; return !!(d.object || d.stage); };
const attachesToObject = n => ['texture','contact','onbreak'].includes(n.type);
const PALETTE = ["const",
  "add","sub","mul","div","root","compare","not","arctan","angletopos","random","int",
  "trigger","counter","var","array","getpos","getrot",
  "text","rect","circle","character","shot","sound",
  "stick","button","keyboard","touch",
  "texture","contact","onbreak","rotate","velocity","screen",
  "bg","setting"];

// ---- ノードの見た目サイズ（ワールド座標）。元デザイン同様の正方形ノード ----
const NS = 130, PORT_R = 20; // 端子を1.3倍に
function nodeHeight(t){ return NS; }
// ノードに表示する1〜3文字（元nodegramのシンボル表示に対応）
function nodeGlyph(n){
  if(n.type==="const") return String(n.value);
  const d=NODE_TYPES[n.type];
  return (d && (d.glyph||d.label)) || "?";
}
function glyphFontSize(g){ const L=[...String(g)].length;
  return (L<=1?0.84 : L===2?0.62 : L===3?0.48 : 0.36) * NS; } // 約1.4倍に拡大

// ---- 状態 ----
let nodes = [];              // {id,type,x,y,value,color,size,playX,playY,vx,vy}
let conns = [];             // {a:nodeId, ao:outPort, b:nodeId, bi:inPort}
let view = { x:0, y:0, s:1 };
let layoutView = { x:0, y:0, s:1 };  // レイアウト画面のパン・ズーム
let nextId = 1;
let mode = "edit";          // "edit" | "layout" | "play"
let editModeMemory = "edit"; // Play終了後に戻る画面（edit/layout）

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W=0, H=0, DPR=1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize);
resize();

// ---- 座標変換 ----
function w2s(wx,wy){ return { x:(wx-view.x)*view.s + W/2, y:(wy-view.y)*view.s + H/2 }; }
function s2w(sx,sy){ return { x:(sx-W/2)/view.s + view.x, y:(sy-H/2)/view.s + view.y }; }
// レイアウト画面：ステージ座標(=layoutX/Y) ↔ スクリーン
function stageToScreenLayout(x,y){ return { x:(x-layoutView.x)*layoutView.s + W/2, y:(y-layoutView.y)*layoutView.s + H/2 }; }
function screenToStageLayout(sx,sy){ return { x:(sx-W/2)/layoutView.s + layoutView.x, y:(sy-H/2)/layoutView.s + layoutView.y }; }

// ---- ノード生成 ----
function addNode(type, wx, wy){
  const d = NODE_TYPES[type];
  const n = { id: nextId++, type, x:wx, y:wy };
  if (type==="const") n.value = 1;
  if (d.object || d.stage){
    n.angle=0; n.playX=0; n.playY=0; n.layer=50; n.tag="";  // SORTLAYER・タグ
    if(d.object){ n.color=randObjColor(); n.w=80; n.h=80; n.bounce=0; n.friction=0.0; n.flip=false; }
    else if(d.stage==="text"){ n.color="#8a3bd0"; n.w=240; n.h=70; n.text="TEXT"; n.fontSize=40; n.textColor="#ffffff"; n.align="center"; }
    else if(d.stage==="stick"){ n.color="#e0892b"; n.w=200; n.h=200;
      n.style="frame"; n.mode="analog"; n.threshold=0.3; n.limitAxis=false;
      n.keyMode="off"; n.cntlMode="off"; n.hideOnPc=false;
      n.useKey=false; n.visible=true; }
    else if(d.stage==="button"){ n.color="#e0892b"; n.w=150; n.h=150;
      n.style="frame"; n.output="momentary"; n.cntlBtn="off"; n.keyCode=""; n.hideOnPc=false;
      n.useKey=false; n.visible=true; }
    else if(d.stage==="shot"){ n.color="#c084fc"; n.w=70; n.h=70; n.angle=0; n.destroyTag=""; n.bulletSpd=400; n.bulletSize=14; n.bulletColor="#ffe08a"; }
    else if(d.stage==="rotate"){ n.color="#e0c020"; n.w=70; n.h=70; }
    if(type==="character"){ n.color=randObjColor(); n.flip=true; }
    // レイアウト開始位置（重ならないよう少しずらす）
    const oc = nodes.filter(m=>isStage(m)).length;
    n.layoutX = (oc%5)*100 - 200; n.layoutY = Math.floor(oc/5)*100 - 100;
    n.parentNodeId = null; // 親子構造
  }
  if (d.tex){ n.texW=16; n.texH=16; n.pixels=new Array(16*16).fill(null); n.parentNodeId=null; }
  if (d.attach){ n.parentNodeId=null; if(type==="contact") n.withTag=""; }
  if (type==="keyboard"){ n.keyCode=" "; }                     // 既定：スペース
  if (type==="sound"){ n.pitch=440; n.wave="square"; }         // 音の高さ・波形
  if (type==="velocity"){ n.frames=5; }                        // 速度の平滑化フレーム数
  if (type==="bg"){ n.color="#0a0b10"; }                       // 背景色
  if (type==="setting"){ n.gravity=2200; n.orient="yoko"; n.fps=60; } // 重力・画面向き・FPS
  nodes.push(n);
  return n;
}
function randObjColor(){
  const c=["#ff5a5a","#ffb43a","#3ad0ff","#4ade80","#c084fc","#f472b6"];
  return c[(nodes.length)%c.length];
}
const nodeById = id => nodes.find(n=>n.id===id);

// ---- 端子のスクリーン座標 ----
function portPos(n, isInput, idx){
  const d = NODE_TYPES[n.type];
  const cnt = (isInput ? d.inputs.length : d.outputs.length);
  const top = n.y - NS/2;
  // 辺上に配置。複数端子は上下に大きく離す（0.14〜0.86の範囲に展開）
  let py;
  if(cnt<=1) py = top + NS/2;
  else py = top + NS*0.24 + idx*(NS*0.52/(cnt-1));
  const px = isInput ? (n.x - NS/2) : (n.x + NS/2);
  return w2s(px, py);
}

// ---- 接続 ----
function connect(aId, aOut, bId, bIn){
  if (aId===bId) return;
  conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); // 入力は1本まで
  conns.push({ a:aId, ao:aOut, b:bId, bi:bIn });
}
function disconnectInput(bId, bIn){ conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); }
function removeNode(id){
  nodes = nodes.filter(n=>n.id!==id);
  conns = conns.filter(c=>c.a!==id && c.b!==id);
  nodes.forEach(n=>{ if(n.parentNodeId===id) n.parentNodeId=null; if(n.target===id) n.target=null; });
}
function removeNodes(ids){ for(const id of ids) removeNode(id); }
// 複数ノードを複製（グループ内の接続・親子・targetも複製）
function duplicateNodes(ids){
  recordUndo();
  const idmap=new Map(), clones=[];
  for(const id of ids){ const src=nodeById(id); if(!src) continue;
    const c=JSON.parse(JSON.stringify(src)); c.id=nextId++;
    c.x=(c.x||0)+40; c.y=(c.y||0)+40; if(c.layoutX!=null){ c.layoutX+=30; c.layoutY+=30; }
    idmap.set(id,c.id); clones.push(c); }
  for(const c of clones){ if(c.parentNodeId!=null && idmap.has(c.parentNodeId)) c.parentNodeId=idmap.get(c.parentNodeId);
    if(c.target!=null && idmap.has(c.target)) c.target=idmap.get(c.target); }
  nodes.push(...clones);
  for(const cn of conns.slice()){ if(idmap.has(cn.a)&&idmap.has(cn.b)) conns.push({a:idmap.get(cn.a),ao:cn.ao,b:idmap.get(cn.b),bi:cn.bi}); }
  return new Set(idmap.values());
}

// Undo/Redo
let undoStack=[], redoStack=[];
function recordUndo(){ try{ undoStack.push(serialize()); if(undoStack.length>60) undoStack.shift(); redoStack.length=0; }catch(e){} }
function undo(){ if(!undoStack.length) return; redoStack.push(serialize()); deserialize(undoStack.pop()); }
function redo(){ if(!redoStack.length) return; undoStack.push(serialize()); deserialize(redoStack.pop()); }

let axisX=0, axisY=0;   // KEY入力（-1..1）
function inputValue(node, port, seen){
  const c = conns.find(c=>c.b===node.id && c.bi===port);
  if(!c) return 0;
  const src = nodeById(c.a);
  if(!src) return 0;
  return outputValue(src, c.ao, seen);
}
function outputValue(node, port, seen){
  seen = seen || new Set();
  if (seen.has(node.id)) return 0;     // 循環ガード
  seen.add(node.id);
  const a=()=>inputValue(node,0,seen), b=()=>inputValue(node,1,seen);
  switch(node.type){
    case "const":   return node.value||0;
    case "key":     return port===0 ? axisX : axisY;
    case "stick": {
      let x=node.stickX||0, y=node.stickY||0;
      const km=node.keyMode||(node.useKey?"wasd":"off");
      if(km!=="off"){ const ax=keyModeAxis(km); x+=ax.x; y+=ax.y;
        x=Math.max(-1,Math.min(1,x)); y=Math.max(-1,Math.min(1,y)); }
      if(node.limitAxis){ if(Math.abs(x)>=Math.abs(y)) y=0; else x=0; }
      if(node.mode==="digital"){ const th=node.threshold||0.3;
        x = x>th?1:(x<-th?-1:0); y = y>th?1:(y<-th?-1:0); }
      return port===0 ? x : y;
    }
    case "button": {
      const bk=node.keyCode||(node.useKey?" ":"");
      const phys = (node.pressed?1:0) || (bk && heldKeys.has(bk) ? 1:0);
      if(node.output==="toggle") return node.toggleState?1:0;
      if(node.output==="pulse")  return node.pulseOut?1:0;
      return phys?1:0;
    }
    case "keyboard": return heldKeys.has((node.keyCode||" ")) ? 1 : 0;
    case "touch":    return port===0 ? touchX : (port===1 ? touchY : touchDown);
    // 計算系（青）
    case "add":     return a()+b();
    case "sub":     return a()-b();
    case "mul":     return a()*b();
    case "div":     { const d=b(); return d!==0 ? a()/d : 0; }
    case "root":    { const v=a(); return v>0 ? Math.sqrt(v) : 0; }
    case "compare": return a()>b() ? 1 : 0;
    case "not":     return a()===0 ? 1 : 0;
    case "arctan":  return Math.atan2(a(), b())*180/Math.PI;
    case "angletopos": { const r=a()*Math.PI/180; return port===0 ? Math.cos(r) : Math.sin(r); }
    case "random":  return node.rnd||0;
    case "int":     return Math.floor(a());
    // 応用計算系（水色）
    case "trigger": return node.pulse||0;
    case "counter": return node.cnt||0;
    case "var":     return node.store||0;
    case "array":   { const arr=node.arr||[]; return arr[Math.floor(a())]||0; }
    case "getpos":  { const t=nodeById(node.target); if(!t) return 0; return port===0 ? (t.playX||0) : (t.playY||0); }
    case "getrot":  { const t=nodeById(node.target); return t ? (t.playAngle!=null?t.playAngle:(t.angle||0)) : 0; }
    // その他（黄）
    case "velocity":{ return port===0 ? (node._ovx||0) : (node._ovy||0); }
    case "contact": { const p=nodeById(node.parentNodeId); if(!p||destroyed.has(p.id)) return 0;
      for(const o of nodes){ if(o.id===p.id||destroyed.has(o.id)) continue; if(!NODE_TYPES[o.type].object) continue;
        if(node.withTag && (o.tag||"")!==node.withTag) continue;
        if(overlapAABB(p,o)) return 1; } return 0; }
    case "onbreak": return node.pulseBrk||0;
  }
  return 0;
}

function startPlay(){
  if(mode==="edit"||mode==="layout") editModeMemory=mode;
  mode="play";
  // レイアウトで置いた位置から開始 & 状態ノードをリセット
  nodes.forEach(n=>{
    if(isStage(n)){ n.playX=n.layoutX||0; n.playY=n.layoutY||0; n.vy=0; n.grounded=false;
      n.playAngle=n.angle||0; n._lastX=n.playX; n._lastY=n.playY; n._vx=0; n._vy=0; n._rawvx=0; n._rawvy=0; n._face=1; }
    if(n.type==="velocity"){ n._ovx=0; n._ovy=0; }
    if(n.type==="stick"){ n.stickX=0; n.stickY=0; n.stickPid=null; }
    if(n.type==="button"){ n.pressed=0; n.btnPid=null; n.toggleState=false; n.pulseOut=0; n._prev=0; }
    if(n.type==="shot"){ n._prevFire=0; }
    if(n.type==="sound"){ n._prevPlay=0; }
    if(n.type==="onbreak"){ n.pulseBrk=0; }
    if(n.type==="counter") n.cnt=0;
    if(n.type==="var") n.store=0;
    if(n.type==="array") n.arr=[];
    if(n.type==="trigger"){ n._prevSig=0; n._delay=-1; n.pulse=0; }
    if(n.type==="random") n.rnd=0;
  });
  bullets=[]; playCam={x:0,y:0}; destroyed=new Set(); brokenThisFrame=new Set();
  touchX=0; touchY=0; touchDown=0;
  try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==="suspended") _audioCtx.resume(); }catch(e){} // 実機の音声許可
  // 親子ローカル座標を確定（Play中の追従に使用）
  nodes.forEach(n=>{ if(isStage(n)&&n.parentNodeId&&nodeById(n.parentNodeId)) recomputeLocal(n); });
  document.getElementById("pad").style.display="none"; // D-PADは表示しない（STICK/BUTTONノードで操作）
  const ph=document.getElementById("hint"); ph.textContent="矢印 / WASD で移動"; ph.classList.remove("hidden");
  document.getElementById("menuBtn").style.display="none"; // Play中はMENU非表示
  const b=document.getElementById("playBtn"); b.textContent="■"; b.style.background="#a12b2b";
}
function stopPlay(){
  mode=editModeMemory; axisX=axisY=0; keys={};
  document.getElementById("pad").style.display="none";
  document.getElementById("menuBtn").style.display="flex";
  const h=document.getElementById("hint");
  if(mode==="layout"){ h.textContent="オブジェクトをドラッグして配置"; h.classList.remove("hidden"); }

function setMode(m){ // edit ⇄ layout 切り替え

let lastT=0;
const GRAV=2200, JUMP=880; // 重力(px/s^2) と ジャンプ初速(px/s)
function objHalf(n){ return { hw:(n.w||80)/2, hh:(n.h||80)/2 }; }
function overlapAABB(a,b){ const A=objHalf(a),B=objHalf(b);
  return Math.abs(a.playX-b.playX) < A.hw+B.hw && Math.abs(a.playY-b.playY) < A.hh+B.hh; }
// 状態を持つノード（応用計算系）の毎フレーム更新
function updateStatefulNodes(){
  for(const n of nodes){
    switch(n.type){
      case "random": n.rnd = Math.random()*2-1; break;
      case "button": {
        const bk=n.keyCode||(n.useKey?" ":"");
        const phys = (n.pressed?1:0) || (bk && heldKeys.has(bk) ? 1:0);
        if(n.output==="toggle"){ if(!n._prev && phys) n.toggleState=!n.toggleState; }
        else if(n.output==="pulse"){ n.pulseOut = (!n._prev && phys)?1:0; }
        n._prev=phys; break; }
      case "counter": { if(inputValue(n,1)!==0) n.cnt=0; else n.cnt=(n.cnt||0)+inputValue(n,0); break; }
      case "var": { if(inputValue(n,1)!==0) n.store=inputValue(n,0); break; }
      case "trigger": {
        const sig=inputValue(n,0); const F=Math.max(0,Math.round(inputValue(n,1)));
        if((n._prevSig||0)===0 && sig!==0) n._delay=F; // 立ち上がりで予約
        n._prevSig=sig; n.pulse=0;
        if(n._delay!=null && n._delay>=0){ if(n._delay===0){ n.pulse=1; n._delay=-1; } else n._delay--; }
        break; }
      case "array": {
        if(!n.arr) n.arr=[];
        if(inputValue(n,2)!==0){ const i=Math.floor(inputValue(n,0)); if(i>=0&&i<100000) n.arr[i]=inputValue(n,1); }
        break; }
    }
  }
}
function playStep(dt){
  // KEY軸を確定（キーボード＋オンスクリーン）
  axisX = (keys.R||pad.R?1:0) - (keys.L||pad.L?1:0);
  axisY = (keys.D||pad.D?1:0) - (keys.U||pad.U?1:0);
  updateStatefulNodes();
  const settingNode = nodes.find(n=>n.type==="setting");
  const G = settingNode ? (settingNode.gravity||GRAV) : GRAV;   // SETTINGで重力変更
  const objs = nodes.filter(n=>NODE_TYPES[n.type].object);

  // ROTATE：角速度で自身のplayAngleを回す（子が追従する）
  for(const n of nodes){ if(n.type==="rotate") n.playAngle=(n.playAngle||0)+inputValue(n,0)*dt; }
  // SOUND：play入力の立ち上がりでビープ
  for(const n of nodes){ if(n.type==="sound"){ const s=inputValue(n,0);
    if(!n._prevPlay && s) beep(n.pitch||440, n.wave||"square"); n._prevPlay=s; } }

  const live = objs.filter(n=>!destroyed.has(n.id));
  // 1) 重力なし（＝足場/静的コライダ）を先に更新
  const statics = live.filter(n=>!n.dyn);
  for(const n of statics){
    n.playX += inputValue(n,0)*dt;   // 速度入力があれば動く足場になる（無ければ静止）
    n.playY += inputValue(n,1)*dt;
  }

  // 2) 重力あり（プレイヤー等）を更新し、静的コライダと衝突解決
  for(const n of live){
    if(!n.dyn) continue;
    const { hw, hh } = objHalf(n); const bounce=n.bounce||0, fric=n.friction||0;
    n.vx = inputValue(n,0);
    const vyIn = inputValue(n,1);
    if(vyIn < -1 && n.grounded){ n.vy = -JUMP; n.grounded=false; } // 上入力でジャンプ

    // 横移動 → 足場で左右をブロック
    n.playX += n.vx*dt;
    for(const s of statics){ if(overlapAABB(n,s)){ const S=objHalf(s);
      if(n.vx>0) n.playX = s.playX-(S.hw+hw);
      else if(n.vx<0) n.playX = s.playX+(S.hw+hw); } }

    // 縦移動（重力）→ 足場に着地／頭ぶつけ（反発・摩擦）
    n.vy = (n.vy||0) + G*dt;
    n.playY += n.vy*dt;
    n.grounded=false;
    for(const s of statics){ if(overlapAABB(n,s)){ const S=objHalf(s);
      if(n.vy>0){ n.playY = s.playY-(S.hh+hh); n.vy = -n.vy*bounce; if(Math.abs(n.vy)<40){n.vy=0; n.grounded=true;} }
      else if(n.vy<0){ n.playY = s.playY+(S.hh+hh); n.vy=0; } } }

    // 摩擦（接地時、速度入力が無ければ徐々に停止）
    if(n.grounded && fric>0 && !conns.some(c=>c.b===n.id&&c.bi===0)) n.vx*=(1-Math.min(1,fric));
    // 床・壁は自動生成しない（オブジェクトは限界まで落下・移動可能）
    // 向き（左右反転）
    if(n.flip){ if(n.vx>5) n._face=1; else if(n.vx<-5) n._face=-1; }
  }

  // 3) 親子構造：子は親の移動に追従（親→子の順で解決）
  applyHierarchy();

  // 4) SHOT：fire入力の立ち上がりで弾を発射（角度方向へ）
  for(const n of nodes){ if(n.type!=="shot"||destroyed.has(n.id)) continue;
    const fire=inputValue(n,0); const spd=conns.some(c=>c.b===n.id&&c.bi===1)?inputValue(n,1):(n.bulletSpd||400);
    if(!n._prevFire && fire){ const a=((n.playAngle!=null?n.playAngle:n.angle)-90)*Math.PI/180;
      bullets.push({ x:n.playX, y:n.playY, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:3,
        tag:n.destroyTag||"", size:n.bulletSize||14, color:n.bulletColor||"#ffe08a" }); }
    n._prevFire=fire;
  }
  brokenThisFrame=new Set();
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    let hitObj=false;
    if(b.tag){ // タグ一致オブジェクトを破壊
      for(const o of live){ if(destroyed.has(o.id)) continue; if((o.tag||"")!==b.tag) continue;
        if(Math.abs(b.x-o.playX)<objHalf(o).hw && Math.abs(b.y-o.playY)<objHalf(o).hh){
          destroyed.add(o.id); brokenThisFrame.add(o.id); hitObj=true; break; } }
    }
    if(hitObj || b.life<=0 || Math.abs(b.x)>W || Math.abs(b.y)>H) bullets.splice(i,1);
  }
  // ONBREAK：親が今フレーム破壊されたらパルス
  for(const n of nodes){ if(n.type==="onbreak") n.pulseBrk = brokenThisFrame.has(n.parentNodeId)?1:0; }

  // 5) VELOCITY計測（瞬間速度＋ノードごとにframesで平滑化）
  for(const n of objs){ n._rawvx=(n.playX-(n._lastX||n.playX))/Math.max(dt,1e-4); n._rawvy=(n.playY-(n._lastY||n.playY))/Math.max(dt,1e-4);
    n._lastX=n.playX; n._lastY=n.playY; }
  for(const n of nodes){ if(n.type!=="velocity") continue; const t=nodeById(n.target); if(!t) continue;
    const f=Math.max(1,n.frames||5); n._ovx=(n._ovx||0)+((t._rawvx||0)-(n._ovx||0))/f; n._ovy=(n._ovy||0)+((t._rawvy||0)-(n._ovy||0))/f; }

  // 6) SCREEN：対象を画面中央に追従するカメラ
  const scr = nodes.find(n=>n.type==="screen" && nodeById(n.target));
  if(scr){ const t=nodeById(scr.target); playCam.x=-(t.playX||0); playCam.y=-(t.playY||0); }
  else { playCam.x=0; playCam.y=0; }
}
// 簡易ビープ（WebAudio）
let _audioCtx=null;
function beep(freq,wave){
  try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
    o.frequency.value=freq; o.type=wave||"square"; g.gain.value=0.05;
    o.connect(g); g.connect(_audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, _audioCtx.currentTime+0.15); o.stop(_audioCtx.currentTime+0.16);
  }catch(e){}
}
function stageDepth(n){ let d=0,cur=n,g=0; while(cur.parentNodeId){ const p=nodeById(cur.parentNodeId); if(!p||g++>50)break; d++; cur=p; } return d; }
// 子の「親ローカル座標（位置lx,ly・角度la）」を現在のレイアウトから計算・保持
function recomputeLocal(c){ const p=nodeById(c.parentNodeId); if(!p) return;
  const a=-(p.angle||0)*Math.PI/180, dx=(c.layoutX||0)-(p.layoutX||0), dy=(c.layoutY||0)-(p.layoutY||0);
  c.lx=dx*Math.cos(a)-dy*Math.sin(a); c.ly=dx*Math.sin(a)+dy*Math.cos(a); c.la=(c.angle||0)-(p.angle||0);
}
// 親ローカル→レイアウト絶対（親の回転・移動を反映）
function worldFromParent(c){ const p=nodeById(c.parentNodeId); if(!p) return;
  const a=(p.angle||0)*Math.PI/180, lx=c.lx||0, ly=c.ly||0;
  c.layoutX=(p.layoutX||0)+lx*Math.cos(a)-ly*Math.sin(a);
  c.layoutY=(p.layoutY||0)+lx*Math.sin(a)+ly*Math.cos(a);
  c.angle=(p.angle||0)+(c.la||0);
}
function directChildren(p){ return nodes.filter(c=>isStage(c)&&c.parentNodeId===p.id); }
function updateSubtreeWorld(p){ for(const c of directChildren(p)){ worldFromParent(c); updateSubtreeWorld(c); } }
// Play中：親のplay変換（移動＋回転）で子のplay位置を決める
function applyHierarchy(){
  const kids = nodes.filter(n=>isStage(n) && n.parentNodeId && nodeById(n.parentNodeId));
  kids.sort((a,b)=>stageDepth(a)-stageDepth(b));
  for(const n of kids){ const p=nodeById(n.parentNodeId);
    const pa=(p.playAngle!=null?p.playAngle:(p.angle||0));  // 親の現在角度で回転追従
    const a=pa*Math.PI/180, lx=n.lx||0, ly=n.ly||0;
    n.playX = p.playX + lx*Math.cos(a)-ly*Math.sin(a);
    n.playY = p.playY + lx*Math.sin(a)+ly*Math.cos(a);
    n.playAngle = pa + (n.la||0);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(mode==="edit"){ drawGrid(); drawWires(); drawParentWires(); nodes.forEach(drawNode); drawDragWire(); drawSelBox(); }
  else if(mode==="layout") drawLayout();
  else if(mode==="texedit") drawTexEditor();
  else drawPlay();
}

// ---- 親子接続（ノード上端＝子側 / 下端＝親側）----
const PARENT_COL="#7fe0a0";
function canHaveParent(n){ return isStage(n) || attachesToObject(n); }
function parentPortPos(n){ return w2s(n.x, n.y - NS/2); } // 上：自分の親へつなぐ端子
function childPortPos(n){  return w2s(n.x, n.y + NS/2); } // 下：子を受け入れる端子
function isCandidateParent(child,p){
  if(!child||!p||p.id===child.id) return false;
  if(attachesToObject(child)) return !!NODE_TYPES[p.type].object; // TEXTURE/CONTACT/ONBREAKはオブジェクトへ
  if(isStage(child)){ if(!isStage(p)) return false;
    let cur=p,g=0; while(cur){ if(cur.id===child.id) return false; cur=nodeById(cur.parentNodeId); if(g++>60)break; } return true; }
  return false;
}
function drawWireV(p1,p2,color){ const dy=Math.abs(p2.y-p1.y)*0.5+20;
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,3*view.s);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.bezierCurveTo(p1.x,p1.y+dy, p2.x,p2.y-dy, p2.x,p2.y); ctx.stroke(); }
function drawParentWires(){
  for(const n of nodes){ if(!n.parentNodeId) continue; const p=nodeById(n.parentNodeId); if(!p) continue;
    drawWireV(childPortPos(p), parentPortPos(n), PARENT_COL); }
}

function drawGrid(){
  ctx.fillStyle="#12141a"; ctx.fillRect(0,0,W,H);
  const step=40*view.s; if(step<8) return;
  const ox=((W/2 - view.x*view.s)%step+step)%step;
  const oy=((H/2 - view.y*view.s)%step+step)%step;
  ctx.strokeStyle="#1c2029"; ctx.lineWidth=1; ctx.beginPath();
  for(let x=ox;x<W;x+=step){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=oy;y<H;y+=step){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
}

function drawWire(p1,p2,color){
  const dx=Math.abs(p2.x-p1.x)*0.5+20;
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,3*view.s);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y);
  ctx.bezierCurveTo(p1.x+dx,p1.y, p2.x-dx,p2.y, p2.x,p2.y); ctx.stroke();
}
function drawWires(){
  for(const c of conns){
    const a=nodeById(c.a), b=nodeById(c.b); if(!a||!b) continue;
    drawWire(portPos(a,false,c.ao), portPos(b,true,c.bi), "#7c8598");
  }
}
function drawSelBox(){
  if(!drag || (drag.kind!=="selbox" && drag.kind!=="selboxL")) return;
  const x=Math.min(drag.x0,drag.x1), y=Math.min(drag.y0,drag.y1), w=Math.abs(drag.x1-drag.x0), h=Math.abs(drag.y1-drag.y0);
  ctx.fillStyle="rgba(0,180,255,.15)"; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle="#21b3d6"; ctx.lineWidth=2; ctx.setLineDash([6,4]); ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
}
function drawDragWire(){
  if(!drag) return;
  if(drag.kind==="wire"){
    const a=nodeById(drag.node);
    drawWire(portPos(a,false,drag.port), {x:drag.sx,y:drag.sy}, "#ffcc00");
  } else if(drag.kind==="parentwire"){
    const c=nodeById(drag.node);
    // カーソル（未来の親の下端）から下向きに出て、子の上端へ上から入る（確定ワイヤーと同じ向き）
    drawWireV({x:drag.sx,y:drag.sy}, parentPortPos(c), PARENT_COL);
  }
}

function drawNode(n){
  const d=NODE_TYPES[n.type];
  const tl=w2s(n.x-NS/2, n.y-NS/2);
  const w=NS*view.s, hh=NS*view.s;
  // 端子（丸のみ）を本体より先に描画＝見た目はノードの後ろ（当たり判定は不変）
  d.inputs.forEach((_,i)=> port(portPos(n,true,i),  "#ffffff"));
  d.outputs.forEach((_,i)=>port(portPos(n,false,i), "#ffe08a"));
  // 親子端子：上＝自分の親へつなぐ（子を持てるノード全て）／下＝子を受け入れる
  if(canHaveParent(n)) port(parentPortPos(n), PARENT_COL);
  const parentDrag = drag && drag.kind==="parentwire";
  const isCand = parentDrag && isCandidateParent(nodeById(drag.node), n);
  if(nodes.some(m=>m.parentNodeId===n.id) || isCand) port(childPortPos(n), isCand ? "#ffffff" : PARENT_COL);
  // 本体（正方形。オブジェクトはそのオブジェクト色、他はカテゴリ色で全面塗り）
  roundRect(tl.x,tl.y,w,hh,16*view.s);
  ctx.fillStyle = d.object ? n.color : d.color; ctx.fill();
  const sel = (selected===n.id) || multiSel.has(n.id);
  ctx.strokeStyle = sel?"#ffffff":"rgba(0,0,0,.4)";
  ctx.lineWidth=sel?3:1.5; ctx.stroke();
  // 中央のシンボル（1〜3文字）をノードいっぱいに
  const g=nodeGlyph(n);
  const cx=tl.x+w/2, cy=tl.y+hh/2;
  ctx.font=`800 ${Math.round(glyphFontSize(g)*view.s)}px sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillText(g, cx+1.5, cy+1.5);
  ctx.fillStyle="#ffffff";        ctx.fillText(g, cx, cy);
  // 選択中は端子ラベルをノードの外側に表示
  if(selected===n.id){
    ctx.font=`${Math.round(48*view.s)}px sans-serif`; // 端子ラベル3倍（太字にしない）
    ctx.textBaseline="middle";
    const gap=(PORT_R+12)*view.s;
    d.inputs.forEach((lab,i)=>{ const p=portPos(n,true,i); ctx.textAlign="right"; portLabel(lab, p.x-gap, p.y); });
    d.outputs.forEach((lab,i)=>{ const p=portPos(n,false,i); ctx.textAlign="left"; portLabel(lab, p.x+gap, p.y); });
  }
}
function portLabel(txt,x,y){
  ctx.fillStyle="rgba(0,0,0,.75)"; ctx.fillText(txt, x+1, y+1);
  ctx.fillStyle="#ffffff";         ctx.fillText(txt, x, y);
}
function port(p,ring){ ctx.beginPath(); ctx.arc(p.x,p.y,PORT_R*view.s,0,7);
  ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fill(); ctx.lineWidth=2.5*view.s; ctx.strokeStyle=ring; ctx.stroke(); }
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function roundRectTop(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// オブジェクトに付いた表示中テクスチャを取得（Visible入力が0なら非表示）
function objVisibleTexture(obj){
  const texes = nodes.filter(m=>m.type==="texture" && m.parentNodeId===obj.id);
  for(const t of texes){
    const vis = conns.some(c=>c.b===t.id && c.bi===0) ? (inputValue(t,0)!==0) : true;
    if(vis) return t;
  }
  return null;
}
function drawTexInto(t,w,h,circle){
  const N=t.texW||16, cw=w/N, ch=h/N;
  if(circle){ ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,w/2,h/2,0,0,7); ctx.clip(); }
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){ const col=t.pixels[y*N+x]; if(!col) continue;
    ctx.fillStyle=col; ctx.fillRect(-w/2+x*cw, -h/2+y*ch, cw+0.6, ch+0.6); }
  if(circle) ctx.restore();
}
// オブジェクトを回転付きで描画（テクスチャがあればそれ、無ければ単色）
function drawObjShape(cx,cy,n,ang){
  const d=NODE_TYPES[n.type], w=n.w||80, h=n.h||80;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate((ang!=null?ang:(n.angle||0))*Math.PI/180);
  if(n.flip && n._face===-1) ctx.scale(-1,1); // 左向き反転
  const tex=objVisibleTexture(n);
  if(tex){ drawTexInto(tex, w, h, d.object==="circle"); }
  else {
    ctx.fillStyle=n.color;
    if(d.object==="circle"){ ctx.beginPath(); ctx.ellipse(0,0,w/2,h/2,0,0,7); ctx.fill(); }
    else ctx.fillRect(-w/2,-h/2,w,h);
  }
  ctx.restore();
}
// オブジェクト中心（画面座標・レイアウトビュー反映）
function objCenter(n){ return stageToScreenLayout(n.layoutX||0, n.layoutY||0); }
// ローカル(ステージ単位)→画面
function objFromLocal(n,lx,ly){ const a=(n.angle||0)*Math.PI/180;
  const wx=(n.layoutX||0)+lx*Math.cos(a)-ly*Math.sin(a), wy=(n.layoutY||0)+lx*Math.sin(a)+ly*Math.cos(a);
  return stageToScreenLayout(wx,wy); }
// 画面→ローカル(ステージ単位・回転考慮)
function objToLocal(n,sx,sy){ const p=screenToStageLayout(sx,sy), a=-(n.angle||0)*Math.PI/180;
  const dx=p.x-(n.layoutX||0), dy=p.y-(n.layoutY||0);
  return { x:dx*Math.cos(a)-dy*Math.sin(a), y:dx*Math.sin(a)+dy*Math.cos(a) }; }

// ステージ要素（オブジェクト/テキスト/スティック/ボタン/SHOT/ROTATE）を描画
function drawStage(cx,cy,n,ang){
  const d=NODE_TYPES[n.type];
  if(d.object){ drawObjShape(cx,cy,n,ang); return; }
  const w=n.w||140, h=n.h||140;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate((ang!=null?ang:(n.angle||0))*Math.PI/180);
  if(d.stage==="text"){
    let txt = n.text||"";
    if(conns.some(c=>c.b===n.id && c.bi===0)) txt = String(Math.round(inputValue(n,0)*100)/100); // val接続時は数値表示
    ctx.font=`800 ${(n.fontSize||40)}px sans-serif`; ctx.textAlign=n.align||"center"; ctx.textBaseline="middle";
    const ax = n.align==="left"?-(n.w||240)/2+8 : n.align==="right"?(n.w||240)/2-8 : 0;
    ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillText(txt, ax+2, 2);
    ctx.fillStyle=n.textColor||"#ffffff"; ctx.fillText(txt, ax, 0);
  } else if(d.stage==="stick"){
    const R=Math.min(w,h)/2; const col=n.color||"#e0892b"; const fill=(n.style||"frame")==="fill";
    ctx.beginPath(); ctx.arc(0,0,R,0,7);
    ctx.globalAlpha=fill?0.55:0.18; ctx.fillStyle=col; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
    const kx=(n.stickX||0)*R*0.55, ky=(n.stickY||0)*R*0.55;
    ctx.beginPath(); ctx.arc(kx,ky,R*0.4,0,7); ctx.globalAlpha=0.85; ctx.fillStyle=col; ctx.fill(); ctx.globalAlpha=1;
  } else if(d.stage==="button"){
    const col=n.color||"#e0892b"; const fill=(n.style||"frame")==="fill";
    roundRect(-w/2,-h/2,w,h,14);
    ctx.globalAlpha = n.pressed ? 0.9 : (fill?0.6:0.32); ctx.fillStyle=col; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
  } else if(d.stage==="shot"){ // 発射口（三角）
    ctx.fillStyle=n.color; ctx.beginPath(); ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2); ctx.lineTo(-w/2,h/2); ctx.closePath(); ctx.fill();
  } else if(d.stage==="rotate"){ // 回転ピボット（Play中は非表示）
    if(mode!=="play"){ const R=Math.min(w,h)/2; ctx.strokeStyle=n.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-R,0); ctx.lineTo(R,0); ctx.moveTo(0,-R); ctx.lineTo(0,R); ctx.stroke(); }
  }
  ctx.restore();
}

function drawLayout(){
  // 外側（Play表示領域の外）
  ctx.fillStyle="#0a0b10"; ctx.fillRect(0,0,W,H);
  const S=layoutView.s;
  ctx.save();
  ctx.translate(W/2,H/2); ctx.scale(S,S); ctx.translate(-layoutView.x,-layoutView.y);
  // Play表示領域（画面サイズ相当）を暗いグレーで（Unity版と同じ）
  ctx.fillStyle="#20232b"; ctx.fillRect(-W/2,-H/2,W,H);
  ctx.strokeStyle="#3a4150"; ctx.lineWidth=2/S; ctx.strokeRect(-W/2,-H/2,W,H);
  // 中央十字ガイド
  ctx.strokeStyle="#2a313d"; ctx.lineWidth=1/S;
  ctx.beginPath(); ctx.moveTo(0,-H/2); ctx.lineTo(0,H/2); ctx.moveTo(-W/2,0); ctx.lineTo(W/2,0); ctx.stroke();
  // ステージ要素（ステージ座標で描画）
  for(const n of nodes){ if(!isStage(n)) continue; drawStage(n.layoutX||0, n.layoutY||0, n); }
  ctx.restore();
  // 複数選択のアウトライン＆ハンドル（スクリーン空間）
  for(const n of nodes){ if(!isStage(n)) continue;
    if(multiSel.has(n.id) && selected!==n.id){
      const hw=(n.w||80)/2*layoutView.s, hh=(n.h||80)/2*layoutView.s;
      ctx.save(); ctx.translate(objCenter(n).x,objCenter(n).y); ctx.rotate((n.angle||0)*Math.PI/180);
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=2; ctx.strokeRect(-hw,-hh,hw*2,hh*2); ctx.restore();
    }
    if(selected===n.id) drawHandles(n);
  }
  drawSelBox();
  if(!nodes.some(isStage)){
    ctx.fillStyle="#5a6270"; ctx.font="20px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("画面長押しでノードを選択してください", W/2, H/2-40);
  }
}
// 選択オブジェクトのハンドル（四隅=リサイズ、上=回転）
const HANDLE_R=15;
function handlePositions(n){
  const hw=(n.w||80)/2, hh=(n.h||80)/2;
  const a=(n.angle||0)*Math.PI/180, c=objCenter(n), d=hh*layoutView.s+40;
  return {
    corners:[ objFromLocal(n,-hw,-hh), objFromLocal(n,hw,-hh), objFromLocal(n,-hw,hh), objFromLocal(n,hw,hh) ],
    rot: { x:c.x + d*Math.sin(a), y:c.y - d*Math.cos(a) }
  };
}
function drawHandles(n){
  const hp=handlePositions(n);
  const hw=(n.w||80)/2*layoutView.s, hh=(n.h||80)/2*layoutView.s;
  ctx.save(); ctx.translate(objCenter(n).x,objCenter(n).y); ctx.rotate((n.angle||0)*Math.PI/180);
  ctx.strokeStyle="#7fdcff"; ctx.lineWidth=2; ctx.strokeRect(-hw,-hh,hw*2,hh*2);
  ctx.beginPath(); ctx.moveTo(0,-hh); ctx.lineTo(0,-hh-40); ctx.stroke(); // 回転レバー
  ctx.restore();
  ctx.fillStyle="#ffffff"; ctx.strokeStyle="#21b3d6"; ctx.lineWidth=2;
  for(const c of hp.corners){ ctx.beginPath(); ctx.rect(c.x-HANDLE_R,c.y-HANDLE_R,HANDLE_R*2,HANDLE_R*2); ctx.fill(); ctx.stroke(); }
  ctx.beginPath(); ctx.arc(hp.rot.x,hp.rot.y,HANDLE_R,0,7); ctx.fillStyle="#7fdcff"; ctx.fill(); ctx.stroke();
}

function drawPlay(){
  // 背景（BGノードがあればその色）
  const bgNode = nodes.find(n=>n.type==="bg");
  ctx.fillStyle = bgNode ? (bgNode.color||"#0a0b10") : "#0a0b10"; ctx.fillRect(0,0,W,H);
  const camX=playCam.x, camY=playCam.y;
  // 床は自動描画しない（足場は静的オブジェクトで作る）
  // ステージ要素（SORTLAYER順、破壊済みは非表示、操作UIは画面固定）
  const uiTypes = new Set(["stick","button"]);
  const drawList = nodes.filter(n=>isStage(n) && !destroyed.has(n.id)
    && !((n.type==="stick"||n.type==="button") && uiCtrlHidden(n)));
  drawList.sort((a,b)=>(a.layer||50)-(b.layer||50));
  for(const n of drawList){
    const fixed = uiTypes.has(n.type);
    const ox = fixed ? 0 : camX, oy = fixed ? 0 : camY;
    drawStage(W/2+n.playX+ox, H/2+n.playY+oy, n, (n.playAngle!=null?n.playAngle:n.angle));
  }
  // 弾（カメラ追従）
  for(const b of bullets){ ctx.fillStyle=b.color||"#ffe08a";
    ctx.beginPath(); ctx.arc(W/2+b.x+camX, H/2+b.y+camY, (b.size||14)/2, 0, 7); ctx.fill(); }
  // 画面向き警告（SETTINGでYOKO/TATE指定時）
  const setN=nodes.find(n=>n.type==="setting");
  if(setN){ const wantTate=setN.orient==="tate", isLandscape=W>H;
    if((wantTate&&isLandscape)||(!wantTate&&!isLandscape)){
      ctx.fillStyle="rgba(0,0,0,.8)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#fff"; ctx.font="800 26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(wantTate?"画面を縦にしてください":"画面を横にしてください", W/2, H/2);
    }
  }
}

// =====================================================================
//  入力（ポインタ）
// =====================================================================
let drag=null;       // {kind:'node'|'pan'|'wire', ...}
let selected=null;
let multiSel=new Set();   // 矩形選択された複数ノード（Editor）
let lastBgDown=0, lastBgPos={x:0,y:0};
let pointerMoved=false;

function hitPort(sx,sy){
  const R = PORT_R*view.s + 18; // 指でも押しやすい判定
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; const d=NODE_TYPES[n.type];
    for(let j=0;j<d.outputs.length;j++){ const p=portPos(n,false,j);
      if(Math.hypot(sx-p.x,sy-p.y)<R) return {node:n.id,isInput:false,port:j}; }
    for(let j=0;j<d.inputs.length;j++){ const p=portPos(n,true,j);
      if(Math.hypot(sx-p.x,sy-p.y)<R) return {node:n.id,isInput:true,port:j}; }
  }
  return null;
}
function hitNode(sx,sy){
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i];
    const tl=w2s(n.x-NS/2,n.y-NS/2), w=NS*view.s, hh=NS*view.s;
    if(sx>=tl.x&&sx<=tl.x+w&&sy>=tl.y&&sy<=tl.y+hh){
      return {node:n.id};
    }
  }
  return null;
}
// 上端の親端子（子側）をヒット
function hitParentPort(sx,sy){
  const R=PORT_R*view.s+18;
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; if(!canHaveParent(n)) continue;
    const tp=parentPortPos(n); if(Math.hypot(sx-tp.x,sy-tp.y)<R) return n; }
  return null;
}

let lpTimer=null, lpX=0, lpY=0;
function cancelLongPress(){ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } }

// レイアウト画面：オブジェクトの当たり判定（回転考慮）
function hitLayoutObject(sx,sy){
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i];
    if(!isStage(n)) continue;
    const l=objToLocal(n,sx,sy);
    if(Math.abs(l.x)<=(n.w||80)/2 && Math.abs(l.y)<=(n.h||80)/2) return n;
  }
  return null;
}
// 選択オブジェクトのハンドル判定
function hitHandle(sx,sy){
  if(selected==null) return null;
  const n=nodeById(selected); if(!n || !isStage(n)) return null;
  const hp=handlePositions(n);
  if(Math.hypot(sx-hp.rot.x,sy-hp.rot.y)<HANDLE_R+8) return {kind:"rotate"};
  for(const c of hp.corners){ if(Math.hypot(sx-c.x,sy-c.y)<HANDLE_R+8) return {kind:"resize"}; }
  return null;
}
function onDown(sx,sy){
  if(mode==="layout"){
    if(isMultiMenuOpen()){ hideMultiMenu(); drag=null; return; }
    const hd=hitHandle(sx,sy);
    if(hd){ recordUndo(); drag={kind:hd.kind, node:selected}; return; }
    const n=hitLayoutObject(sx,sy);
    if(n){
      if(multiSel.has(n.id)){ // 複数選択をまとめて移動＋長押しメニュー
        recordUndo();
        const p=screenToStageLayout(sx,sy);
        drag={kind:"layoutgroup", items:[...multiSel].map(id=>{const nn=nodeById(id); return {id, dx:(nn.layoutX||0)-p.x, dy:(nn.layoutY||0)-p.y};})};
        lpX=sx; lpY=sy; cancelLongPress();
        lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showMultiMenu(lpX,lpY); }, 450);
        return;
      }
      recordUndo();
      multiSel.clear();
      selected=n.id;
      const p=screenToStageLayout(sx,sy);
      drag={kind:"layout", node:n.id, dx:(n.layoutX||0)-p.x, dy:(n.layoutY||0)-p.y};
      lpX=sx; lpY=sy; cancelLongPress();
      const nid=n.id; lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; openProp(nid); }, 450);
    } else {
      // 背景：ダブルクリックからドラッグ＝矩形選択、そうでなければパン
      const now=performance.now();
      const isDbl=(now-lastBgDown<350)&&Math.hypot(sx-lastBgPos.x,sy-lastBgPos.y)<30;
      lastBgDown=now; lastBgPos={x:sx,y:sy};
      selected=null; propNode=null; refreshProp();
      if(isDbl){ multiSel.clear(); cancelLongPress(); drag={kind:"selboxL", x0:sx,y0:sy,x1:sx,y1:sy}; return; }
      multiSel.clear();
      drag={kind:"layoutpan", sx, sy, vx:layoutView.x, vy:layoutView.y}; // 背景ドラッグでビュー移動
    }
    return;
  }
  if(mode!=="edit") return;
  // メニューが開いていれば閉じるだけ
  if(isCreateMenuOpen()){ hideCreateMenu(); drag=null; return; }
  if(isMultiMenuOpen()){ hideMultiMenu(); drag=null; return; }
  pointerMoved=false;
  // 上端の親端子からドラッグ → 親子接続
  const pp=hitParentPort(sx,sy);
  if(pp){ drag={kind:"parentwire", node:pp.id, sx, sy}; return; }
  const pt=hitPort(sx,sy);
  if(pt){
    if(pt.isInput){ recordUndo(); disconnectInput(pt.node, pt.port); } // 入力端子タップで切断
    else { drag={kind:"wire", node:pt.node, port:pt.port, sx, sy}; }
    return;
  }
  const hn=hitNode(sx,sy);
  if(hn){
    if(multiSel.has(hn.node)){ // 複数選択をまとめて移動＋長押しメニュー
      recordUndo();
      const wp=s2w(sx,sy);
      drag={kind:"nodegroup", items:[...multiSel].map(id=>{const nn=nodeById(id); return {id, dx:nn.x-wp.x, dy:nn.y-wp.y};})};
      lpX=sx; lpY=sy; cancelLongPress();
      lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showMultiMenu(lpX,lpY); }, 450);
      return;
    }
    recordUndo();
    multiSel.clear();
    selected=hn.node;
    const n=nodeById(hn.node);
    drag={kind:"node", node:hn.node, dx:n.x-s2w(sx,sy).x, dy:n.y-s2w(sx,sy).y};
    // ノード長押し → Property パネルを開く
    lpX=sx; lpY=sy; cancelLongPress();
    const nid=hn.node;
    lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; openProp(nid); }, 450);
    return;
  }
  // 背景：ダブルクリックからのドラッグ＝矩形範囲選択
  const now=performance.now();
  const isDbl=(now-lastBgDown<350)&&Math.hypot(sx-lastBgPos.x,sy-lastBgPos.y)<30;
  lastBgDown=now; lastBgPos={x:sx,y:sy};
  selected=null; propNode=null; refreshProp();
  if(isDbl){ cancelLongPress(); multiSel.clear(); drag={kind:"selbox", x0:sx, y0:sy, x1:sx, y1:sy}; return; }
  multiSel.clear();
  drag={kind:"pan", sx, sy, vx:view.x, vy:view.y};
  // 背景長押し → Create New Node メニュー
  lpX=sx; lpY=sy; cancelLongPress();
  lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showCreateMenu(lpX,lpY); }, 450);
}
function onMove(sx,sy){
  if(lpTimer && Math.hypot(sx-lpX,sy-lpY)>10) cancelLongPress();
  if(!drag) return;
  pointerMoved=true;
  if(drag.kind==="pan"){ view.x=drag.vx-(sx-drag.sx)/view.s; view.y=drag.vy-(sy-drag.sy)/view.s; }
  else if(drag.kind==="node"){ const wp=s2w(sx,sy); const n=nodeById(drag.node); if(n){ n.x=wp.x+drag.dx; n.y=wp.y+drag.dy; } }
  else if(drag.kind==="nodegroup"){ const wp=s2w(sx,sy); for(const it of drag.items){ const n=nodeById(it.id); if(n){ n.x=wp.x+it.dx; n.y=wp.y+it.dy; } } }
  else if(drag.kind==="selbox"){ drag.x1=sx; drag.y1=sy; }
  else if(drag.kind==="layout"){ const n=nodeById(drag.node); if(n){
    const p=screenToStageLayout(sx,sy);
    n.layoutX=p.x+drag.dx; n.layoutY=p.y+drag.dy;
    if(n.parentNodeId) recomputeLocal(n);  // 親に対する相対を更新
    updateSubtreeWorld(n);                 // 子孫を追従
  } }
  else if(drag.kind==="layoutgroup"){ const p=screenToStageLayout(sx,sy);
    for(const it of drag.items){ const n=nodeById(it.id); if(n){ n.layoutX=p.x+it.dx; n.layoutY=p.y+it.dy;
      if(n.parentNodeId) recomputeLocal(n); updateSubtreeWorld(n); } } }
  else if(drag.kind==="selboxL"){ drag.x1=sx; drag.y1=sy; }
  else if(drag.kind==="layoutpan"){ layoutView.x=drag.vx-(sx-drag.sx)/layoutView.s; layoutView.y=drag.vy-(sy-drag.sy)/layoutView.s; }
  else if(drag.kind==="resize"){ const n=nodeById(drag.node); if(n){ const l=objToLocal(n,sx,sy);
    n.w=Math.max(16,Math.round(Math.abs(l.x)*2)); n.h=Math.max(16,Math.round(Math.abs(l.y)*2)); } }
  else if(drag.kind==="rotate"){ const n=nodeById(drag.node); if(n){ const c=objCenter(n);
    const raw=Math.atan2(sy-c.y,sx-c.x)*180/Math.PI + 90;
    n.angle=Math.round(raw/5)*5;           // 5度刻み
    if(n.parentNodeId) recomputeLocal(n);  // 自分の角度が変わったら相対角度を更新
    updateSubtreeWorld(n);                 // 子を親座標系で回転・移動
  } }
  else if(drag.kind==="wire"){ drag.sx=sx; drag.sy=sy; }
  else if(drag.kind==="parentwire"){ drag.sx=sx; drag.sy=sy; }
}
function onUp(sx,sy){
  cancelLongPress();
  if(drag && drag.kind==="wire"){
    const pt=hitPort(sx,sy);
    if(pt && pt.isInput){ recordUndo(); connect(drag.node, drag.port, pt.node, pt.port); }
  }
  if(drag && drag.kind==="parentwire"){
    recordUndo();
    const child=nodeById(drag.node);
    let target=null;
    for(let i=nodes.length-1;i>=0;i--){ const p=nodes[i]; if(!isCandidateParent(child,p)) continue;
      const bp=childPortPos(p); const nearPort=Math.hypot(sx-bp.x,sy-bp.y)<PORT_R*view.s+24;
      const tl=w2s(p.x-NS/2,p.y-NS/2), w=NS*view.s;
      const inBody = sx>=tl.x&&sx<=tl.x+w&&sy>=tl.y&&sy<=tl.y+w;
      if(nearPort||inBody){ target=p; break; } }
    if(child){ child.parentNodeId = target ? target.id : null; if(target) recomputeLocal(child); } // 空きで離すと解除
  }
  if(drag && drag.kind==="selbox"){
    const x0=Math.min(drag.x0,drag.x1), x1=Math.max(drag.x0,drag.x1);
    const y0=Math.min(drag.y0,drag.y1), y1=Math.max(drag.y0,drag.y1);
    multiSel.clear();
    for(const n of nodes){ const p=w2s(n.x,n.y); if(p.x>=x0&&p.x<=x1&&p.y>=y0&&p.y<=y1) multiSel.add(n.id); }
  }
  if(drag && drag.kind==="selboxL"){
    const x0=Math.min(drag.x0,drag.x1), x1=Math.max(drag.x0,drag.x1);
    const y0=Math.min(drag.y0,drag.y1), y1=Math.max(drag.y0,drag.y1);
    multiSel.clear();
    for(const n of nodes){ if(!isStage(n)) continue; const c=objCenter(n); if(c.x>=x0&&c.x<=x1&&c.y>=y0&&c.y<=y1) multiSel.add(n.id); }
  }
  drag=null;
}

// ===== Play中の画面コントロール（STICK/BUTTON/TOUCH）=====
function playDown(pid,sx,sy){
  touchDown=1; touchX=sx-W/2; touchY=sy-H/2; // TOUCHノード用
  // 上のものから判定
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; const d=NODE_TYPES[n.type];
    if(!(d.stage==="stick"||d.stage==="button")) continue;
    if(uiCtrlHidden(n)) continue;
    const l=objToLocal(n,sx,sy); const R=Math.min(n.w||150,n.h||150)/2;
    const hit = (d.stage==="stick") ? (Math.hypot(l.x,l.y)<=R) : (Math.abs(l.x)<=(n.w||150)/2 && Math.abs(l.y)<=(n.h||150)/2);
    if(hit){
      if(d.stage==="stick"){ n.stickPid=pid; updateStick(n,l,R); }
      else { n.btnPid=pid; n.pressed=1; }
      return;
    }
  }
}
const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
// STICK/BUTTONの表示・当たり判定を隠すか（STYLE=OFF / VISIBLE=false / Hide on PC）
function uiCtrlHidden(n){ if((n.style||"frame")==="off") return true; if(n.visible===false) return true;
  if(n.hideOnPc && !IS_TOUCH) return true; return false; }
function updateStick(n,l,R){ let x=l.x/R, y=l.y/R; const m=Math.hypot(x,y); if(m>1){ x/=m; y/=m; } n.stickX=x; n.stickY=y; }
function playMove(pid,sx,sy){
  touchX=sx-W/2; touchY=sy-H/2;
  for(const n of nodes){ const d=NODE_TYPES[n.type];
    if(d.stage==="stick" && n.stickPid===pid){ const R=Math.min(n.w||150,n.h||150)/2; updateStick(n,objToLocal(n,sx,sy),R); }
  }
}
function playUp(pid){
  touchDown=0;
  for(const n of nodes){ const d=NODE_TYPES[n.type];
    if(d.stage==="stick" && n.stickPid===pid){ n.stickPid=null; n.stickX=0; n.stickY=0; }
    if(d.stage==="button" && n.btnPid===pid){ n.btnPid=null; n.pressed=0; }
  }
}

const TEX_PALETTE=UNITY_PALETTE;   // Unity版パレットを使用
let texEditNode=null, texColor=UNITY_PALETTE[0], texEraser=false, texPressed=false, texGeom=null;
(function buildTexPalette(){

  TEX_PALETTE.forEach((col,i)=>{ const sw=document.createElement("div"); sw.className="sw"+(i===0?" sel":"");

function markTexSel(el){ document.querySelectorAll("#texPalette .sw").forEach(s=>s.classList.remove("sel")); el.classList.add("sel"); }
function openTexEditor(id){ texEditNode=id; mode="texedit"; propNode=null; refreshProp();

  document.getElementById("texBar").style.display="none";

function drawTexEditor(){
  ctx.fillStyle="#0d1017"; ctx.fillRect(0,0,W,H);
  const n=nodeById(texEditNode); if(!n){ texGeom=null; return; }
  const N=n.texW||16;
  const barH=document.getElementById("texBar").offsetHeight||150;
  const avail=Math.min(W-40, H-barH-40);
  const cell=Math.floor(avail/N), size=cell*N;
  const ox=Math.floor((W-size)/2), oy=Math.floor((H-barH-size)/2)+10;
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){ const px=ox+x*cell, py=oy+y*cell;
    ctx.fillStyle=((x+y)&1)?"#20242e":"#171a22"; ctx.fillRect(px,py,cell,cell);  // 透明チェッカー
    const col=n.pixels[y*N+x]; if(col){ ctx.fillStyle=col; ctx.fillRect(px,py,cell,cell); } }
  ctx.strokeStyle="rgba(255,255,255,.10)"; ctx.lineWidth=1;
  for(let i=0;i<=N;i++){ ctx.beginPath(); ctx.moveTo(ox+i*cell,oy); ctx.lineTo(ox+i*cell,oy+size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox,oy+i*cell); ctx.lineTo(ox+size,oy+i*cell); ctx.stroke(); }
  texGeom={ox,oy,cell,N};
}
function texPaint(sx,sy){ const n=nodeById(texEditNode); if(!n||!texGeom) return;
  const {ox,oy,cell,N}=texGeom; const x=Math.floor((sx-ox)/cell), y=Math.floor((sy-oy)/cell);
  if(x<0||y<0||x>=N||y>=N) return; n.pixels[y*N+x]= texEraser?null:texColor;
}
document.querySelectorAll("#texTools [data-sz]").forEach(b=> b.onclick=()=>{ const n=nodeById(texEditNode); if(!n)return;
  const N=+b.dataset.sz; n.texW=N; n.texH=N; n.pixels=new Array(N*N).fill(null); });
document.getElementById("texClear").onclick=()=>{ const n=nodeById(texEditNode); if(n) n.pixels=new Array((n.texW||16)*(n.texH||16)).fill(null); };
document.getElementById("texClose").onclick=closeTexEditor;

// pointer events（Editor/Layout は2本指ピンチでズーム＆パン）
const ptrs=new Map(); let pinchPrev=null;
function activeView(){ return mode==="layout"?layoutView:view; }
function doPinch(){
  const pts=[...ptrs.values()]; if(pts.length<2) return;
  const a=pts[0], b=pts[1];
  const dist=Math.hypot(a.x-b.x,a.y-b.y), mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  if(pinchPrev){
    const V=activeView(); const minS=(mode==="layout")?0.15:0.3;
    const bx=(mx-W/2)/V.s+V.x, by=(my-H/2)/V.s+V.y;
    V.s=Math.min(3,Math.max(minS, V.s*(dist/pinchPrev.dist)));
    const ax=(mx-W/2)/V.s+V.x, ay=(my-H/2)/V.s+V.y;
    V.x+=bx-ax; V.y+=by-ay;                         // ピンチ中心を固定
    V.x-=(mx-pinchPrev.mx)/V.s; V.y-=(my-pinchPrev.my)/V.s; // 2本指の移動でパン
  }
  pinchPrev={dist,mx,my};
}
cv.addEventListener("pointerdown", e=>{ cv.setPointerCapture(e.pointerId);
  if(mode==="play"){ playDown(e.pointerId,e.clientX,e.clientY); return; }
  if(mode==="texedit"){ texPressed=true; texPaint(e.clientX,e.clientY); return; }
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if((mode==="edit"||mode==="layout") && ptrs.size>=2){ drag=null; cancelLongPress(); pinchPrev=null; return; }
  onDown(e.clientX,e.clientY); });
cv.addEventListener("pointermove", e=>{
  if(mode==="play"){ playMove(e.pointerId,e.clientX,e.clientY); return; }
  if(mode==="texedit"){ if(texPressed) texPaint(e.clientX,e.clientY); return; }
  if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if((mode==="edit"||mode==="layout") && ptrs.size>=2){ doPinch(); return; }
  onMove(e.clientX,e.clientY); });
cv.addEventListener("pointerup",   e=>{
  if(mode==="play"){ playUp(e.pointerId); return; }
  if(mode==="texedit"){ texPressed=false; return; }
  ptrs.delete(e.pointerId); pinchPrev=null;
  onUp(e.clientX,e.clientY); });
cv.addEventListener("pointercancel", e=>{ ptrs.delete(e.pointerId); pinchPrev=null;
  if(mode==="play"){ playUp(e.pointerId); return; } texPressed=false; drag=null; cancelLongPress();});
// wheel zoom（Editor と Layout）
cv.addEventListener("wheel", e=>{ e.preventDefault();
  const f = e.deltaY<0?1.1:0.9;
  if(mode==="edit"){
    const before=s2w(e.clientX,e.clientY);
    view.s=Math.min(3,Math.max(0.3,view.s*f));
    const after=s2w(e.clientX,e.clientY);
    view.x+=before.x-after.x; view.y+=before.y-after.y;
  } else if(mode==="layout"){
    const before=screenToStageLayout(e.clientX,e.clientY);
    layoutView.s=Math.min(3,Math.max(0.15,layoutView.s*f));
    const after=screenToStageLayout(e.clientX,e.clientY);
    layoutView.x+=before.x-after.x; layoutView.y+=before.y-after.y;
  }
},{passive:false});

// =====================================================================
let keys={}, pad={};
let heldKeys=new Set();  // KEYBOARDノード/ボタン用：押下中のキー(小文字)
const KMAP={ArrowUp:"U",ArrowDown:"D",ArrowLeft:"L",ArrowRight:"R",w:"U",s:"D",a:"L",d:"R",W:"U",S:"D",A:"L",D:"R"};
// STICK/BUTTONのKEYBOARDモード別キーセット（Off以外）
const KEYSETS={
  wasd:{u:"w",d:"s",l:"a",r:"d"},
  ijkl:{u:"i",d:"k",l:"j",r:"l"},
  cursor:{u:"arrowup",d:"arrowdown",l:"arrowleft",r:"arrowright"},
  "8462":{u:"8",d:"2",l:"4",r:"6"},
};
function keyModeAxis(km){ const s=KEYSETS[km]; if(!s) return {x:0,y:0};
  return { x:(heldKeys.has(s.r)?1:0)-(heldKeys.has(s.l)?1:0),
           y:(heldKeys.has(s.d)?1:0)-(heldKeys.has(s.u)?1:0) }; }
window.addEventListener("keydown", e=>{
  // 入力欄の編集中はショートカット・削除を無効化（CONST値編集でノードが消えるのを防ぐ）
  const ae=document.activeElement; if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return;
  const k=KMAP[e.key]; if(k){ keys[k]=true; e.preventDefault(); }
  heldKeys.add(e.key.toLowerCase());
  if((e.key==="Delete"||e.key==="Backspace") && mode==="edit"){
    if(multiSel.size){ recordUndo(); [...multiSel].forEach(id=>removeNode(id)); multiSel.clear(); selected=null; }
    else if(selected){ recordUndo(); removeNode(selected); selected=null; }
  }
  if((e.ctrlKey||e.metaKey) && (e.key==="z"||e.key==="Z")){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); }
  if((e.ctrlKey||e.metaKey) && (e.key==="y"||e.key==="Y")){ e.preventDefault(); redo(); }
});
window.addEventListener("keyup", e=>{ const k=KMAP[e.key]; if(k) keys[k]=false; heldKeys.delete(e.key.toLowerCase()); });

});
