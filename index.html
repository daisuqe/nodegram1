<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>nodegram</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#12141a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; }
  #app { position:fixed; inset:0; }
  #cv { position:absolute; inset:0; display:block; }

  /* 右上コントローラ（▶ / MENU） */
  .cbtn { position:absolute; right:14px; width:72px; height:72px; border-radius:14px; z-index:12;
    display:flex; align-items:center; justify-content:center; font-weight:800; cursor:pointer;
    border:1px solid rgba(0,0,0,.35); user-select:none; }
  .cplay { top:14px; background:#1f7a3a; color:#fff; font-size:34px; }
  .cplay.stop { background:transparent; border-color:transparent; }
  .cplay .stopsq { width:57px; height:57px; border-radius:12px; border:2px solid #fff; background:transparent; }
  .cmenu { top:98px; background:#3b4250; color:#dff2ff; font-size:19px; letter-spacing:.03em; }
  .cmenu:active { background:#4a5262; }
  #flick { position:absolute; inset:0; z-index:11; display:none; }
  #flick .fi { position:absolute; width:105px; height:60px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:18px; font-weight:800; color:#fff; border:2px solid rgba(255,255,255,.25);
    background:#2b3140; box-shadow:0 6px 20px rgba(0,0,0,.5); }
  #flick .fi.hot { border-color:#fff; transform:scale(1.08); }
  .swatch { width:16px; height:16px; border-radius:4px; display:inline-block; margin-right:8px; vertical-align:-2px; }

  /* 再生中のオンスクリーン操作 */
  #pad { position:absolute; left:14px; bottom:14px; width:150px; height:150px; z-index:9; display:none;
    touch-action:none; }
  #pad .k { position:absolute; width:48px; height:48px; border-radius:10px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.25); }
  #pad .up{left:51px;top:0} #pad .down{left:51px;bottom:0} #pad .left{left:0;top:51px} #pad .right{right:0;top:51px}
  #hint { position:absolute; right:10px; bottom:10px; color:#8a92a6; font-size:12px; z-index:9; }
  .hidden { display:none !important; }

  /* テクスチャエディタ */
  #texBar { position:absolute; left:12px; top:78px; z-index:16; display:none; flex-direction:column; gap:10px; }
  #texBar .tbtn { width:78px; height:46px; border-radius:10px; border:1px solid #333a49;
    background:#242a37; color:#e6e9ef; font-size:15px; font-weight:800; cursor:pointer; }
  #texBar .tbtn.active { background:#21b3d6; border-color:#21b3d6; color:#fff; }
  #texWork { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  #texWork .tsw { width:35px; height:35px; border-radius:8px; border:3px solid #cfd6e4; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.5); }
  #texWork .tsw.sel { border-color:#ffcc00; transform:scale(1.1); }
  #texCloseBtn { position:absolute; top:14px; right:14px; z-index:17; display:none; }

  /* 背景長押しの Create New Node メニュー */
  #createMenu { position:absolute; z-index:20; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:12px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6);
    max-height:calc(100vh - 24px); overflow-y:auto; }
  #createMenu .title { color:#8a92a6; font-size:13px; font-weight:800; padding:2px 4px 10px; letter-spacing:.05em; }
  #createMenu .row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
  #createMenu .ci { height:40px; padding:0 4px; border-radius:10px; border:1px solid rgba(0,0,0,.35);
    color:#fff; font-size:17.2px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;
    text-align:center; text-shadow:0 1px 2px rgba(0,0,0,.5); overflow:hidden; white-space:nowrap; }
  #createMenu .ci:active { background:#2f3646; }

  /* 複数選択メニュー（Duplicate/Delete） */
  #multiMenu { position:absolute; z-index:21; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:10px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6); }
  #multiMenu .mi { height:52px; min-width:180px; padding:0 18px; border-radius:11px; border:1px solid #333a49;
    color:#fff; font-size:17px; font-weight:800; cursor:pointer; display:flex; align-items:center; margin:4px 0; }
  #multiMenu .mi.dup { background:#2b6fd0; } #multiMenu .mi.del { background:#a12b2b; }
  #multiMenu .mi:active { filter:brightness(1.2); }

  /* プロパティパネル（選択ノード） */
  /* 背後のPlayボタン等を触れないようにするための透明バックドロップ（タップで閉じる） */
  #propBackdrop { position:absolute; inset:0; z-index:14; display:none; background:transparent; }
  #propPanel { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:15;
    background:rgba(28,32,42,.98); border:1px solid #3a4150; border-radius:14px; padding:16px 18px; display:none;
    min-width:240px; max-width:calc(100vw - 20px); box-shadow:0 12px 36px rgba(0,0,0,.6); }
  #propPanel .pbody { display:grid; grid-template-columns:1fr; gap:0 16px; }
  #propPanel .pt { color:#fff; font-size:17px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; }
  .pclose { margin-left:auto; width:44px; height:44px; border-radius:8px; border:1px solid #2a91ad;
    background:#21b3d6; color:#fff; font-size:40px; font-weight:800; cursor:pointer; line-height:1; }
  .pclose:active { background:#1a94b3; }
  #propPanel .prow { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  #propPanel label { color:#9aa3b5; font-size:16px; font-weight:700; }
  #propPanel input { flex:1; width:110px; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:18px; font-weight:700; text-align:center; }
  #propPanel input[type=checkbox] { flex:0 0 auto; width:32px; height:32px; }
  #propPanel select { flex:1; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:16px; font-weight:700; }
  #propPanel .del { width:100%; height:48px; border-radius:10px; border:1px solid #cc3b3b; background:#a12b2b;
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; }
  #propPanel .del:active { background:#cc3b3b; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <!-- 右上のコントローラ（元デザイン準拠：▶ と MENU） -->
  <div id="playBtn" class="cbtn cplay">▶</div>
  <div id="menuBtn" class="cbtn cmenu">MENU</div>
  <div id="flick"></div>

  <div id="pad">
    <div class="k up"    data-d="U"></div>
    <div class="k down"  data-d="D"></div>
    <div class="k left"  data-d="L"></div>
    <div class="k right" data-d="R"></div>
  </div>
  <div id="hint" class="hidden">矢印 / WASD で移動</div>

  <div id="createMenu"></div>
  <div id="multiMenu"></div>
  <div id="propBackdrop"></div>
  <div id="propPanel"></div>

  <!-- テクスチャエディタのツール（左に縦並び）＋右上に閉じる -->
  <div id="texBar">
    <button class="tbtn" id="texDraw">Draw</button>
    <button class="tbtn" id="texErase">Erase</button>
    <button class="tbtn" id="texPick">Pick</button>
    <div id="texWork"></div>
  </div>
  <button id="texCloseBtn" class="pclose">×</button>
</div>

<script>
"use strict";
// Unity版のカラーパレット（プロジェクト由来）
const UNITY_PALETTE=["#ffffff","#f4e8ff","#ddb4ff","#c785ff","#e8fbff","#cdf8ff","#86edff","#f7ffe7","#e6ffb4","#d8ff85","#ffe8e8","#ffb4b4","#ff8685","#eeeeee","#8800ff","#500099","#21004b","#00d7ff","#00acce","#066f85","#acff00","#91db02","#538000","#fe0002","#cd0000","#800000","#dadada","#bc99db","#846d99","#5a5164","#9acedb","#587b7f","#32454b","#c3dc9a","#8a9a6b","#384b14","#db5554","#813d3c","#4b1515","#b5b5b5","#fee8ff","#fbb4ff","#f986fd","#e7f4fd","#b4d7ff","#85bfff","#cdffd5","#9affac","#65ff81","#fff2e9","#ffd5b3","#ffb985","#919191","#f300ff","#c101d0","#7b007f","#0080ff","#005fcd","#003781","#00da1a","#009b0c","#005700","#ff6900","#c95407","#7f3100","#6c6c6c","#d799da","#7e3d81","#48164b","#99b7db","#3c5d80","#152e4c","#83c48e","#57805e","#152e1b","#dcb598","#7f5a3f","#4a2e16","#494748","#ffe7f5","#ffb4e4","#ff86cd","#ebecff","#d1cdff","#a29aff","#e7fffa","#b3fff2","#85ffe8","#fffee9","#fffbb4","#fff000","#2a2a2a","#ff0098","#d2007b","#7f0049","#0d00ff","#0000b3","#00004b","#00ffd1","#00cea4","#008265","#fff000","#cebf00","#807700","#000000","#da9abf","#80506a","#4b1634","#b2afda","#656281","#3c374b","#98dacc","#699b92","#164c3f","#bfbc85","#817f58","#4a492d"];
// =====================================================================
//  nodegram (web prototype)  — Unityを使わないHTML版の骨組み
//  ・ノード編集：追加 / 移動 / 端子ドラッグで接続 / ×で削除 / 値編集
//  ・再生：ノードグラフを毎フレーム評価してオブジェクトを動かす
//  Canvas2Dのみ。外部ライブラリなし。1ファイルで動作。
// =====================================================================

// ---- ノード種別の定義（色は元nodegramのカテゴリ配色に対応）----
const NODE_TYPES = {
  const:  { label:"CONST",  glyph:"",     inputs:[],              outputs:["n"],     color:"#3aae4a" }, // 緑：入力/定数
  // 操作系（橙）  ※Unity: Stick/Button 入力0=可視性(V)、Stick 出力X,Y、Touch 出力X,Y,S
  stick:   { label:"STICK",    glyph:"STK",  inputs:["V"], outputs:["X","Y"],   color:"#e0892b", stage:"stick"  },
  button:  { label:"BUTTON",   glyph:"BTN",  inputs:["V"], outputs:["="],       color:"#e0892b", stage:"button" },
  keyboard:{ label:"KEYBOARD", glyph:"KBD",  inputs:[], outputs:["="],       color:"#e0892b" },
  touch:   { label:"TOUCH",    glyph:"TCH",  inputs:[], outputs:["X","Y","S"], color:"#e0892b" },
  // 計算系（青）  ※Unity: Plus 入力1(多重接続で合算)、Minus/Mult/Dev 入力A,B、Arctan 入力X,Y
  add:    { label:"＋",   glyph:"＋",   inputs:["+"],     outputs:["="], color:"#3b7ddd" },
  sub:    { label:"－",   glyph:"－",   inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  mul:    { label:"×",    glyph:"×",    inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  div:    { label:"÷",    glyph:"÷",    inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  root:   { label:"√",    glyph:"√",    inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  compare:{ label:"COMPARE", glyph:"＞",   inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  not:    { label:"NOT",     glyph:"！",   inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  arctan: { label:"POS ANGLE",  glyph:"PtA", inputs:["X","Y"], outputs:["="], color:"#3b7ddd" },
  angletopos:{ label:"ANGLE POS", glyph:"AtP", inputs:["a"], outputs:["X","Y"], color:"#3b7ddd" },
  random: { label:"RANDOM",  glyph:"RND",  inputs:["T"],     outputs:["="], color:"#3b7ddd" }, // 入力0=トリガー
  int:    { label:"INT",     glyph:"INT",  inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  // 応用計算系（水色）  ※Unity: Trigger 入力1(遅延はProperty)、Counter 入力1、Var 入力V,S、Array 入力V,I,S
  trigger:{ label:"TRIGGER", glyph:"TRG", inputs:["in"],          outputs:["="],     color:"#22b8c0" },
  counter:{ label:"COUNTER", glyph:"COU", inputs:["up"],          outputs:["="],     color:"#22b8c0" },
  var:    { label:"VAR",     glyph:"VAR", inputs:["V","S"],       outputs:["="],     color:"#22b8c0" },
  array:  { label:"ARRAY",   glyph:"ARR", inputs:["V","I","S"],   outputs:["="],     color:"#22b8c0" },
  getpos: { label:"GETPOS",  glyph:"GPos", inputs:[],             outputs:["X","Y"], color:"#22b8c0" },
  getrot: { label:"GETROT",  glyph:"GRot", inputs:[],             outputs:["R"],     color:"#22b8c0" },
  // 出力系（紫）  ※Unity: Text 入力T,V／Rect/Circle 入力X,Y,V／Character 入力X,Y,J／Shot 入力1／Sound 入力T,S
  text:     { label:"TEXT",   glyph:"T",    inputs:["T","V"],       outputs:[], color:"#8a3bd0", stage:"text"   },
  rect:     { label:"RECT",   glyph:"▭",   inputs:["X","Y","V"],   outputs:[], color:"#8a3bd0", object:"rect"  },
  circle:   { label:"CIRCLE", glyph:"〇",   inputs:["X","Y","V"],   outputs:[], color:"#8a3bd0", object:"circle"},
  character:{ label:"CHARACTER", glyph:"CHR", inputs:["X","Y","J"], outputs:[], color:"#8a3bd0", object:"rect"  },
  shot:     { label:"SHOT",   glyph:"SHOT", inputs:["fire"],      outputs:[], color:"#8a3bd0", stage:"shot"   },
  sound:    { label:"SOUND",  glyph:"SND",  inputs:["T","S"],     outputs:[], color:"#8a3bd0" },
  // その他（黄）  ※Unity: Texture 入力1(Visible)／Screen 入力X,Y,S 出力W,H／Velocity 出力X,Y
  texture:  { label:"TEXTURE",glyph:"TEX",  inputs:["V"],         outputs:[], color:"#e0c020", tex:true },
  contact:  { label:"SENSOR", glyph:"SEN",  inputs:[],            outputs:["="], color:"#e0c020", attach:true },
  onbreak:  { label:"ONBREAK",glyph:"BRK",  inputs:["S"],         outputs:["="], color:"#e0c020", attach:true },
  rotate:   { label:"ROTATE", glyph:"ROT",  inputs:["av"],        outputs:[], color:"#e0c020", stage:"rotate" },
  velocity: { label:"VELOCITY",glyph:"VEL", inputs:[],            outputs:["X","Y"], color:"#e0c020", target:true },
  screen:   { label:"SCREEN", glyph:"SCR",  inputs:["X","Y","S"], outputs:["W","H"], color:"#e0c020" },
  // シーン設定（灰）
  bg:       { label:"BG",     glyph:"BG",   inputs:[],            outputs:[], color:"#6b7280" },
  setting:  { label:"SETTING",glyph:"SET",  inputs:[],            outputs:[], color:"#6b7280" },
};
const isStage = n => { const d=NODE_TYPES[n.type]; return !!(d.object || d.stage); };
// レイアウト画面に表示・配置する対象（オブジェクト系＋CONTACT/ONBREAK。TEXTUREはオブジェクトに描画されるので除外）
const showsInLayout = n => isStage(n) || n.type==="contact" || n.type==="onbreak";
const attachesToObject = n => ['texture','contact','onbreak'].includes(n.type);
// KEYBOARD/BUTTONで割り当て可能なキー：全アルファベット・全数字・記号・Tab/Esc・矢印・SPACE/ENTER
const KEYBOARD_OPTS=(function(){
  const a=[{value:"",label:"Off"},{value:" ",label:"SPACE"},{value:"enter",label:"ENTER"},{value:"tab",label:"TAB"},{value:"escape",label:"ESC"},
    {value:"arrowup",label:"↑"},{value:"arrowdown",label:"↓"},{value:"arrowleft",label:"←"},{value:"arrowright",label:"→"}];
  for(let c=97;c<=122;c++){ const ch=String.fromCharCode(c); a.push({value:ch,label:ch.toUpperCase()}); } // a-z
  for(let d=0;d<=9;d++){ a.push({value:String(d),label:String(d)}); } // 0-9
  ["@","[",";",":","]",",",".","/","*","-","+"].forEach(s=>a.push({value:s,label:s})); // 記号
  return a;
})();
const PALETTE = ["const",
  "add","sub","mul","div","root","compare","not","arctan","angletopos","random","int",
  "trigger","counter","var","array","getpos","getrot",
  "text","rect","circle","character","shot","sound",
  "stick","button","keyboard","touch",
  "texture","contact","onbreak","rotate","velocity","screen",
  "bg","setting"];

// ---- ノードの見た目サイズ（ワールド座標）。元デザイン同様の正方形ノード ----
const NS = 130, PORT_R = 20; // 端子を1.3倍に
function nodeHeight(t){ return NS; }
// ノードに表示する1〜3文字（元nodegramのシンボル表示に対応）
const CMP_GLYPH={eq:"＝",gt:"＞",lt:"＜",ne:"≠",ge:"≧",le:"≦"};
// ノード表記の明示指定（先頭以外小文字ルールの例外）
const GLYPH_OVERRIDE={ getpos:"GPos", getrot:"GRot", stick:"Stic", arctan:"PtA", angletopos:"AtP",
  trigger:"Trig", text:"Text", sound:"Sund", counter:"Cunt", bg:"BG" };
function nodeGlyph(n){
  if(n.type==="const") return String(n.value);
  if(n.type==="compare") return CMP_GLYPH[n.compareMode||"gt"]||"＞";
  if(GLYPH_OVERRIDE[n.type]) return GLYPH_OVERRIDE[n.type];
  const d=NODE_TYPES[n.type]; let g=(d && (d.glyph||d.label)) || "?";
  // ノード表記は先頭以外を小文字に（複数文字グリフのみ）
  if(g.length>1) g = g.charAt(0)+g.slice(1).toLowerCase();
  return g;
}
function glyphFontSize(g){ const L=[...String(g)].length;
  return (L<=1?0.84 : L===2?0.62 : L===3?0.48 : 0.36) * NS; } // 約1.4倍に拡大

// ---- 状態 ----
let nodes = [];              // {id,type,x,y,value,color,size,playX,playY,vx,vy}
let conns = [];             // {a:nodeId, ao:outPort, b:nodeId, bi:inPort}
// アプリ共通設定（localStorage永続）
let appSettings = { wireStyle:"curve", nodeColor:"basic" }; // ワイヤーの描画＋NodeEditorのオブジェクトノード表示（全プログラム共通）
try{ const s=localStorage.getItem("ng_appsettings"); if(s) Object.assign(appSettings, JSON.parse(s)); }catch(e){}
function saveAppSettings(){ try{ localStorage.setItem("ng_appsettings", JSON.stringify(appSettings)); }catch(e){} }
let view = { x:0, y:0, s:1 };
let layoutView = { x:0, y:0, s:1 };  // レイアウト画面のパン・ズーム
let nextId = 1;
let mode = "edit";          // "edit" | "layout" | "play"
let editModeMemory = "edit"; // Play終了後に戻る画面（edit/layout）

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W=0, H=0, DPR=1;

const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
// 右上コントロール（▶/MENU）の位置。携帯は縦=少し下げ、横=少しセンター寄せ（島・時計との被り回避）
function positionControls(){
  const pb=document.getElementById("playBtn"), mb=document.getElementById("menuBtn");
  if(!pb||!mb) return;
  let top=14, right=14;
  if(IS_TOUCH){ if(W<=H){ top=40; } else { right=36; } }
  pb.style.top=top+"px"; pb.style.right=right+"px";
  mb.style.top=(top+84)+"px"; mb.style.right=right+"px";
}
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  const vv=window.visualViewport;
  W = Math.round(vv?vv.width:window.innerWidth); H = Math.round(vv?vv.height:window.innerHeight); // 実表示領域（下のグレー隙間対策）
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  positionControls();
}
function onViewportChange(){ resize();
  if(typeof isCreateMenuOpen==="function" && isCreateMenuOpen()) showCreateMenu(createMenu._sx, createMenu._sy); } // 向き/幅変更で再最適化
window.addEventListener("resize", onViewportChange);
window.addEventListener("orientationchange", onViewportChange);
if(window.visualViewport){ window.visualViewport.addEventListener("resize", onViewportChange); }
resize();

// ---- 座標変換 ----
function w2s(wx,wy){ return { x:(wx-view.x)*view.s + W/2, y:(wy-view.y)*view.s + H/2 }; }
function s2w(sx,sy){ return { x:(sx-W/2)/view.s + view.x, y:(sy-H/2)/view.s + view.y }; }
// レイアウト画面：ステージ座標(=layoutX/Y) ↔ スクリーン
function stageToScreenLayout(x,y){ return { x:(x-layoutView.x)*layoutView.s + W/2, y:(y-layoutView.y)*layoutView.s + H/2 }; }
function screenToStageLayout(sx,sy){ return { x:(sx-W/2)/layoutView.s + layoutView.x, y:(sy-H/2)/layoutView.s + layoutView.y }; }

// ---- ノード生成 ----
function addNode(type, wx, wy){
  const d = NODE_TYPES[type];
  const n = { id: nextId++, type, x:wx, y:wy };
  if (type==="const") n.value = 1;
  if (d.object || d.stage){
    n.angle=0; n.playX=0; n.playY=0; n.layer=50; n.tag="";  // SORTLAYER・タグ
    if(d.object){ n.color=randObjColor(); n.w=80; n.h=80; n.bounce=0; n.friction=0.0; n.flip=false;
      n.objStyle="fill"; n.coordMode="local"; n.visible=true; n.destroyedBy="";
      n.bodyType=(type==="character")?"dynamic":"off"; } // 作成時はOFF既定（CHARACTERのみDYNAMIC）

  if (type==="sound"){ n.tone=0; n.wave="square"; n.volume=10; } // 音番号(0=ド)・波形・音量
  if (type==="velocity"){ n.frames=5; }                        // 速度の平滑化フレーム数

    n.setFriction=0.4; n.setBounce=0.0; n.setDrag=0.0; n.stopBtnColor="#ffffff"; } // 物理＋StopBtn色

}

function portPos(n, isInput, idx){
  const d = NODE_TYPES[n.type];
  const cnt = (isInput ? d.inputs.length : d.outputs.length);
  const top = n.y - NS/2;
  // 辺上に配置。3個はギリ重ならない間隔(>直径40)、4個以上は少し重なってOK
  let py;
  if(cnt<=1) py = top + NS/2;
  else { const gap = (cnt===2) ? NS*0.52 : (cnt===3 ? 44 : 36);
    const span=(cnt-1)*gap; py = top + NS/2 - span/2 + idx*gap; }
  const px = isInput ? (n.x - NS/2) : (n.x + NS/2);
  return w2s(px, py);
}

function connect(aId, aOut, bId, bIn){
  if (aId===bId) return;
  const bNode=nodeById(bId);
  const multi = bNode && bNode.type==="add"; // ＋ノードの入力は多重接続で合算（Unity Plus準拠）
  if(multi){
    if(conns.some(c=>c.a===aId&&c.ao===aOut&&c.b===bId&&c.bi===bIn)) return; // 同一接続の重複防止
  } else {
    conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); // 入力は1本まで
  }
  conns.push({ a:aId, ao:aOut, b:bId, bi:bIn });
}
function disconnectInput(bId, bIn){ conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); }
function removeNode(id){
  nodes = nodes.filter(n=>n.id!==id);

}

// 複数ノードを複製（グループ内の接続・親子・targetも複製）
function duplicateNodes(ids){
  recordUndo();
  const idmap=new Map(), clones=[];
  for(const id of ids){ const src=nodeById(id); if(!src) continue;
    const c=JSON.parse(JSON.stringify(src)); c.id=nextId++;
    c.x=(c.x||0)+40; c.y=(c.y||0)+40; if(c.layoutX!=null){ c.layoutX+=30; c.layoutY+=30; }
    idmap.set(id,c.id); clones.push(c); }
  for(const c of clones){ if(c.parentNodeId!=null && idmap.has(c.parentNodeId)) c.parentNodeId=idmap.get(c.parentNodeId);
    if(c.target!=null && idmap.has(c.target)) c.target=idmap.get(c.target); }
  nodes.push(...clones);
  for(const cn of conns.slice()){ if(idmap.has(cn.a)&&idmap.has(cn.b)) conns.push({a:idmap.get(cn.a),ao:cn.ao,b:idmap.get(cn.b),bi:cn.bi}); }
  return new Set(idmap.values());
}

let axisX=0, axisY=0;   // KEY入力（-1..1）
function inputValue(node, port, seen){
  const c = conns.find(c=>c.b===node.id && c.bi===port);
  if(!c) return 0;
  const src = nodeById(c.a);
  if(!src) return 0;
  return outputValue(src, c.ao, seen);
}
function outputValue(node, port, seen){
  seen = seen || new Set();
  if (seen.has(node.id)) return 0;     // 循環ガード
  seen.add(node.id);
  // 各入力は独立したパスとして評価（同じソースを両入力に繋いでも循環ガードで0にならないように）
  const a=()=>inputValue(node,0,new Set(seen)), b=()=>inputValue(node,1,new Set(seen));
  switch(node.type){
    case "const":   return node.value||0;
    case "key":     return port===0 ? axisX : axisY;
    case "stick": {
      let x=node.stickX||0, y=node.stickY||0;
      const km=node.keyMode||(node.useKey?"wasd":"off");
      if(km!=="off"){ const ax=keyModeAxis(km); x+=ax.x; y+=ax.y; }
      if((node.cntlMode||"off")!=="off"){ const g=padStickAxis(node.cntlMode); x+=g.x; y+=g.y; } // ゲームパッド
      x=Math.max(-1,Math.min(1,x)); y=Math.max(-1,Math.min(1,y));
      if(node.limitAxis){ if(Math.abs(x)>=Math.abs(y)) y=0; else x=0; }
      if(node.mode==="digital"){ const th=node.threshold||0.3;
        x = x>th?1:(x<-th?-1:0); y = y>th?1:(y<-th?-1:0); }
      return port===0 ? x : y;
    }
    case "button": { // Momentaryのみ：押している間だけ1（Pulse相当はTriggerノードで）
      const bk=node.keyCode||(node.useKey?" ":"");
      const phys = (node.pressed?1:0) || (bk && heldKeys.has(bk) ? 1:0)
        || ((node.cntlBtn||"off")!=="off" && padButtonPressed(node.cntlBtn) ? 1:0); // ゲームパッド
      return phys?1:0;
    }
    case "keyboard": return heldKeys.has((node.keyCode||" ")) ? 1 : 0;
    case "touch":    return port===0 ? touchX : (port===1 ? touchY : touchDown);
    // 計算系（青）
    case "add":     { let s=0; for(const c of conns){ if(c.b===node.id&&c.bi===0){ const src=nodeById(c.a); if(src) s+=outputValue(src,c.ao,new Set(seen)); } } return s; } // 多重接続を合算
    case "sub":     return a()-b();
    case "mul":     return a()*b();
    case "div":     { const d=b(); return d!==0 ? a()/d : 0; }
    case "root":    { const v=a(); return v>0 ? Math.sqrt(v) : 0; }
    case "compare": { const av=a(), bv=b(); switch(node.compareMode||"gt"){
      case "eq": return av===bv?1:0; case "lt": return av<bv?1:0;
      case "ne": return av!==bv?1:0; case "ge": return av>=bv?1:0; case "le": return av<=bv?1:0;
      default: return av>bv?1:0; } }
    case "not":     return a()===0 ? 1 : 0;
    case "arctan":  return Math.atan2(b(), a())*180/Math.PI; // 上=X(a), 下=Y(b) → atan2(Y,X)
    case "angletopos": { const r=a()*Math.PI/180; return port===0 ? Math.cos(r) : Math.sin(r); }
    case "random":  return node.rnd||0;
    case "int":     { const v=a(); switch(node.intType||"floor"){ case "round": return Math.round(v);
      case "ceil": return Math.ceil(v); case "trunc": return Math.trunc(v); default: return Math.floor(v); } }
    // 応用計算系（水色）
    case "trigger": return node.pulse||0;
    case "counter": return node.cnt||0;
    case "var":     return node.store||0;
    case "array":   { const arr=node.arr||[]; return arr[Math.floor(b())]||0; } // 入力1=インデックス
    case "getpos":  { const t=nodeById(node.parentNodeId); if(!t) return 0; // 親に指定したオブジェクト
      if((node.getCoord||"world")==="local" && t.parentNodeId){ return port===0?(t.lx||0):(t.ly||0); } // Local=親相対
      return port===0 ? (t.playX||0) : (t.playY||0); }
    case "getrot":  { const t=nodeById(node.parentNodeId); if(!t) return 0;
      if((node.getCoord||"world")==="local" && t.parentNodeId){ return t.la||0; }
      return t.playAngle!=null?t.playAngle:(t.angle||0); }
    // その他（黄）
    case "velocity":{ return port===0 ? (node._ovx||0) : (node._ovy||0); }
    case "contact": { // SENSOR：自分の矩形領域に対象オブジェクトの一部でも触れたら1
      const p=nodeById(node.parentNodeId); // 親がいれば無視対象＆基準。無くてもSensor単体で判定
      if(p&&destroyed.has(p.id)) return 0;
      // Sensorの判定領域（Rect固定）。play中はplayX/Y/Angle、無ければlayout位置
      const sensor={ playX:(node.playX!=null?node.playX:(node.layoutX||0)), playY:(node.playY!=null?node.playY:(node.layoutY||0)),
        playAngle:(node.playAngle!=null?node.playAngle:(node.angle||0)), w:node.w||60, h:node.h||60, type:"rect" };
      const tgt=node.contactTarget||"all";
      for(const o of nodes){ if(destroyed.has(o.id)) continue; if(p&&o.id===p.id) continue; // 親自身は対象外
        if(!NODE_TYPES[o.type].object) continue; // オブジェクト系のみ
        if(tgt==="tag"){ if((o.tag||"")!==(node.withTag||"")) continue; }
        else if(tgt!=="all"){ if(o.type!==tgt) continue; } // rect/circle/character/shot
        // 一部でも重なれば反応（円は表面基準、矩形はOBB/AABBで正確に）
        if(collideMTV(sensor,o)) return 1; }
      return 0; }
    case "onbreak": return node.pulseBrk||0;
    case "screen":  return port===0 ? W : H; // 出力0=画面幅, 出力1=画面高さ
  }
  return 0;
}

function startPlay(){

  nodes.forEach(n=>{
    if(isStage(n)){ n.playX=n.layoutX||0; n.playY=n.layoutY||0; n.vx=0; n.vy=0; n.grounded=false; n._roll=0; n._prevJ=0; n._still=0; n._asleep=false; n._pushMag=0; n._groundMem=0; n._anchorX=null; n._anchorY=null; n._tiltTargetId=null; n._tilting=false;
      n.playAngle=n.angle||0; n._lastX=n.playX; n._lastY=n.playY; n._vx=0; n._vy=0; n._rawvx=0; n._rawvy=0; n._face=1; n._spin=0; }
    if(attachesToObject(n)){ n.playX=n.layoutX||0; n.playY=n.layoutY||0; n.playAngle=n.angle||0; } // SENSOR等も判定用のplay位置を持つ
    if(n.type==="velocity"){ n._ovx=0; n._ovy=0; }
    if(n.type==="stick"){ n.stickX=0; n.stickY=0; n.stickPid=null; }
    if(n.type==="button"){ n.pressed=0; n.btnPid=null; }
    if(n.type==="shot"){ n._prevFire=0; n._shotCd=0; }
    if(n.type==="sound"){ n._prevPlay=0; stopTone(n); }
    if(n.type==="onbreak"){ n.pulseBrk=0; n._prevSig=0; }
    if(n.type==="counter") n.cnt=0;
    if(n.type==="var") n.store=(n.varInit||0);                 // 初期値を反映
    if(n.type==="array") n.arr=parseArrInit(n.arrInit);        // 初期値（, / 区切り）を反映
    if(n.type==="trigger"){ n._prevSig=0; n._delay=-1; n.pulse=0; }
    if(n.type==="random"){ n.rnd=null; n._prevT=0; n._rngState = n.useSeed ? ((n.seed||0)>>>0) : null; }
  });
  bullets=[]; effects=[]; playCam={x:0,y:0,s:1}; destroyed=new Set(); brokenThisFrame=new Set();
  touchX=0; touchY=0; touchDown=0;
  try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==="suspended") _audioCtx.resume(); }catch(e){} // 実機の音声許可
  // 親子ローカル座標を確定（Play中の追従に使用）
  nodes.forEach(n=>{ if((isStage(n)||attachesToObject(n))&&n.parentNodeId&&nodeById(n.parentNodeId)) recomputeLocal(n); });
  document.getElementById("pad").style.display="none"; // D-PADは表示しない（STICK/BUTTONノードで操作）
  document.getElementById("hint").classList.add("hidden"); // Play中はヒント非表示
  document.getElementById("menuBtn").style.display="none"; // Play中はMENU非表示
  // ストップボタン＝角丸正方形の枠だけ（枠色はSettingのStopBtnCol、既定は白）
  const sN=nodes.find(n=>n.type==="setting"); const stopCol=(sN&&sN.stopBtnColor)||"#ffffff";
  const b=document.getElementById("playBtn"); b.textContent=""; b.classList.add("stop"); b.style.background="";
  const sq=document.createElement("div"); sq.className="stopsq"; sq.style.borderColor=stopCol; b.appendChild(sq);
}

let lastT=0;
const GRAV_SCALE=2000, JUMP=880; // Gravityは倍率(表示1)×2000で内部px/s^2、ジャンプ初速(px/s)
function objHalf(n){ return { hw:(n.w||80)/2, hh:(n.h||80)/2 }; }
function objAngle(n){ const a=(n.playAngle!=null?n.playAngle:(n.angle||0)); return a*Math.PI/180; }
function overlapAABB(a,b){ const A=objHalf(a),B=objHalf(b);
  return Math.abs(a.playX-b.playX) < A.hw+B.hw && Math.abs(a.playY-b.playY) < A.hh+B.hh; }
// 非回転AABB用の最小押し出し。aを (x,y) 動かせばbと分離。重なっていなければnull
function aabbMTV(a,b){ const A=objHalf(a),B=objHalf(b);
  const dx=a.playX-b.playX, dy=a.playY-b.playY;
  const ox=(A.hw+B.hw)-Math.abs(dx), oy=(A.hh+B.hh)-Math.abs(dy);
  if(ox<=0||oy<=0) return null;
  if(ox<oy) return {x:(dx<0?-ox:ox), y:0, depth:ox};
  return {x:0, y:(dy<0?-oy:oy), depth:oy}; }
// 回転考慮の分離軸(SAT)で2つのOBBの最小押し出しベクトル(MTV)を返す。重ならなければnull。
// 戻り値 {x,y}: b を動かさず a を (x,y) だけ動かせば分離できる（Unity2Dの押し戻し相当）
function obbMTV(a,b){
  const aa=objAngle(a), bb=objAngle(b);
  const A=objHalf(a), B=objHalf(b);
  const ax=Math.cos(aa),ay=Math.sin(aa), bx=Math.cos(bb),by=Math.sin(bb);
  const axes=[ {x:ax,y:ay},{x:-ay,y:ax},{x:bx,y:by},{x:-by,y:bx} ]; // a,bそれぞれのローカル軸
  const dx=a.playX-b.playX, dy=a.playY-b.playY;
  let minOv=1e18, mtvX=0, mtvY=0;
  for(const ax0 of axes){
    // 各OBBの軸への投影半径
    const ra=Math.abs((ax*ax0.x+ay*ax0.y))*A.hw + Math.abs((-ay*ax0.x+ax*ax0.y))*A.hh;
    const rb=Math.abs((bx*ax0.x+by*ax0.y))*B.hw + Math.abs((-by*ax0.x+bx*ax0.y))*B.hh;
    const dist=dx*ax0.x+dy*ax0.y;
    const ov=(ra+rb)-Math.abs(dist);
    if(ov<=0) return null; // この軸で分離＝衝突なし
    if(ov<minOv){ minOv=ov; const s=(dist<0)?-1:1; mtvX=ax0.x*ov*s; mtvY=ax0.y*ov*s; }
  }
  return {x:mtvX, y:mtvY, depth:minOv};
}
// いずれかが回転していれば true（AABB高速路と使い分け）
function isRotated(a,b){ return ((a.playAngle||a.angle||0)!==0) || ((b.playAngle||b.angle||0)!==0); }
function isCircle(n){ return NODE_TYPES[n.type] && NODE_TYPES[n.type].object==="circle"; }
// 円a(半径r) と 矩形b(OBB可) の正確な衝突。円中心から矩形表面の最近点方向に (r-距離) だけ分離。
// 戻り値 {x,y}: a を (x,y) 動かせば分離（表面基準なので浮かない）。重ならなければnull
function circleBoxMTV(a,b){

  const solids = live.filter(n=>bt(n)!=="dynamic"); // dynamicが衝突判定する相手（static+kinematic）
  for(const n of solids){

    const len=Math.hypot(m.x,m.y)||1, nx=m.x/len, ny=m.y/len, vn=n.vx*nx+n.vy*ny;
    if(vn<0){ n.vx-=vn*nx; n.vy-=vn*ny; } if(m.y<-0.01) n.grounded=true; } }

  // 3) 親子構造：子は親の移動に追従（親→子の順で解決）
  applyHierarchy();
  // キャラクターはいかなる場合も回転しない（全処理後に角度を確定）
  for(const n of nodes){ if(n.type==="character") n.playAngle=n.angle||0; }

  // 4) SHOT：fire入力で弾を1発ずつ発射。BulletCount=画面内に同時に存在できる弾の最大数、Interval=連射間隔フレーム
  for(const n of nodes){ if(n.type!=="shot"||destroyed.has(n.id)) continue;
    const fire=inputValue(n,0); const spd=(n.bulletSpd||400);
    const interval=Math.max(0,Math.round(n.bulletInterval||0));
    const maxCnt=Math.max(1,Math.round(n.bulletCount||1));
    if(n._shotCd>0) n._shotCd--;
    const alive=bullets.reduce((c,b)=>c+(b.shotId===n.id?1:0),0); // このShotの現存弾数
    // Interval=0 は立ち上がりのみ発射、Interval>0 は押している間クールダウンごとに連射。最大数未満のときだけ発射
    const canFire = fire && alive<maxCnt && ( (interval===0 && !n._prevFire) || (interval>0 && (n._shotCd||0)<=0) );
    if(canFire){
      const a=((n.playAngle!=null?n.playAngle:n.angle)-90)*Math.PI/180;
      const bsize=((n.w||70)+(n.h||70))/2; // 弾サイズ＝発射口の幅と高さの平均（楕円/長方形にしない）
      bullets.push({ x:n.playX, y:n.playY, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, shotId:n.id,
        tag:n.tag||"", size:bsize, shape:n.bulletShape||"circle", color:n.bulletColor||"#ffe08a" });
      if(interval>0) n._shotCd=interval;
    }
    n._prevFire=fire;
  }
  brokenThisFrame=new Set();
  const cx0=playCam.x, cy0=playCam.y;
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    let hitObj=false;
    if(b.tag){ // タグ一致 or DestroyedBy一致のオブジェクトを破壊
      for(const o of live){ if(destroyed.has(o.id)) continue;
        if((o.tag||"")!==b.tag && (o.destroyedBy||"")!==b.tag) continue;
        if(Math.abs(b.x-o.playX)<objHalf(o).hw && Math.abs(b.y-o.playY)<objHalf(o).hh){
          destroyed.add(o.id); brokenThisFrame.add(o.id); hitObj=true; break; } }
    }
    // 画面外に出たら消滅（カメラ考慮）
    const sx=W/2+b.x+cx0, sy=H/2+b.y+cy0, m=(b.size||28);
    const off = sx< -m || sx> W+m || sy< -m || sy> H+m;
    if(hitObj || off) bullets.splice(i,1);
  }
  // ONBREAK：指定Tagのオブジェクト or 親が今フレーム壊れたら、その数を出力（1フレーム）＋壊れた場所にエフェクト
  for(const n of nodes){ if(n.type!=="onbreak") continue; let cnt=0;
    for(const id of brokenThisFrame){ const o=nodeById(id); if(!o) continue;
      const matchTag = n.breakTag && (o.tag||"")===n.breakTag;
      const matchParent = n.parentNodeId===id;
      if(matchTag || matchParent){ cnt++; spawnBreakEffect(n, o); } }
    // Signal入力：0→非0の立ち上がりで、壊れていなくてもONBREAK自身の位置・サイズでEffectを出す
    const sig=inputValue(n,0);
    if((n._prevSig||0)<=0 && sig>0){ cnt++;
      const w=n.w||60, x=(n.playX!=null?n.playX:(n.layoutX||0)), y=(n.playY!=null?n.playY:(n.layoutY||0));
      spawnBreakAt(n.breakEffect||"none", x, y, w, w, n.breakColor||"#ffffff"); } // 縦横同サイズ(正方形)
    n._prevSig=sig;
    n.pulseBrk = cnt; }
  // エフェクト寿命
  for(let i=effects.length-1;i>=0;i--){ effects[i].t+=dt; if(effects[i].t>=effects[i].dur) effects.splice(i,1); }

  // 5) VELOCITY計測（瞬間速度＋ノードごとにframesで平滑化）
  for(const n of objs){ n._rawvx=(n.playX-(n._lastX||n.playX))/Math.max(dt,1e-4); n._rawvy=(n.playY-(n._lastY||n.playY))/Math.max(dt,1e-4);
    n._lastX=n.playX; n._lastY=n.playY; }
  for(const n of nodes){ if(n.type!=="velocity") continue; const t=nodeById(n.target); if(!t) continue;
    const f=Math.max(1,n.frames||5); n._ovx=(n._ovx||0)+((t._rawvx||0)-(n._ovx||0))/f; n._ovy=(n._ovy||0)+((t._rawvy||0)-(n._ovy||0))/f; }

  // 6) SCREEN：親を指定していればParent＋XYSはオフセット。親なしならXYはワールド座標。Sはスケール（未接続=1）
  const scrN = nodes.find(n=>n.type==="screen");
  if(scrN){
    const par=nodeById(scrN.parentNodeId);
    const offX = conns.some(c=>c.b===scrN.id&&c.bi===0) ? inputValue(scrN,0) : 0;
    const offY = conns.some(c=>c.b===scrN.id&&c.bi===1) ? inputValue(scrN,1) : 0;
    let s = conns.some(c=>c.b===scrN.id&&c.bi===2) ? inputValue(scrN,2) : 1; s=Math.max(0.05, s||1);
    if(par){ playCam.x=-((par.playX||0)+offX); playCam.y=-((par.playY||0)+offY); } // 親＋オフセット
    else { playCam.x=-offX; playCam.y=-offY; } // 親なし：ワールド座標
    playCam.s = s;
  } else { playCam.x=0; playCam.y=0; playCam.s=1; }
}
// 簡易ビープ（WebAudio）
let _audioCtx=null;
function beep(freq,wave,vol){
  try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
    o.frequency.value=freq; o.type=wave||"square"; g.gain.value=0.05*(vol!=null?vol/10:1);
    o.connect(g); g.connect(_audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, _audioCtx.currentTime+0.15); o.stop(_audioCtx.currentTime+0.16);
  }catch(e){}
}
// Tone(音番号)→周波数。0=ド(C4), 1=レ, 2=ミ …（Cメジャースケール, ドレミファソラシド）
const MAJOR_STEPS=[0,2,4,5,7,9,11];
function toneToFreq(t){ const i=Math.round(t); const oct=Math.floor(i/7), deg=((i%7)+7)%7;
  return 261.63*Math.pow(2, (MAJOR_STEPS[deg]+12*oct)/12); }
// Signalがある間 継続再生するオシレータ（ノードごと）
function startOrUpdateTone(n,freq,vol,wave){
  try{ if(!_audioCtx){ _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
    if(_audioCtx.state==="suspended") _audioCtx.resume();
    if(!n._osc){ const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
      o.type=wave; o.frequency.value=freq; g.gain.value=0.06*(vol/10);
      o.connect(g); g.connect(_audioCtx.destination); o.start(); n._osc=o; n._gain=g; }
    else { n._osc.frequency.value=freq; n._osc.type=wave; n._gain.gain.value=0.06*(vol/10); }
  }catch(e){}
}
function stopTone(n){ if(n&&n._osc){ try{ n._osc.stop(); }catch(e){} try{ n._osc.disconnect(); n._gain.disconnect(); }catch(e){} n._osc=null; n._gain=null; } }
// ONBREAK破壊エフェクトを発生（Unity版 BreakEffectUI の挙動を再現。重力なし・時間ベース）
function spawnBreakEffect(n,o){ const type=n.breakEffect||"none"; if(type==="none") return;
  const x=o.playX||0, y=o.playY||0, w=o.w||40, h=o.h||40, color=n.breakColor||"#ffffff";
  spawnBreakAt(type, x, y, w, h, color); }
function spawnBreakAt(type, x, y, w, h, color){
  const radius=Math.min(w,h)*0.5;
  if(type==="particle"){ // 12個の四角が中心から均等に放射（サイズ固定、radius*3まで広がりフェード）
    const parts=[]; const cnt=12; for(let i=0;i<cnt;i++){ const a=i*Math.PI*2/cnt; parts.push({dx:Math.cos(a),dy:Math.sin(a)}); }
    effects.push({type:"particle", x,y,color,t:0,dur:0.4, radius, pSize:radius*0.6, parts});
  } else if(type==="line"){ // 12本の細い棒が放射（長さ radius*0.65〜0.75）
    const parts=[]; const cnt=12; for(let i=0;i<cnt;i++){ const a=i*Math.PI*2/cnt;
      parts.push({dx:Math.cos(a),dy:Math.sin(a), ang:a, len:radius*(0.65+Math.random()*0.10)}); }
    effects.push({type:"line", x,y,color,t:0,dur:0.5, radius, lineW:radius*0.18, parts});
  } else { // circle / box(rect) → 6個の煙パフがドリフトしながら2.2倍に膨らみフェード
    const isC=(type==="circle"); const partSize=Math.min(w,h)*0.7; const parts=[];
    for(let i=0;i<6;i++){ const sc=0.8+Math.random()*0.5, da=Math.random()*Math.PI*2, dd=10+Math.random()*20;
      parts.push({sx:(Math.random()-0.5)*w*0.8, sy:(Math.random()-0.5)*h*0.8, base:partSize*sc,
        dvx:Math.cos(da)*dd, dvy:Math.sin(da)*dd, delay:Math.random()*0.3}); }
    effects.push({type:"smoke", circle:isC, x,y,color,t:0,dur:0.8, parts});
  }
}
// エフェクト描画（カメラ追従）
function drawEffects(camX,camY){
  for(const e of effects){ const cx=W/2+e.x+camX, cy=H/2+e.y+camY, t=Math.min(1,e.t/e.dur);
    ctx.save(); ctx.fillStyle=e.color;
    if(e.type==="particle"){ const dist=e.radius*3*t, s=e.pSize; ctx.globalAlpha=1-t;
      for(const q of e.parts) ctx.fillRect(cx+q.dx*dist-s/2, cy+q.dy*dist-s/2, s, s);
    } else if(e.type==="line"){ const dist=e.radius*3*t; ctx.globalAlpha=1-t;
      for(const q of e.parts){ ctx.save(); ctx.translate(cx+q.dx*dist, cy+q.dy*dist); ctx.rotate(q.ang-Math.PI/2);
        ctx.fillRect(-e.lineW/2, -q.len/2, e.lineW, q.len); ctx.restore(); }
    } else { // smoke（circle/box）
      for(const q of e.parts){ const lt=e.t-q.delay; if(lt<0) continue; const tt=Math.min(1,lt/0.5);
        const size=q.base*(1.0+1.2*tt), px=cx+q.sx+q.dvx*tt, py=cy+q.sy+q.dvy*tt;
        ctx.globalAlpha=0.75*(1-tt);
        if(e.circle){ ctx.beginPath(); ctx.arc(px,py,size/2,0,7); ctx.fill(); }
        else ctx.fillRect(px-size/2, py-size/2, size, size); }
    }
    ctx.restore(); }
}
function stageDepth(n){ let d=0,cur=n,g=0; while(cur.parentNodeId){ const p=nodeById(cur.parentNodeId); if(!p||g++>50)break; d++; cur=p; } return d; }
// aがbの祖先か（親子チェーン）
function isAncestorOf(anc,node){ let cur=node,g=0; while(cur&&cur.parentNodeId){ if(cur.parentNodeId===anc.id) return true; cur=nodeById(cur.parentNodeId); if(g++>60)break; } return false; }
function isRelatedHierarchy(a,b){ return a.id===b.id || isAncestorOf(a,b) || isAncestorOf(b,a); } // 親子・先祖子孫は衝突対象外
// 子の「親ローカル座標（位置lx,ly・角度la）」を現在のレイアウトから計算・保持
function recomputeLocal(c){ const p=nodeById(c.parentNodeId); if(!p) return;
  const a=-(p.angle||0)*Math.PI/180, dx=(c.layoutX||0)-(p.layoutX||0), dy=(c.layoutY||0)-(p.layoutY||0);
  c.lx=dx*Math.cos(a)-dy*Math.sin(a); c.ly=dx*Math.sin(a)+dy*Math.cos(a); c.la=(c.angle||0)-(p.angle||0);
}
// 親ローカル→レイアウト絶対（親の回転・移動を反映）
function worldFromParent(c){ const p=nodeById(c.parentNodeId); if(!p) return;
  const a=(p.angle||0)*Math.PI/180, lx=c.lx||0, ly=c.ly||0;
  c.layoutX=(p.layoutX||0)+lx*Math.cos(a)-ly*Math.sin(a);
  c.layoutY=(p.layoutY||0)+lx*Math.sin(a)+ly*Math.cos(a);
  c.angle=(p.angle||0)+(c.la||0);
}
function directChildren(p){ return nodes.filter(c=>isStage(c)&&c.parentNodeId===p.id); }
function updateSubtreeWorld(p){ for(const c of directChildren(p)){ worldFromParent(c); updateSubtreeWorld(c); } }
// Play中：親のplay変換（移動＋回転）で子のplay位置を決める
function applyHierarchy(){
  const kids = nodes.filter(n=>(isStage(n)||attachesToObject(n)) && n.parentNodeId && nodeById(n.parentNodeId));
  kids.sort((a,b)=>stageDepth(a)-stageDepth(b));
  for(const n of kids){ const p=nodeById(n.parentNodeId);
    const pa=(p.playAngle!=null?p.playAngle:(p.angle||0));  // 親の現在角度で回転追従
    // 子オブジェクトのX/Y入力は親座標系でのオフセット（基準ローカル位置lx,lyに加算）
    let ox=0, oy=0;
    if(NODE_TYPES[n.type].object){
      if(conns.some(c=>c.b===n.id&&c.bi===0)) ox=inputValue(n,0);
      if(conns.some(c=>c.b===n.id&&c.bi===1)) oy=inputValue(n,1);
    }
    const a=pa*Math.PI/180, lx=(n.lx||0)+ox, ly=(n.ly||0)+oy;
    n.playX = p.playX + lx*Math.cos(a)-ly*Math.sin(a);
    n.playY = p.playY + lx*Math.sin(a)+ly*Math.cos(a);
    n.playAngle = pa + (n.la||0) + (n.type==="rotate"?(n._spin||0):0); // ROTATEは関節として自身の回転を加算
    if(n.type==="character") n.playAngle=n.angle||0; // キャラクターは親に追従しても回転しない（常に直立）
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(mode==="edit"){ drawGrid(); drawWires(); drawParentWires(); nodes.forEach(drawNode); drawDragWire(); drawSelBox(); drawPortCursor(); }
  else if(mode==="layout") drawLayout();
  else if(mode==="texedit") drawTexEditor();
  else drawPlay();
}

// ---- 親子接続（ノード上端＝子側 / 下端＝親側）----
const PARENT_COL="#ff9b30"; // 親子端子：明るいオレンジ
const IN_COL="#3ba7ff";     // 入力端子：明るい青
const OUT_COL="#ff5a5a";    // 出力端子：明るい赤
function readsParentObject(n){ return n.type==="getpos"||n.type==="getrot"||n.type==="screen"; } // 親オブジェクトを参照（GetPos/GetRot/Screen）
function canHaveParent(n){ return isStage(n) || attachesToObject(n) || readsParentObject(n); }
function parentPortPos(n){ return w2s(n.x, n.y - NS/2); } // 上：自分の親へつなぐ端子
function childPortPos(n){  return w2s(n.x, n.y + NS/2); } // 下：子を受け入れる端子
function isCandidateParent(child,p){
  if(!child||!p||p.id===child.id) return false;
  if(readsParentObject(child)) return !!NODE_TYPES[p.type].object; // GETPOS/GETROTはオブジェクトへ
  if(attachesToObject(child)) return !!NODE_TYPES[p.type].object; // TEXTURE/CONTACT/ONBREAKはオブジェクトへ
  if(isStage(child)){ if(!isStage(p)) return false;
    let cur=p,g=0; while(cur){ if(cur.id===child.id) return false; cur=nodeById(cur.parentNodeId); if(g++>60)break; } return true; }
  return false;
}
function drawWireV(p1,p2,color){
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,3*view.s);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y);
  if(appSettings.wireStyle==="straight"){ ctx.lineTo(p2.x,p2.y); }
  else { const dy=Math.abs(p2.y-p1.y)*0.5+20; ctx.bezierCurveTo(p1.x,p1.y+dy, p2.x,p2.y-dy, p2.x,p2.y); }
  ctx.stroke(); }
function drawParentWires(){
  for(const n of nodes){ if(!n.parentNodeId) continue; const p=nodeById(n.parentNodeId); if(!p) continue;
    drawWireV(childPortPos(p), parentPortPos(n), PARENT_COL); }
}

function drawGrid(){
  ctx.fillStyle="#12141a"; ctx.fillRect(0,0,W,H);
  const step=40*view.s; if(step<8) return;
  const ox=((W/2 - view.x*view.s)%step+step)%step;
  const oy=((H/2 - view.y*view.s)%step+step)%step;
  ctx.strokeStyle="#1c2029"; ctx.lineWidth=1; ctx.beginPath();
  for(let x=ox;x<W;x+=step){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=oy;y<H;y+=step){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
}

function drawWire(p1,p2,color){
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,3*view.s);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y);
  if(appSettings.wireStyle==="straight"){ ctx.lineTo(p2.x,p2.y); }
  else { const dx=Math.abs(p2.x-p1.x)*0.5+20; ctx.bezierCurveTo(p1.x+dx,p1.y, p2.x-dx,p2.y, p2.x,p2.y); }
  ctx.stroke();
}
function drawWires(){
  for(const c of conns){
    const a=nodeById(c.a), b=nodeById(c.b); if(!a||!b) continue;
    drawWire(portPos(a,false,c.ao), portPos(b,true,c.bi), "#7c8598");
  }
}
function drawSelBox(){
  if(!drag || (drag.kind!=="selbox" && drag.kind!=="selboxL")) return;
  const x=Math.min(drag.x0,drag.x1), y=Math.min(drag.y0,drag.y1), w=Math.abs(drag.x1-drag.x0), h=Math.abs(drag.y1-drag.y0);
  ctx.fillStyle="rgba(0,180,255,.15)"; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle="#21b3d6"; ctx.lineWidth=2; ctx.setLineDash([6,4]); ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
