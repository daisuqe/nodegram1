<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>nodegram</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#12141a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; }
  #app { position:fixed; inset:0; }
  #cv { position:absolute; inset:0; display:block; }

  /* 右上コントローラ（▶ / MENU） */
  .cbtn { position:absolute; right:14px; width:72px; height:72px; border-radius:14px; z-index:12;
    display:flex; align-items:center; justify-content:center; font-weight:800; cursor:pointer;
    border:1px solid rgba(0,0,0,.35); user-select:none; }
  .cplay { top:14px; background:#1f7a3a; color:#fff; font-size:34px; overflow:hidden; }
  .cplay.stop { background:transparent; border-color:transparent; }
  .cplay .stopsq { width:57px; height:57px; border-radius:12px; border:2px solid #fff; background:transparent; position:relative; z-index:2; overflow:hidden; }
  /* 停止長押しの「下から白く埋まる」フィル：角丸正方形(stopsq)いっぱい */
  .cplay .stopsq .holdfill { position:absolute; left:0; right:0; bottom:0; height:0%; background:rgba(255,255,255,.9); pointer-events:none; }
  .cmenu { top:98px; background:#3b4250; color:#dff2ff; font-size:19px; letter-spacing:.03em; }
  .cmenu:active { background:#4a5262; }
  #flick { position:absolute; inset:0; z-index:11; display:none; }
  #flick .fi { position:absolute; width:105px; height:60px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:18px; font-weight:800; color:#fff; border:2px solid rgba(255,255,255,.25);
    background:#2b3140; box-shadow:0 6px 20px rgba(0,0,0,.5); }
  #flick .fi.hot { border-color:#fff; transform:scale(1.08); }
  .swatch { width:16px; height:16px; border-radius:4px; display:inline-block; margin-right:8px; vertical-align:-2px; }

  /* 再生中のオンスクリーン操作 */
  #pad { position:absolute; left:14px; bottom:14px; width:150px; height:150px; z-index:9; display:none;
    touch-action:none; }
  #pad .k { position:absolute; width:48px; height:48px; border-radius:10px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.25); }
  #pad .up{left:51px;top:0} #pad .down{left:51px;bottom:0} #pad .left{left:0;top:51px} #pad .right{right:0;top:51px}
  #hint { position:absolute; right:10px; bottom:10px; color:#8a92a6; font-size:12px; z-index:9; }
  .hidden { display:none !important; }

  /* テクスチャエディタ */
  #texBar { position:absolute; left:12px; top:78px; z-index:16; display:none; flex-direction:column; gap:10px; }
  #texBar .tbtn { width:78px; height:46px; border-radius:10px; border:1px solid #333a49;
    background:#242a37; color:#e6e9ef; font-size:15px; font-weight:800; cursor:pointer; }
  #texBar .tbtn.active { background:#21b3d6; border-color:#21b3d6; color:#fff; }
  #texWork { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  #texWork .tsw { width:35px; height:35px; border-radius:8px; border:3px solid #cfd6e4; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.5); }
  #texWork .tsw.sel { border-color:#ffcc00; transform:scale(1.1); }
  #texCloseBtn { position:absolute; top:14px; right:14px; z-index:17; display:none; }

  /* 背景長押しの Create New Node メニュー */
  #createMenu { position:absolute; z-index:20; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:12px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6);
    max-height:calc(100vh - 24px); overflow-y:auto; }
  #createMenu .title { color:#8a92a6; font-size:13px; font-weight:800; padding:2px 4px 10px; letter-spacing:.05em; }
  #createMenu .row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
  #createMenu .ci { height:40px; padding:0 4px; border-radius:10px; border:1px solid rgba(0,0,0,.35);
    color:#fff; font-size:17.2px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;
    text-align:center; text-shadow:0 1px 2px rgba(0,0,0,.5); overflow:hidden; white-space:nowrap; }
  #createMenu .ci:active { background:#2f3646; }

  /* 複数選択メニュー（Duplicate/Delete） */
  #multiMenu { position:absolute; z-index:21; background:rgba(28,32,42,.98); border:1px solid #3a4150;
    border-radius:14px; padding:10px; display:none; box-shadow:0 10px 32px rgba(0,0,0,.6); }
  #multiMenu .mi { height:52px; min-width:180px; padding:0 18px; border-radius:11px; border:1px solid #333a49;
    color:#fff; font-size:17px; font-weight:800; cursor:pointer; display:flex; align-items:center; margin:4px 0; }
  #multiMenu .mi.dup { background:#2b6fd0; } #multiMenu .mi.del { background:#a12b2b; }
  #multiMenu .mi:active { filter:brightness(1.2); }

  /* プロパティパネル（選択ノード） */
  /* 背後のPlayボタン等を触れないようにするための透明バックドロップ（タップで閉じる） */
  #propBackdrop { position:absolute; inset:0; z-index:14; display:none; background:rgba(0,0,0,.55); }
  #menuBackdrop { position:absolute; inset:0; z-index:19; display:none; background:rgba(0,0,0,.55); } /* CreateNode/Multiメニューの暗転 */
  #propPanel { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:15;
    background:rgba(28,32,42,.98); border:1px solid #3a4150; border-radius:14px; padding:16px 18px; display:none;
    min-width:240px; max-width:calc(100vw - 20px); box-shadow:0 12px 36px rgba(0,0,0,.6); }
  #propPanel .pbody { display:grid; grid-template-columns:1fr; gap:0 16px; }
  #propPanel .pt { color:#fff; font-size:17px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; }
  .pclose { margin-left:auto; width:44px; height:44px; border-radius:8px; border:1px solid #2a91ad;
    background:#21b3d6; color:#fff; font-size:40px; font-weight:800; cursor:pointer; line-height:1; }
  .pclose:active { background:#1a94b3; }
  /* ラベルは左半分固定、コントロールは右半分(50%上限)。入力欄の左位置を揃える */
  #propPanel .prow { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  #propPanel label { color:#9aa3b5; font-size:16px; font-weight:700; flex:0 0 46%; min-width:0; }
  #propPanel input { flex:0 0 50%; width:50%; max-width:50%; box-sizing:border-box; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:18px; font-weight:700; text-align:center; }
  #propPanel input[type=checkbox] { flex:0 0 auto; width:32px; height:32px; max-width:none; }
  /* DDLは50%上限だが中身が入りきらない場合は超えてよい */
  #propPanel select { flex:0 1 auto; min-width:50%; max-width:100%; height:44px; border-radius:9px; border:1px solid #3a4150; background:#181c26;
    color:#e6e9ef; font-size:16px; font-weight:700; }
  #propPanel .del { width:100%; height:48px; border-radius:10px; border:1px solid #cc3b3b; background:#a12b2b;
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; }
  #propPanel .del:active { background:#cc3b3b; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <!-- 右上のコントローラ（元デザイン準拠：▶ と MENU） -->
  <div id="playBtn" class="cbtn cplay">▶</div>
  <div id="menuBtn" class="cbtn cmenu">MENU</div>
  <div id="flick"></div>

  <div id="pad">
    <div class="k up"    data-d="U"></div>
    <div class="k down"  data-d="D"></div>
    <div class="k left"  data-d="L"></div>
    <div class="k right" data-d="R"></div>
  </div>
  <div id="hint" class="hidden">矢印 / WASD で移動</div>

  <div id="menuBackdrop"></div>
  <div id="createMenu"></div>
  <div id="multiMenu"></div>
  <div id="propBackdrop"></div>
  <div id="propPanel"></div>

  <!-- テクスチャエディタのツール（左に縦並び）＋右上に閉じる -->
  <div id="texBar">
    <button class="tbtn" id="texDraw">Draw</button>
    <button class="tbtn" id="texErase">Erase</button>
    <button class="tbtn" id="texPick">Pick</button>
    <div id="texWork"></div>
  </div>
  <button id="texCloseBtn" class="pclose">×</button>
</div>

  sub:    { label:"－",   glyph:"－",   inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  mul:    { label:"×",    glyph:"×",    inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  div:    { label:"÷",    glyph:"÷",    inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  root:   { label:"√",    glyph:"√",    inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  compare:{ label:"COMPARE", glyph:"＞",   inputs:["A","B"], outputs:["="], color:"#3b7ddd" },
  not:    { label:"NOT",     glyph:"！",   inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  arctan: { label:"POS ANGLE",  glyph:"PtA", inputs:["X","Y"], outputs:["="], color:"#3b7ddd" },
  angletopos:{ label:"ANGLE POS", glyph:"AtP", inputs:["a"], outputs:["X","Y"], color:"#3b7ddd" },
  random: { label:"RANDOM",  glyph:"RND",  inputs:["T"],     outputs:["="], color:"#3b7ddd" }, // 入力0=トリガー
  int:    { label:"INT",     glyph:"INT",  inputs:["x"],     outputs:["="], color:"#3b7ddd" },
  // 応用計算系（水色）  ※Unity: Trigger 入力1(遅延はProperty)、Counter 入力1、Var 入力V,S、Array 入力V,I,S
  trigger:{ label:"TRIGGER", glyph:"TRG", inputs:["in"],          outputs:["="],     color:"#22b8c0" },
  counter:{ label:"COUNTER", glyph:"COU", inputs:["up"],          outputs:["="],     color:"#22b8c0" },
  var:    { label:"VAR",     glyph:"VAR", inputs:["V","S"],       outputs:["="],     color:"#22b8c0" },
  array:  { label:"ARRAY",   glyph:"ARR", inputs:["V","I","S"],   outputs:["="],     color:"#22b8c0" },
  getpos: { label:"GETPOS",  glyph:"GPos", inputs:[],             outputs:["X","Y"], color:"#22b8c0" },
  getrot: { label:"GETROT",  glyph:"GRot", inputs:[],             outputs:["R"],     color:"#22b8c0" },
  // 出力系（紫）  ※Unity: Text 入力T,V／Rect/Circle 入力X,Y,V／Character 入力X,Y,J／Shot 入力1／Sound 入力T,S
  text:     { label:"TEXT",   glyph:"T",    inputs:["T","V"],       outputs:[], color:"#8a3bd0", stage:"text"   },
  rect:     { label:"RECT",   glyph:"□",   inputs:["X","Y","V"],   outputs:[], color:"#8a3bd0", object:"rect"  },
  circle:   { label:"CIRCLE", glyph:"〇",   inputs:["X","Y","V"],   outputs:[], color:"#8a3bd0", object:"circle"},
  character:{ label:"CHARACTER", glyph:"CHR", inputs:["X","Y","J"], outputs:[], color:"#8a3bd0", object:"rect"  },
  shot:     { label:"SHOT",   glyph:"SHOT", inputs:["fire"],      outputs:[], color:"#8a3bd0", stage:"shot"   },
  sound:    { label:"SOUND",  glyph:"SND",  inputs:["T","S"],     outputs:[], color:"#8a3bd0" },
  // その他（黄）  ※Unity: Texture 入力1(Visible)／Screen 入力X,Y,S 出力W,H／Velocity 出力X,Y
  texture:  { label:"TEXTURE",glyph:"TEX",  inputs:["V"],         outputs:[], color:"#e0c020", tex:true },
  contact:  { label:"SENSOR", glyph:"SEN",  inputs:[],            outputs:["="], color:"#e0c020", attach:true },
  onbreak:  { label:"ONBREAK",glyph:"BRK",  inputs:["S"],         outputs:["="], color:"#e0c020", attach:true },
  rotate:   { label:"ROTATE", glyph:"ROT",  inputs:["av"],        outputs:[], color:"#e0c020", stage:"rotate" },
  velocity: { label:"VELOCITY",glyph:"VEL", inputs:[],            outputs:["X","Y"], color:"#e0c020", target:true },
  screen:   { label:"SCREEN", glyph:"SCR",  inputs:["X","Y","S"], outputs:["W","H"], color:"#e0c020" },
  // シーン設定（灰）
  bg:       { label:"BG",     glyph:"BG",   inputs:[],            outputs:[], color:"#6b7280" },
  setting:  { label:"SETTING",glyph:"SET",  inputs:[],            outputs:[], color:"#6b7280" },
};
const isStage = n => { const d=NODE_TYPES[n.type]; return !!(d.object || d.stage); };
// レイアウト画面に表示・配置する対象（オブジェクト系＋CONTACT/ONBREAK。TEXTUREはオブジェクトに描画されるので除外）
const showsInLayout = n => isStage(n) || n.type==="contact" || n.type==="onbreak" || (n.type==="texture" && !texHasParent(n)); // 割当済みTEXTUREはLayoutに出さない
const attachesToObject = n => ['texture','contact','onbreak'].includes(n.type);

const KEYBOARD_OPTS=(function(){
  const a=[{value:"",label:"Off"},{value:" ",label:"SPACE"},{value:"enter",label:"ENTER"},{value:"tab",label:"TAB"},{value:"escape",label:"ESC"},
    {value:"arrowup",label:"↑"},{value:"arrowdown",label:"↓"},{value:"arrowleft",label:"←"},{value:"arrowright",label:"→"}];
  for(let c=97;c<=122;c++){ const ch=String.fromCharCode(c); a.push({value:ch,label:ch.toUpperCase()}); } // a-z

const PALETTE = ["const",
  "add","sub","mul","div","root","compare","not","arctan","angletopos","random","int",
  "trigger","counter","var","array","getpos","getrot",
  "text","rect","circle","character","shot","sound",
  "stick","button","keyboard","touch",
  "texture","contact","onbreak","rotate","velocity","screen",
  "bg","setting"];

// ---- ノードの見た目サイズ（ワールド座標）。元デザイン同様の正方形ノード ----
const NS = 130, PORT_R = 20; // 端子を1.3倍に
function nodeHeight(t){ return NS; }
// ノードに表示する1〜3文字（元nodegramのシンボル表示に対応）
const CMP_GLYPH={eq:"＝",gt:"＞",lt:"＜",ne:"≠",ge:"≧",le:"≦"};
// ノード表記の明示指定（先頭以外小文字ルールの例外）
const GLYPH_OVERRIDE={ getpos:"GPos", getrot:"GRot", stick:"Stk", character:"★", shot:"△", arctan:"PtA", angletopos:"AtP",
  trigger:"Trig", text:"Text", sound:"Sund", counter:"Cunt", bg:"BG" };
function nodeGlyph(n){
  if(n.type==="const") return String(n.value);
  if(n.type==="compare") return CMP_GLYPH[n.compareMode||"gt"]||"＞";
  if(GLYPH_OVERRIDE[n.type]) return GLYPH_OVERRIDE[n.type];
  const d=NODE_TYPES[n.type]; let g=(d && (d.glyph||d.label)) || "?";
  // ノード表記は先頭以外を小文字に（複数文字グリフのみ）
  if(g.length>1) g = g.charAt(0)+g.slice(1).toLowerCase();
  return g;
}
function glyphFontSize(g){ const L=[...String(g)].length;
  if(g==="Stk") return 0.58*NS; // STICK: 3文字だが大きめ
  return (L<=1?0.84 : L===2?0.62 : L===3?0.48 : 0.36) * NS; } // 約1.4倍に拡大（★は1文字=0.84）
// ○□△ を同じ太さの線で描画（半径r、中心cx,cy）。影付き白線

function addNode(type, wx, wy){
  const d = NODE_TYPES[type];
  const n = { id: nextId++, type, x:wx, y:wy };
  if (type==="const") n.value = 1;
  if (d.object || d.stage){
    n.angle=0; n.playX=0; n.playY=0; n.layer=50; n.tag="";  // SORTLAYER・タグ
    if(d.object){ n.color=randObjColor(); n.w=80; n.h=80; n.bounce=0; n.friction=0.0; n.flip=false;
      n.objStyle="fill"; n.coordMode="local"; n.visible=true; n.destroyedBy="";
      n.bodyType=(type==="character")?"dynamic":"off"; } // 作成時はOFF既定（CHARACTERのみDYNAMIC）
    else if(d.stage==="text"){ n.color="#8a3bd0"; n.w=240; n.h=70; n.text="TEXT"; n.fontSize=40; n.textColor="#ffffff"; n.align="center"; n.outline=false; }
    else if(d.stage==="stick"){ n.color="#e0892b"; n.w=200; n.h=200;
      n.style="frame"; n.mode="analog"; n.threshold=0.3; n.limitAxis=false;
      n.keyMode="off"; n.cntlMode="off"; n.hideOnPc=false;
      n.useKey=false; n.visible=true; }
    else if(d.stage==="button"){ n.color="#e0892b"; n.w=150; n.h=150;
      n.style="frame"; n.cntlBtn="off"; n.keyCode=""; n.hideOnPc=false;
      n.useKey=false; n.visible=true; }
    else if(d.stage==="shot"){ n.color="#c084fc"; n.w=70; n.h=70; n.angle=0; n.bulletSpd=400;
      n.bulletShape="circle"; n.bulletColor="#ffe08a"; n.bulletCount=1; n.bulletInterval=0; }
    else if(d.stage==="rotate"){ n.color="#e0c020"; n.w=70; n.h=70; }
    if(type==="character"){ n.color=randObjColor(); n.flip=true; }
    // レイアウト開始位置（重ならないよう少しずらす）
    const oc = nodes.filter(m=>isStage(m)).length;
    n.layoutX = (oc%5)*100 - 200; n.layoutY = Math.floor(oc/5)*100 - 100;
    n.parentNodeId = null; // 親子構造
  }
  if (d.tex){ n.texW=16; n.texH=16; n.pixels=new Array(16*16).fill(null); n.parentNodeId=null; n.texParents=[]; } // 複数オブジェクトへ割当可
  if (d.attach){ n.parentNodeId=null;
    if(type==="contact"){ n.withTag=""; n.contactTarget="all"; n.contactShape="rect"; } // SENSOR: Target/Tag（ShapeはRect固定）
    if(type==="onbreak"){ n.breakColor="#ffffff"; n.breakEffect="none"; n.breakTag=""; } } // Unity: Color/Effect/Tag
  // CONTACT/ONBREAK/TEXTURE もレイアウトで配置できるよう位置とサイズを持たせる
  if (attachesToObject(n)){ n.w=n.w||60; n.h=n.h||60; n.angle=n.angle||0;
    if(type==="texture" && n.layer==null) n.layer=10; // TEXTUREのLayer初期値=10
    const oc=nodes.filter(m=>showsInLayout(m)).length;
    if(n.layoutX==null){ n.layoutX=(oc%5)*100-200; n.layoutY=Math.floor(oc/5)*100-100; } }
  if (type==="compare"){ n.compareMode="gt"; }                 // 比較演算子（既定：＞）
  if (type==="random"){ n.rndNum=6; n.useSeed=false; n.seed=0; } // 0〜(Number-1)のInt乱数
  if (type==="trigger"){ n.triggerDelay=0; }                   // 遅延フレーム（Property）
  if (type==="counter"){ n.cntType="none"; n.cntMin=0; n.cntMax=100; } // 種別・範囲
  if (type==="int"){ n.intType="floor"; }                      // 丸め種別
  if (type==="var"){ n.varInit=0; }                            // 初期値（Play開始時にstoreへ）
  if (type==="array"){ n.arrInit=""; }                         // 初期値（, / 区切り）
  if (type==="getpos"||type==="getrot"){ n.getCoord="world"; } // WORLD/LOCAL
  if (type==="keyboard"){ n.keyCode=" "; }                     // 既定：スペース
  if (type==="sound"){ n.tone=0; n.inst="piano"; n.volume=10; } // 音番号(0=ド)・楽器プリセット・音量
  if (type==="velocity"){ n.frames=5; }                        // 速度の平滑化フレーム数
  if (type==="bg"){ n.color="#0a0b10"; }                       // 背景色
  if (type==="setting"){ n.gravity=9.8; n._gv=2; n.orient="any"; n.fps=60; n.dynamics=true; // Gravity表記9.8=旧1、向き既定Any
    n.setFriction=0.4; n.setBounce=0.0; n.setDrag=0.0; n.stopBtnColor="#ffffff"; } // 物理＋StopBtn色
  nodes.push(n);

}
function randObjColor(){
  const c=["#ff5a5a","#ffb43a","#3ad0ff","#4ade80","#c084fc","#f472b6"];

}
const nodeById = id => nodes.find(n=>n.id===id);

// ---- 端子のスクリーン座標 ----
function portPos(n, isInput, idx){
  const d = NODE_TYPES[n.type];
  const cnt = (isInput ? d.inputs.length : d.outputs.length);
  const top = n.y - NS/2;
  // 辺上に配置。3個はギリ重ならない間隔(>直径40)、4個以上は少し重なってOK
  let py;
  if(cnt<=1) py = top + NS/2;
  else { const gap = (cnt===2) ? NS*0.52 : (cnt===3 ? 44 : 36);
    const span=(cnt-1)*gap; py = top + NS/2 - span/2 + idx*gap; }
  const px = isInput ? (n.x - NS/2) : (n.x + NS/2);
  return w2s(px, py);
}

// ---- 接続 ----
function connect(aId, aOut, bId, bIn){
  if (aId===bId) return;
  const bNode=nodeById(bId);
  const multi = bNode && bNode.type==="add"; // ＋ノードの入力は多重接続で合算（Unity Plus準拠）
  if(multi){
    if(conns.some(c=>c.a===aId&&c.ao===aOut&&c.b===bId&&c.bi===bIn)) return; // 同一接続の重複防止
  } else {
    conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); // 入力は1本まで
  }
  conns.push({ a:aId, ao:aOut, b:bId, bi:bIn });
}
function disconnectInput(bId, bIn){ conns = conns.filter(c=>!(c.b===bId && c.bi===bIn)); }
function removeNode(id){
  nodes = nodes.filter(n=>n.id!==id);
  conns = conns.filter(c=>c.a!==id && c.b!==id);
  nodes.forEach(n=>{ if(n.parentNodeId===id) n.parentNodeId=null; if(n.target===id) n.target=null;
    if(n.texParents&&n.texParents.length){ n.texParents=n.texParents.filter(pid=>pid!==id); if(n.parentNodeId==null&&n.texParents.length) n.parentNodeId=n.texParents[0]; } }); // 割当先削除に追従
}
function removeNodes(ids){ for(const id of ids) removeNode(id); }
// 複数ノードを複製（グループ内の接続・親子・targetも複製）
function duplicateNodes(ids){
  recordUndo();
  const idmap=new Map(), clones=[];
  for(const id of ids){ const src=nodeById(id); if(!src) continue;
    const c=JSON.parse(JSON.stringify(src)); c.id=nextId++;
    c.x=(c.x||0)+40; c.y=(c.y||0)+40; if(c.layoutX!=null){ c.layoutX+=30; c.layoutY+=30; }
    idmap.set(id,c.id); clones.push(c); }
  for(const c of clones){ if(c.parentNodeId!=null && idmap.has(c.parentNodeId)) c.parentNodeId=idmap.get(c.parentNodeId);
    if(c.target!=null && idmap.has(c.target)) c.target=idmap.get(c.target);
    if(c.texParents&&c.texParents.length) c.texParents=c.texParents.map(pid=>idmap.has(pid)?idmap.get(pid):pid); } // 複数親を再マップ
  nodes.push(...clones);
  for(const cn of conns.slice()){ if(idmap.has(cn.a)&&idmap.has(cn.b)) conns.push({a:idmap.get(cn.a),ao:cn.ao,b:idmap.get(cn.b),bi:cn.bi}); }
  return new Set(idmap.values());
}

let undoStack=[], redoStack=[];
function recordUndo(){ try{ undoStack.push(serialize()); if(undoStack.length>60) undoStack.shift(); redoStack.length=0; }catch(e){} }
function undo(){ if(!undoStack.length) return; redoStack.push(serialize()); deserialize(undoStack.pop()); }
function redo(){ if(!redoStack.length) return; undoStack.push(serialize()); deserialize(redoStack.pop()); }

//  エンジン（評価）
// =====================================================================
let axisX=0, axisY=0;   // KEY入力（-1..1）
function inputValue(node, port, seen){
  const c = conns.find(c=>c.b===node.id && c.bi===port);
  if(!c) return 0;
  const src = nodeById(c.a);
  if(!src) return 0;
  return outputValue(src, c.ao, seen);
}
function outputValue(node, port, seen){
  seen = seen || new Set();
  if (seen.has(node.id)) return 0;     // 循環ガード
  seen.add(node.id);
  // 各入力は独立したパスとして評価（同じソースを両入力に繋いでも循環ガードで0にならないように）
  const a=()=>inputValue(node,0,new Set(seen)), b=()=>inputValue(node,1,new Set(seen));
  switch(node.type){
    case "const":   return node.value||0;
    case "key":     return port===0 ? axisX : axisY;
    case "stick": {
      let x=node.stickX||0, y=node.stickY||0;
      const km=node.keyMode||(node.useKey?"wasd":"off");
      if(km!=="off"){ const ax=keyModeAxis(km); x+=ax.x; y+=ax.y; }
      if((node.cntlMode||"off")!=="off"){ const g=padStickAxis(node.cntlMode); x+=g.x; y+=g.y; } // ゲームパッド
      x=Math.max(-1,Math.min(1,x)); y=Math.max(-1,Math.min(1,y));
      if(node.limitAxis){ if(Math.abs(x)>=Math.abs(y)) y=0; else x=0; }
      if(node.mode==="digital"){ const th=node.threshold||0.3;
        x = x>th?1:(x<-th?-1:0); y = y>th?1:(y<-th?-1:0); }
      return port===0 ? x : y;
    }
    case "button": { // Momentaryのみ：押している間だけ1（Pulse相当はTriggerノードで）
      const bk=node.keyCode||(node.useKey?" ":"");
      const phys = (node.pressed?1:0) || (bk && heldKeys.has(bk) ? 1:0)
        || ((node.cntlBtn||"off")!=="off" && padButtonPressed(node.cntlBtn) ? 1:0); // ゲームパッド
      return phys?1:0;
    }
    case "keyboard": return heldKeys.has((node.keyCode||" ")) ? 1 : 0;
    case "touch":    return port===0 ? touchX : (port===1 ? touchY : touchDown);
    // 計算系（青）
    case "add":     { let s=0; for(const c of conns){ if(c.b===node.id&&c.bi===0){ const src=nodeById(c.a); if(src) s+=outputValue(src,c.ao,new Set(seen)); } } return s; } // 多重接続を合算
    case "sub":     return a()-b();
    case "mul":     return a()*b();
    case "div":     { const d=b(); return d!==0 ? a()/d : 0; }
    case "root":    { const v=a(); return v>0 ? Math.sqrt(v) : 0; }
    case "compare": { const av=a(), bv=b(); switch(node.compareMode||"gt"){
      case "eq": return av===bv?1:0; case "lt": return av<bv?1:0;
      case "ne": return av!==bv?1:0; case "ge": return av>=bv?1:0; case "le": return av<=bv?1:0;
      default: return av>bv?1:0; } }
    case "not":     return a()===0 ? 1 : 0;
    case "arctan":  return Math.atan2(b(), a())*180/Math.PI; // 上=X(a), 下=Y(b) → atan2(Y,X)
    case "angletopos": { const r=a()*Math.PI/180; return port===0 ? Math.cos(r) : Math.sin(r); }
    case "random":  return node.rnd||0;
    case "int":     { const v=a(); switch(node.intType||"floor"){ case "round": return Math.round(v);
      case "ceil": return Math.ceil(v); case "trunc": return Math.trunc(v); default: return Math.floor(v); } }
    // 応用計算系（水色）
    case "trigger": return node.pulse||0;
    case "counter": return node.cnt||0;
    case "var":     return node.store||0;
    case "array":   { const arr=node.arr||[]; return arr[Math.floor(b())]||0; } // 入力1=インデックス
    case "getpos":  { const t=nodeById(node.parentNodeId); if(!t) return 0; // 親に指定したオブジェクト
      if((node.getCoord||"world")==="local" && t.parentNodeId){ return port===0?(t.lx||0):(t.ly||0); } // Local=親相対
      return port===0 ? (t.playX||0) : (t.playY||0); }
    case "getrot":  { const t=nodeById(node.parentNodeId); if(!t) return 0;
      if((node.getCoord||"world")==="local" && t.parentNodeId){ return t.la||0; }
      return t.playAngle!=null?t.playAngle:(t.angle||0); }
    // その他（黄）
    case "velocity":{ return port===0 ? (node._ovx||0) : (node._ovy||0); }
    case "contact": { // SENSOR：自分の矩形領域に対象オブジェクトの一部でも触れたら1
      const p=nodeById(node.parentNodeId); // 親がいれば無視対象＆基準。無くてもSensor単体で判定
      if(p&&destroyed.has(p.id)) return 0;
      // Sensorの判定領域（Rect固定）。play中はplayX/Y/Angle、無ければlayout位置
      const sensor={ playX:(node.playX!=null?node.playX:(node.layoutX||0)), playY:(node.playY!=null?node.playY:(node.layoutY||0)),
        playAngle:(node.playAngle!=null?node.playAngle:(node.angle||0)), w:node.w||60, h:node.h||60, type:"rect" };
      const tgt=node.contactTarget||"all";
      for(const o of nodes){ if(destroyed.has(o.id)) continue; if(p&&o.id===p.id) continue; // 親自身は対象外
        if(!NODE_TYPES[o.type].object) continue; // オブジェクト系のみ
        if(tgt==="tag"){ if((o.tag||"")!==(node.withTag||"")) continue; }
        else if(tgt!=="all"){ if(o.type!==tgt) continue; } // rect/circle/character/shot
        // 一部でも重なれば反応（円は表面基準、矩形はOBB/AABBで正確に）
        if(collideMTV(sensor,o)) return 1; }
      return 0; }
    case "onbreak": return node.pulseBrk||0;
    case "screen":  return port===0 ? W : H; // 出力0=画面幅, 出力1=画面高さ
  }
  return 0;
}

function startPlay(){
  if(mode==="edit"||mode==="layout") editModeMemory=mode;
  if(typeof closeFlick==="function" && isFlickOpen()) closeFlick(false); // フリックメニューを閉じる
  hideCreateMenu(); hideMultiMenu(); propNode=null; // 各種オーバーレイも閉じる
  mode="play";
  // レイアウトで置いた位置から開始 & 状態ノードをリセット
  nodes.forEach(n=>{
    if(isStage(n)){ n.playX=n.layoutX||0; n.playY=n.layoutY||0; n.vx=0; n.vy=0; n.grounded=false; n._roll=0; n._prevJ=0; n._still=0; n._asleep=false; n._pushMag=0; n._groundMem=0; n._anchorX=null; n._anchorY=null; n._tiltTargetId=null; n._tilting=false;
      n.playAngle=n.angle||0; n._lastX=n.playX; n._lastY=n.playY; n._vx=0; n._vy=0; n._rawvx=0; n._rawvy=0; n._face=1; n._spin=0; }
    if(attachesToObject(n)){ n.playX=n.layoutX||0; n.playY=n.layoutY||0; n.playAngle=n.angle||0; } // SENSOR等も判定用のplay位置を持つ
    if(n.type==="velocity"){ n._ovx=0; n._ovy=0; }
    if(n.type==="stick"){ n.stickX=0; n.stickY=0; n.stickPid=null; }
    if(n.type==="button"){ n.pressed=0; n.btnPid=null; }
    if(n.type==="shot"){ n._prevFire=0; n._shotCd=0; }
    if(n.type==="sound"){ n._prevPlay=0; stopTone(n); }
    if(n.type==="onbreak"){ n.pulseBrk=0; n._prevSig=0; }
    if(n.type==="counter") n.cnt=0;
    if(n.type==="var") n.store=(n.varInit||0);                 // 初期値を反映
    if(n.type==="array") n.arr=parseArrInit(n.arrInit);        // 初期値（, / 区切り）を反映
    if(n.type==="trigger"){ n._prevSig=0; n._delay=-1; n.pulse=0; }
    if(n.type==="random"){ n.rnd=null; n._prevT=0; n._rngState = n.useSeed ? ((n.seed||0)>>>0) : null; }
  });
  bullets=[]; effects=[]; playCam={x:0,y:0,s:1}; destroyed=new Set(); brokenThisFrame=new Set();
  touchX=0; touchY=0; touchDown=0;
  try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==="suspended") _audioCtx.resume(); }catch(e){} // 実機の音声許可
  // 親子ローカル座標を確定（Play中の追従に使用）
  nodes.forEach(n=>{ if((isStage(n)||attachesToObject(n))&&n.parentNodeId&&nodeById(n.parentNodeId)) recomputeLocal(n); });
  document.getElementById("pad").style.display="none"; // D-PADは表示しない（STICK/BUTTONノードで操作）
  document.getElementById("hint").classList.add("hidden"); // Play中はヒント非表示
  document.getElementById("menuBtn").style.display="none"; // Play中はMENU非表示
  // ストップボタン＝角丸正方形の枠だけ（枠色はSettingのStopBtnCol、既定は白）
  const sN=nodes.find(n=>n.type==="setting"); const stopCol=(sN&&sN.stopBtnColor)||"#ffffff";
  const b=document.getElementById("playBtn"); b.textContent=""; b.classList.add("stop"); b.style.background="";
  const sq=document.createElement("div"); sq.className="stopsq"; sq.style.borderColor=stopCol;
  const fill=document.createElement("div"); fill.className="holdfill"; sq.appendChild(fill); // 角丸正方形内で下から埋まる
  b.appendChild(sq);
  mBuildWorld(); // Matter物理ワールドを構築

function updateStatefulNodes(){

    switch(n.type){
      case "random": { const num=Math.max(1,Math.round(n.rndNum||1));
        const gen=()=> Math.floor(randUnit(n)*num); // 0〜(Number-1)のInt
        // 入力に0以外が入っている間は毎フレーム生成（1秒間にFPS回）。未接続なら常に生成

function playStep(dt){
  // KEY軸を確定（キーボード＋オンスクリーン）
  axisX = (keys.R||pad.R?1:0) - (keys.L||pad.L?1:0);
  axisY = (keys.D||pad.D?1:0) - (keys.U||pad.U?1:0);
  updateStatefulNodes();
  const settingNode = nodes.find(n=>n.type==="setting");
  // Gravity表記は9.8基準（9.8=旧1相当）。内部px/s^2 = (表示/9.8)*2000。Dynamics=OFFで0
  const gDisp = settingNode ? (settingNode.gravity!=null?settingNode.gravity:9.8) : 9.8;
  const G = (settingNode && settingNode.dynamics===false) ? 0 : (gDisp/9.8)*GRAV_SCALE;

  const S_FRIC = settingNode && settingNode.setFriction!=null ? settingNode.setFriction : 0.4;

  const objs = nodes.filter(n=>NODE_TYPES[n.type].object);

  // ROTATE：角速度を_spinに積算（関節）。子はRotの位置で回転して追従。親がいる場合はapplyHierarchyで親角度に加算
  for(const n of nodes){ if(n.type==="rotate"){ n._spin=(n._spin||0)+inputValue(n,0)*dt;
    if(!n.parentNodeId||!nodeById(n.parentNodeId)) n.playAngle=(n.angle||0)+n._spin; } }
  // SOUND：入力1=Signal(S)。sustain系は信号がある間鳴り、decay/効果音は立ち上がりで1発。入力0=Tone(T,接続時は上書き)
  for(const n of nodes){ if(n.type!=="sound") continue;
    const s=inputValue(n,1);
    const tone = conns.some(c=>c.b===n.id&&c.bi===0) ? inputValue(n,0) : (n.tone||0);
    const inst = n.inst || "piano";
    if(s!==0){ startOrUpdateTone(n, toneToFreq(tone), (n.volume!=null?n.volume:10), inst); }
    else { if(instrKind(inst)==="sustain") stopTone(n); n._sustaining=false; } // 信号OFFで持続音停止＆1発トリガー再武装
  }

  const bt = n => mBodyType(n);

  if(!mEngine) mBuildWorld();

  for(const id of Object.keys(mBodyOf)){ const n=nodeById(+id);
