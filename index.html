// 端子ドラッグのarm後カーソル（Unity版のhighlightCircle相当）＝半径大きめのリング
let portCursor={show:false, x:0, y:0};
function drawPortCursor(){
  if(!portCursor.show) return;
  const r=Math.max(24, (PORT_R*4)*view.s);
  // ワイヤードラッグ中：接続対象が無い間は赤、対象があれば黄
  let col="#ffcc00";
  if(drag && drag.kind==="wire"){
    const o=drag.origin; const pt=hitPort(portCursor.x, portCursor.y);
    const valid = pt && ((o.isInput && !pt.isInput) || (!o.isInput && pt.isInput));
    col = valid ? "#ffcc00" : "#ff5a5a";
  } else if(drag && drag.kind==="parentwire"){
    const child=nodeById(drag.node); let ok=false;
    for(let i=nodes.length-1;i>=0;i--){ const p=nodes[i]; if(!isCandidateParent(child,p)) continue;
      const bp=childPortPos(p); if(Math.hypot(portCursor.x-bp.x,portCursor.y-bp.y)<PORT_R*view.s+24){ ok=true; break; } }
    col = ok ? "#ffcc00" : "#ff5a5a";
  }
  ctx.beginPath(); ctx.arc(portCursor.x, portCursor.y, r, 0, 7);
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
}
function drawDragWire(){
  if(!drag) return;
  if(drag.kind==="wire"){
    const o=drag.origin; const on=nodeById(o.node); if(on){
      const op=portPos(on, o.isInput, o.port);
      // 固定端がOutput→カーソルへ、Input→カーソルから入力へ（向きを合わせる）
      if(o.isInput) drawWire({x:drag.sx,y:drag.sy}, op, "#ffcc00");
      else drawWire(op, {x:drag.sx,y:drag.sy}, "#ffcc00");
    }
  } else if(drag.kind==="parentwire"){
    const c=nodeById(drag.node);
    // カーソル（未来の親の下端）から下向きに出て、子の上端へ上から入る（確定ワイヤーと同じ向き）
    drawWireV({x:drag.sx,y:drag.sy}, parentPortPos(c), PARENT_COL);
  }
}

function drawNode(n){
  const d=NODE_TYPES[n.type];
  const tl=w2s(n.x-NS/2, n.y-NS/2);
  const w=NS*view.s, hh=NS*view.s;
  // 端子（丸のみ）を本体より先に描画＝見た目はノードの後ろ（当たり判定は不変）
  d.inputs.forEach((_,i)=> port(portPos(n,true,i),  IN_COL));
  d.outputs.forEach((_,i)=>port(portPos(n,false,i), OUT_COL));
  // 親子端子：上＝自分の親へつなぐ（子を持てるノード全て）／下＝子を受け入れる
  if(canHaveParent(n)) port(parentPortPos(n), PARENT_COL);
  const parentDrag = drag && drag.kind==="parentwire";
  const isCand = parentDrag && isCandidateParent(nodeById(drag.node), n);
  if(nodes.some(m=>m.parentNodeId===n.id) || isCand) port(childPortPos(n), isCand ? "#ffffff" : PARENT_COL);
  // 本体。NodeColor=Basic → オブジェクトもカテゴリ色(紫)。Display → Play表示色（テクスチャがあれば描画）
  roundRect(tl.x,tl.y,w,hh,16*view.s);
  // Display＝Play表示色（NodeEditorではテクスチャは反映しない） / Basic＝カテゴリ色(紫)
  ctx.fillStyle = (d.object && nodeColorMode()==="display") ? n.color : d.color; ctx.fill();
  const sel = (selected===n.id) || multiSel.has(n.id);
  ctx.strokeStyle = sel?"#ffffff":"rgba(0,0,0,.4)";
  ctx.lineWidth=sel?3:1.5; ctx.stroke();
  // 中央のシンボル（1〜3文字）をノードいっぱいに
  const g=nodeGlyph(n);
  const cx=tl.x+w/2, cy=tl.y+hh/2;
  ctx.font=`800 ${Math.round(glyphFontSize(g)*view.s)}px sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillText(g, cx+1.5, cy+1.5);
  ctx.fillStyle="#ffffff";        ctx.fillText(g, cx, cy);
  // 選択中は端子ラベルをノードの外側に表示
  if(selected===n.id){
    ctx.font=`${Math.round(48*view.s)}px sans-serif`; // 端子ラベル3倍（太字にしない）
    ctx.textBaseline="middle";
    const gap=(PORT_R+12)*view.s;
    // Unity準拠：端子が2つ以上ある側のみ1文字説明。ただし単一入力でもVisible(V)は表示（Button等）
    d.inputs.forEach((lab,i)=>{ if(d.inputs.length>=2 || lab==="V"){ const p=portPos(n,true,i); ctx.textAlign="right"; portLabel(lab, p.x-gap, p.y); } });
    if(d.outputs.length>=2) d.outputs.forEach((lab,i)=>{ const p=portPos(n,false,i); ctx.textAlign="left"; portLabel(lab, p.x+gap, p.y); });
  }
}
function portLabel(txt,x,y){
  ctx.fillStyle="rgba(0,0,0,.75)"; ctx.fillText(txt, x+1, y+1);
  ctx.fillStyle="#ffffff";         ctx.fillText(txt, x, y);
}
function port(p,ring){ ctx.beginPath(); ctx.arc(p.x,p.y,PORT_R*view.s,0,7);
  ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fill(); ctx.lineWidth=2.5*view.s; ctx.strokeStyle=ring; ctx.stroke(); }
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function roundRectTop(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// オブジェクトに付いた表示中テクスチャを取得（Visible入力が0なら非表示）
// NodeEditorでのオブジェクトノードの見た目：basic=カテゴリ色(紫) / display=Play表示色（テクスチャ含む）
function nodeColorMode(){ return appSettings.nodeColor||"basic"; } // 全プログラム共通のアプリ設定
function objVisibleTexture(obj){
  const texes = nodes.filter(m=>m.type==="texture" && m.parentNodeId===obj.id);
  for(const t of texes){
    const vis = conns.some(c=>c.b===t.id && c.bi===0) ? (inputValue(t,0)!==0) : true;
    if(vis) return t;
  }
  return null;
}
function drawTexInto(t,w,h,circle){
  const N=t.texW||16, cw=w/N, ch=h/N;
  if(circle){ ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,w/2,h/2,0,0,7); ctx.clip(); }
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){ const col=t.pixels[y*N+x]; if(!col) continue;
    ctx.fillStyle=col; ctx.fillRect(-w/2+x*cw, -h/2+y*ch, cw+0.6, ch+0.6); }
  if(circle) ctx.restore();
}
// オブジェクトを回転付きで描画（テクスチャがあればそれ、無ければ単色）
function drawObjShape(cx,cy,n,ang){
  const d=NODE_TYPES[n.type]; let w=n.w||80, h=n.h||80;
  if(d.object==="circle"){ w=h=Math.min(w,h); } // 真円：常に幅=高さ（楕円にしない）
  ctx.save(); ctx.translate(cx,cy); ctx.rotate((ang!=null?ang:(n.angle||0))*Math.PI/180);
  if(n.flip && n._face===-1) ctx.scale(-1,1); // 左向き反転
  const tex=objVisibleTexture(n);
  if(tex){ drawTexInto(tex, w, h, d.object==="circle"); }
  else {
    const frame=(n.objStyle==="frame"); // ObjectStyle: Fill / Frame(枠のみ)
    ctx.fillStyle=n.color; ctx.strokeStyle=n.color; ctx.lineWidth=Math.max(2,Math.min(w,h)*0.06);
    if(d.object==="circle"){ ctx.beginPath(); ctx.arc(0,0,w/2,0,7); frame?ctx.stroke():ctx.fill(); } // 真円
    else { frame?ctx.strokeRect(-w/2,-h/2,w,h):ctx.fillRect(-w/2,-h/2,w,h); }
  }
  ctx.restore();
}
// オブジェクト中心（画面座標・レイアウトビュー反映）
function objCenter(n){ return stageToScreenLayout(n.layoutX||0, n.layoutY||0); }
// ローカル(ステージ単位)→画面
function objFromLocal(n,lx,ly){ const a=(n.angle||0)*Math.PI/180;
  const wx=(n.layoutX||0)+lx*Math.cos(a)-ly*Math.sin(a), wy=(n.layoutY||0)+lx*Math.sin(a)+ly*Math.cos(a);
  return stageToScreenLayout(wx,wy); }
// 画面→ローカル(ステージ単位・回転考慮)
function objToLocal(n,sx,sy){ const p=screenToStageLayout(sx,sy), a=-(n.angle||0)*Math.PI/180;
  const dx=p.x-(n.layoutX||0), dy=p.y-(n.layoutY||0);
  return { x:dx*Math.cos(a)-dy*Math.sin(a), y:dx*Math.sin(a)+dy*Math.cos(a) }; }

// ステージ要素（オブジェクト/テキスト/スティック/ボタン/SHOT/ROTATE）を描画
function drawStage(cx,cy,n,ang){
  const d=NODE_TYPES[n.type];
  if(d.object){ drawObjShape(cx,cy,n,ang); return; }
  const w=n.w||140, h=n.h||140;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate((ang!=null?ang:(n.angle||0))*Math.PI/180);
  if(d.stage==="text"){
    let txt = n.text||"";
    if(conns.some(c=>c.b===n.id && c.bi===0)) txt = String(Math.round(inputValue(n,0)*100)/100); // val接続時は数値表示
    // フォントサイズはLayout枠に合わせる：まず枠高いっぱい、長くて幅に入らなければ縮小
    const padX=10, padY=6; let fs=Math.max(8,(h-padY*2));
    ctx.textAlign=n.align||"center"; ctx.textBaseline="middle";
    if(txt){ ctx.font=`800 ${fs}px sans-serif`; const tw=ctx.measureText(txt).width;
      const maxW=Math.max(1,w-padX*2); if(tw>maxW) fs=Math.max(6, fs*maxW/tw); }
    ctx.font=`800 ${fs}px sans-serif`;
    const ax = n.align==="left"?-(w)/2+padX : n.align==="right"?(w)/2-padX : 0;
    if(n.outline){ ctx.lineWidth=Math.max(2,fs*0.08); ctx.strokeStyle="#000"; ctx.lineJoin="round"; ctx.strokeText(txt, ax, 0); } // アウトライン
    else { ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillText(txt, ax+2, 2); } // 通常は影
    ctx.fillStyle=n.textColor||"#ffffff"; ctx.fillText(txt, ax, 0);
  } else if(d.stage==="stick"){
    const R=Math.min(w,h)/2; const col=n.color||"#e0892b"; const style=n.style||"frame";
    // FRAME/FILL は外側リングを描く。INNER は外側なし（内側の丸だけ）
    if(style!=="inner"){ ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke(); }
    // 内側の丸（ノブ）：FILL=塗り / FRAME・INNER=線のみ
    const kx=(n.stickX||0)*R*0.55, ky=(n.stickY||0)*R*0.55, kr=R*0.4;
    ctx.beginPath(); ctx.arc(kx,ky,kr,0,7); ctx.strokeStyle=col; ctx.lineWidth=3;
    if(style==="fill"){ ctx.fillStyle=col; ctx.fill(); } else { ctx.stroke(); }
  } else if(d.stage==="button"){
    const col=n.color||"#e0892b"; const fill=(n.style||"frame")==="fill";
    roundRect(-w/2,-h/2,w,h,14);
    // FILL=塗り / FRAME=枠だけ（押下時のみハイライト塗り）
    if(fill || n.pressed){ ctx.globalAlpha = n.pressed ? 0.9 : 0.6; ctx.fillStyle=col; ctx.fill(); ctx.globalAlpha=1; }
    ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
  } else if(d.stage==="shot"){ // 発射口（三角）
    ctx.fillStyle=n.color; ctx.beginPath(); ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2); ctx.lineTo(-w/2,h/2); ctx.closePath(); ctx.fill();
  } else if(d.stage==="rotate"){ // 回転ピボット（Play中は非表示）
    if(mode!=="play"){ const R=Math.min(w,h)/2; ctx.strokeStyle=n.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-R,0); ctx.lineTo(R,0); ctx.moveTo(0,-R); ctx.lineTo(0,R); ctx.stroke(); }
  } else if(attachesToObject(n)){ // SENSOR/ONBREAK/TEXTURE：レイアウト用のマーカー（Play中は非表示）
    if(mode!=="play"){ const R=Math.min(w,h)/2; const col=n.color||d.color;
      ctx.setLineDash([6,4]); ctx.strokeStyle=col; ctx.lineWidth=2.5;
      if(n.type==="contact"||n.type==="onbreak"){ ctx.strokeRect(-w/2,-h/2,w,h); } // SENSOR/ONBREAKは矩形マーカー(ONBREAKは正方形=エフェクト範囲)
      else { ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.stroke(); }
      ctx.setLineDash([]);
      ctx.fillStyle=col; ctx.font=`800 ${Math.round(R*0.7)}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(nodeGlyph(n), 0, 0); }
  }
  ctx.restore();
}

function drawLayout(){
  // 外側（Play表示領域の外）
  ctx.fillStyle="#0a0b10"; ctx.fillRect(0,0,W,H);
  const S=layoutView.s;
  ctx.save();
  ctx.translate(W/2,H/2); ctx.scale(S,S); ctx.translate(-layoutView.x,-layoutView.y);
  // Play表示領域（画面サイズ相当）を暗いグレーで（Unity版と同じ）
  ctx.fillStyle="#20232b"; ctx.fillRect(-W/2,-H/2,W,H);
  ctx.strokeStyle="#3a4150"; ctx.lineWidth=2/S; ctx.strokeRect(-W/2,-H/2,W,H);
  // 中央十字ガイド
  ctx.strokeStyle="#2a313d"; ctx.lineWidth=1/S;
  ctx.beginPath(); ctx.moveTo(0,-H/2); ctx.lineTo(0,H/2); ctx.moveTo(-W/2,0); ctx.lineTo(W/2,0); ctx.stroke();
  // ステージ要素＋付随ノード（ステージ座標で描画）。Layer昇順で描画（Play画面と同じ表示順）
  const layoutList = nodes.filter(showsInLayout).slice().sort((a,b)=>(a.layer||50)-(b.layer||50));
  for(const n of layoutList){ drawStage(n.layoutX||0, n.layoutY||0, n); }
  ctx.restore();
  // 複数選択のアウトライン＆ハンドル（スクリーン空間）
  for(const n of nodes){ if(!showsInLayout(n)) continue;
    if(multiSel.has(n.id) && selected!==n.id){
      const hw=(n.w||80)/2*layoutView.s, hh=(n.h||80)/2*layoutView.s;
      ctx.save(); ctx.translate(objCenter(n).x,objCenter(n).y); ctx.rotate((n.angle||0)*Math.PI/180);
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=2; ctx.strokeRect(-hw,-hh,hw*2,hh*2); ctx.restore();
    }
    if(selected===n.id) drawHandles(n);
  }
  drawSelBox();
  if(!nodes.some(showsInLayout)){
    ctx.fillStyle="#5a6270"; ctx.font="20px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("画面長押しでノードを選択してください", W/2, H/2-40);
  }
}
// 選択オブジェクトのハンドル（四隅=リサイズ、上=回転）
const HANDLE_R=15;
function handlePositions(n){
  const hw=(n.w||80)/2, hh=(n.h||80)/2;
  const a=(n.angle||0)*Math.PI/180, c=objCenter(n), d=hh*layoutView.s+40;
  return {
    corners:[ objFromLocal(n,-hw,-hh), objFromLocal(n,hw,-hh), objFromLocal(n,-hw,hh), objFromLocal(n,hw,hh) ],
    rot: { x:c.x + d*Math.sin(a), y:c.y - d*Math.cos(a) }
  };
}
function drawHandles(n){
  const hp=handlePositions(n);
  const hw=(n.w||80)/2*layoutView.s, hh=(n.h||80)/2*layoutView.s;
  ctx.save(); ctx.translate(objCenter(n).x,objCenter(n).y); ctx.rotate((n.angle||0)*Math.PI/180);
  ctx.strokeStyle="#7fdcff"; ctx.lineWidth=2; ctx.strokeRect(-hw,-hh,hw*2,hh*2);
  ctx.beginPath(); ctx.moveTo(0,-hh); ctx.lineTo(0,-hh-40); ctx.stroke(); // 回転レバー
  ctx.restore();
  ctx.fillStyle="#ffffff"; ctx.strokeStyle="#21b3d6"; ctx.lineWidth=2;
  for(const c of hp.corners){ ctx.beginPath(); ctx.rect(c.x-HANDLE_R,c.y-HANDLE_R,HANDLE_R*2,HANDLE_R*2); ctx.fill(); ctx.stroke(); }
  ctx.beginPath(); ctx.arc(hp.rot.x,hp.rot.y,HANDLE_R,0,7); ctx.fillStyle="#7fdcff"; ctx.fill(); ctx.stroke();
}

function drawPlay(){
  // 背景（BGノードがあればその色）
  const bgNode = nodes.find(n=>n.type==="bg");
  ctx.fillStyle = bgNode ? (bgNode.color||"#0a0b10") : "#0a0b10"; ctx.fillRect(0,0,W,H);
  const camX=playCam.x, camY=playCam.y, camS=playCam.s||1;
  const uiTypes = new Set(["stick","button"]);
  const drawList = nodes.filter(n=>isStage(n) && !destroyed.has(n.id)
    && n.type!=="shot"                                                  // SHOT本体（発射口）はPlayに出さない
    && !((n.type==="stick"||n.type==="button") && uiCtrlHidden(n))
    && !objHidden(n));
  drawList.sort((a,b)=>(a.layer||50)-(b.layer||50));
  const worldList=drawList.filter(n=>!uiTypes.has(n.type)), uiList=drawList.filter(n=>uiTypes.has(n.type));
  // ワールド層（SCREENのScaleを画面中央基準で適用）
  ctx.save(); ctx.translate(W/2,H/2); ctx.scale(camS,camS); ctx.translate(-W/2,-H/2);
  for(const n of worldList) drawStage(W/2+n.playX+camX, H/2+n.playY+camY, n, (n.playAngle!=null?n.playAngle:n.angle));
  for(const b of bullets){ ctx.fillStyle=b.color||"#ffe08a"; const s=b.size||28, cx=W/2+b.x+camX, cy=H/2+b.y+camY;
    if(b.shape==="rect"){ ctx.fillRect(cx-s/2, cy-s/2, s, s); }
    else { ctx.beginPath(); ctx.arc(cx, cy, s/2, 0, 7); ctx.fill(); } }
  drawEffects(camX,camY); // ONBREAKエフェクト
  ctx.restore();
  // UI（STICK/BUTTON）は画面固定・スケール非適用
  for(const n of uiList) drawStage(W/2+n.playX, H/2+n.playY, n, (n.playAngle!=null?n.playAngle:n.angle));
  // 画面向き警告（SETTINGでYOKO/TATE指定時）
  const setN=nodes.find(n=>n.type==="setting");
  if(setN){ const wantTate=setN.orient==="tate", isLandscape=W>H;
    if((wantTate&&isLandscape)||(!wantTate&&!isLandscape)){
      ctx.fillStyle="rgba(0,0,0,.8)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#fff"; ctx.font="300 24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(wantTate?"画面をタテにしてください":"画面をヨコにしてください", W/2, H/2);
    }
  }
}

// =====================================================================
//  入力（ポインタ）
// =====================================================================
let drag=null;       // {kind:'node'|'pan'|'wire', ...}
let selected=null;
let multiSel=new Set();   // 矩形選択された複数ノード（Editor）
let lastBgDown=0, lastBgPos={x:0,y:0};
let lastNodeTap={id:null,t:0,x:0,y:0}; // ノードのダブルクリック検出
function isNodeDblTap(id,sx,sy){ const now=performance.now();
  const dbl=(lastNodeTap.id===id)&&(now-lastNodeTap.t<350)&&Math.hypot(sx-lastNodeTap.x,sy-lastNodeTap.y)<30;
  lastNodeTap={id,t:now,x:sx,y:sy}; return dbl; }
let pointerMoved=false;
let lastPtr={x:0,y:0}; // 最新のポインタ画面座標（端スクロール判定用）

function hitPort(sx,sy){
  const R = PORT_R*view.s + 18; // 指でも押しやすい判定
  // 端子が3個以上で重なっていても、カーソルに最も近い端子を選ぶ
  let best=null, bestD=R;
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; const d=NODE_TYPES[n.type];
    for(let j=0;j<d.outputs.length;j++){ const p=portPos(n,false,j); const dd=Math.hypot(sx-p.x,sy-p.y);
      if(dd<bestD){ bestD=dd; best={node:n.id,isInput:false,port:j}; } }
    for(let j=0;j<d.inputs.length;j++){ const p=portPos(n,true,j); const dd=Math.hypot(sx-p.x,sy-p.y);
      if(dd<bestD){ bestD=dd; best={node:n.id,isInput:true,port:j}; } }
    if(best) break; // 最前面のノードを優先（このノード内で最近端子を採用）
  }
  return best;
}
function hitNode(sx,sy){
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i];
    const tl=w2s(n.x-NS/2,n.y-NS/2), w=NS*view.s, hh=NS*view.s;
    if(sx>=tl.x&&sx<=tl.x+w&&sy>=tl.y&&sy<=tl.y+hh){
      return {node:n.id};
    }
  }
  return null;
}
// 上端の親端子（子側）をヒット
function hitParentPort(sx,sy){
  const R=PORT_R*view.s+18;
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; if(!canHaveParent(n)) continue;
    const tp=parentPortPos(n); if(Math.hypot(sx-tp.x,sy-tp.y)<R) return n; }
  return null;
}

let lpTimer=null, lpX=0, lpY=0;
function cancelLongPress(){ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } }
let portArmTimer=null;
function cancelPortArm(){ if(portArmTimer){ clearTimeout(portArmTimer); portArmTimer=null; } }

// レイアウト画面：オブジェクトの当たり判定（回転考慮）。上に描かれる(Layer大)ものを優先選択
function hitLayoutObject(sx,sy){
  const list=nodes.filter(showsInLayout).slice()
    .sort((a,b)=>((b.layer||50)-(a.layer||50)) || (nodes.indexOf(b)-nodes.indexOf(a))); // Layer降順→後勝ち
  for(const n of list){
    const l=objToLocal(n,sx,sy);
    if(Math.abs(l.x)<=(n.w||80)/2 && Math.abs(l.y)<=(n.h||80)/2) return n;
  }
  return null;
}
// 選択オブジェクトのハンドル判定
function hitHandle(sx,sy){
  if(selected==null) return null;
  const n=nodeById(selected); if(!n || !(isStage(n)||n.type==="contact"||n.type==="onbreak")) return null; // SENSOR/ONBREAKもハンドル操作可
  const hp=handlePositions(n);
  if(Math.hypot(sx-hp.rot.x,sy-hp.rot.y)<HANDLE_R+8) return {kind:"rotate"};
  for(const c of hp.corners){ if(Math.hypot(sx-c.x,sy-c.y)<HANDLE_R+8) return {kind:"resize"}; }
  return null;
}
function onDown(sx,sy){
  if(mode==="layout"){
    if(isCreateMenuOpen()){ hideCreateMenu(); drag=null; return; }
    if(isMultiMenuOpen()){ hideMultiMenu(); drag=null; return; }
    const hd=hitHandle(sx,sy);
    if(hd){ recordUndo(); drag={kind:hd.kind, node:selected}; return; }
    const n=hitLayoutObject(sx,sy);
    if(n){
      if(multiSel.has(n.id)){ // 複数選択をまとめて移動＋長押しメニュー
        recordUndo();
        const p=screenToStageLayout(sx,sy);
        drag={kind:"layoutgroup", items:[...multiSel].map(id=>{const nn=nodeById(id); return {id, dx:(nn.layoutX||0)-p.x, dy:(nn.layoutY||0)-p.y};})};
        lpX=sx; lpY=sy; cancelLongPress();
        lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showMultiMenu(lpX,lpY); }, 450);
        return;
      }
      multiSel.clear();
      selected=n.id;
      // ダブルクリックでも Property を開く
      if(isNodeDblTap(n.id,sx,sy)){ cancelLongPress(); drag=null; openProp(n.id); return; }
      recordUndo();
      const p=screenToStageLayout(sx,sy);
      drag={kind:"layout", node:n.id, dx:(n.layoutX||0)-p.x, dy:(n.layoutY||0)-p.y};
      lpX=sx; lpY=sy; cancelLongPress();
      const nid=n.id; lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; openProp(nid); }, 450);
    } else {
      // 背景：ダブルクリックからドラッグ＝矩形選択、そうでなければパン
      const now=performance.now();
      const isDbl=(now-lastBgDown<350)&&Math.hypot(sx-lastBgPos.x,sy-lastBgPos.y)<30;
      lastBgDown=now; lastBgPos={x:sx,y:sy};
      selected=null; propNode=null; refreshProp();
      if(isDbl){ multiSel.clear(); cancelLongPress(); drag={kind:"selboxL", x0:sx,y0:sy,x1:sx,y1:sy}; return; }
      multiSel.clear();
      drag={kind:"layoutpan", sx, sy, vx:layoutView.x, vy:layoutView.y}; // 背景ドラッグでビュー移動
      // 背景長押し → Create New Node メニュー（Layout画面でも有効）
      lpX=sx; lpY=sy; cancelLongPress();
      lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showCreateMenu(lpX,lpY); }, 450);
    }
    return;
  }
  if(mode!=="edit") return;
  // メニューが開いていれば閉じるだけ
  if(isCreateMenuOpen()){ hideCreateMenu(); drag=null; return; }
  if(isMultiMenuOpen()){ hideMultiMenu(); drag=null; return; }
  pointerMoved=false;
  // ノード本体を触っている時はノード操作（移動）を優先＝本体上では端子扱いにしない
  const hn=hitNode(sx,sy);
  if(!hn){
    // 本体外でのみ端子操作。上端の親端子（0.2秒armしてから開始）
    const pp=hitParentPort(sx,sy);
    if(pp){ drag={kind:"portpending", parent:pp, downSx:sx, downSy:sy, armed:false, dead:false, panVX:view.x, panVY:view.y, sx, sy};
      cancelPortArm();
      portArmTimer=setTimeout(()=>{ portArmTimer=null; if(drag&&drag.kind==="portpending"&&!drag.dead){ drag.armed=true; portCursor={show:true, x:drag.sx, y:drag.sy}; } }, 200);
      return; }
    const pt=hitPort(sx,sy);
    if(pt){ drag={kind:"portpending", pt, downSx:sx, downSy:sy, armed:false, dead:false, panVX:view.x, panVY:view.y, sx, sy};
      cancelPortArm();
      portArmTimer=setTimeout(()=>{ portArmTimer=null; if(drag&&drag.kind==="portpending"&&!drag.dead){ drag.armed=true; portCursor={show:true, x:drag.sx, y:drag.sy}; } }, 200);
      return;
    }
  }
  if(hn){
    if(multiSel.has(hn.node)){ // 複数選択をまとめて移動＋長押しメニュー
      recordUndo();
      const wp=s2w(sx,sy);
      drag={kind:"nodegroup", items:[...multiSel].map(id=>{const nn=nodeById(id); return {id, dx:nn.x-wp.x, dy:nn.y-wp.y};})};
      lpX=sx; lpY=sy; cancelLongPress();
      lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showMultiMenu(lpX,lpY); }, 450);
      return;
    }
    multiSel.clear();
    selected=hn.node;
    // ダブルクリックでも Property を開く
    if(isNodeDblTap(hn.node,sx,sy)){ cancelLongPress(); drag=null; openProp(hn.node); return; }
    recordUndo();
    const n=nodeById(hn.node);
    drag={kind:"node", node:hn.node, dx:n.x-s2w(sx,sy).x, dy:n.y-s2w(sx,sy).y};
    // ノード長押し → Property パネルを開く
    lpX=sx; lpY=sy; cancelLongPress();
    const nid=hn.node;
    lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; openProp(nid); }, 450);
    return;
  }
  // 背景：ダブルクリックからのドラッグ＝矩形範囲選択
  const now=performance.now();
  const isDbl=(now-lastBgDown<350)&&Math.hypot(sx-lastBgPos.x,sy-lastBgPos.y)<30;
  lastBgDown=now; lastBgPos={x:sx,y:sy};
  selected=null; propNode=null; refreshProp();
  if(isDbl){ cancelLongPress(); multiSel.clear(); drag={kind:"selbox", x0:sx, y0:sy, x1:sx, y1:sy}; return; }
  multiSel.clear();
  drag={kind:"pan", sx, sy, vx:view.x, vy:view.y};
  // 背景長押し → Create New Node メニュー
  lpX=sx; lpY=sy; cancelLongPress();
  lpTimer=setTimeout(()=>{ lpTimer=null; drag=null; showCreateMenu(lpX,lpY); }, 450);
}
function onMove(sx,sy){
  lastPtr={x:sx,y:sy}; // 端スクロール用に最新位置を保持
  // 少しでもドラッグ移動したら長押し(Property/メニュー)は発火させない
  if(lpTimer && Math.hypot(sx-lpX,sy-lpY)>4) cancelLongPress();
  if(!drag) return;
  pointerMoved=true;
  // 実際に移動を伴うドラッグ中は長押しを常にキャンセル（ゆっくり動かしてもPropertyを開かない）
  if(lpTimer && (drag.kind==="node"||drag.kind==="nodegroup"||drag.kind==="layout"||drag.kind==="layoutgroup"||drag.kind==="resize"||drag.kind==="rotate")) cancelLongPress();
  if(drag.kind==="pan"){ view.x=drag.vx-(sx-drag.sx)/view.s; view.y=drag.vy-(sy-drag.sy)/view.s; }
  else if(drag.kind==="node"){ const wp=s2w(sx,sy); const n=nodeById(drag.node); if(n){ n.x=wp.x+drag.dx; n.y=wp.y+drag.dy; } }
  else if(drag.kind==="nodegroup"){ const wp=s2w(sx,sy); for(const it of drag.items){ const n=nodeById(it.id); if(n){ n.x=wp.x+it.dx; n.y=wp.y+it.dy; } } }
  else if(drag.kind==="selbox"){ drag.x1=sx; drag.y1=sy; }
  else if(drag.kind==="layout"){ const n=nodeById(drag.node); if(n){
    const p=screenToStageLayout(sx,sy);
    n.layoutX=p.x+drag.dx; n.layoutY=p.y+drag.dy;
    if(n.parentNodeId) recomputeLocal(n);  // 親に対する相対を更新
    updateSubtreeWorld(n);                 // 子孫を追従
  } }
  else if(drag.kind==="layoutgroup"){ const p=screenToStageLayout(sx,sy);
    for(const it of drag.items){ const n=nodeById(it.id); if(n){ n.layoutX=p.x+it.dx; n.layoutY=p.y+it.dy;
      if(n.parentNodeId) recomputeLocal(n); updateSubtreeWorld(n); } } }
  else if(drag.kind==="selboxL"){ drag.x1=sx; drag.y1=sy; }
  else if(drag.kind==="layoutpan"){ layoutView.x=drag.vx-(sx-drag.sx)/layoutView.s; layoutView.y=drag.vy-(sy-drag.sy)/layoutView.s; }
  else if(drag.kind==="resize"){ const n=nodeById(drag.node); if(n){ const l=objToLocal(n,sx,sy);
    if(n.type==="circle"){ const r=Math.max(8,Math.round(Math.hypot(l.x,l.y))); n.w=r*2; n.h=r*2; } // 真円：縦横同時
    else if(n.type==="onbreak"){ const s=Math.max(16,Math.round(Math.max(Math.abs(l.x),Math.abs(l.y))*2)); n.w=s; n.h=s; } // ONBREAK：正方形
    else { n.w=Math.max(16,Math.round(Math.abs(l.x)*2)); n.h=Math.max(16,Math.round(Math.abs(l.y)*2)); } } }
  else if(drag.kind==="rotate"){ const n=nodeById(drag.node); if(n){ const c=objCenter(n);
    const raw=Math.atan2(sy-c.y,sx-c.x)*180/Math.PI + 90;
    n.angle=Math.round(raw/5)*5;           // 5度刻み
    if(n.parentNodeId) recomputeLocal(n);  // 自分の角度が変わったら相対角度を更新
    updateSubtreeWorld(n);                 // 子を親座標系で回転・移動
  } }
  else if(drag.kind==="wire"){ drag.sx=sx; drag.sy=sy; portCursor={show:true, x:sx, y:sy}; }
  else if(drag.kind==="parentwire"){ drag.sx=sx; drag.sy=sy; portCursor={show:true, x:sx, y:sy}; }
  else if(drag.kind==="portpending"){
    const dist=Math.hypot(sx-drag.downSx, sy-drag.downSy);
    if(!drag.armed){
      if(!drag.dead && dist>25){ drag.dead=true; cancelPortArm(); } // arm前に大きく動いた＝パン扱い
      if(drag.dead){ view.x=drag.panVX-(sx-drag.downSx)/view.s; view.y=drag.panVY-(sy-drag.downSy)/view.s; } // パン
    } else {
      drag.sx=sx; drag.sy=sy; portCursor={show:true, x:sx, y:sy};
      if(dist>6){ // arm後に動いたらワイヤー編集開始
        if(drag.parent){ drag={kind:"parentwire", node:drag.parent.id, sx, sy}; portCursor={show:true, x:sx, y:sy}; }
        else beginWireDrag(drag.pt, sx, sy);
      }
    }
  }
}
// portpending から実ワイヤードラッグへ
//  ・出力端子：常に新規ワイヤー作成（接続済みでもfan-out。既存ワイヤーは残す）
//  ・入力端子（接続済み）：接続解除（元のOutputを掴んで引き離す。遠くで離すと削除、他入力で付け替え可）
function beginWireDrag(pt, sx, sy){
  let origin;
  if(pt.isInput){
    const c=conns.find(cc=>cc.b===pt.node&&cc.bi===pt.port);
    if(c){ recordUndo(); conns=conns.filter(x=>x!==c); origin={node:c.a, port:c.ao, isInput:false}; } // 接続解除へ移行
    else { origin={node:pt.node, port:pt.port, isInput:true}; } // 空きInputから逆向きに新規
  } else {
    origin={node:pt.node, port:pt.port, isInput:false}; // 出力は常に新規ワイヤー
  }
  drag={kind:"wire", origin, sx, sy};
  portCursor={show:true, x:sx, y:sy};
}
function onUp(sx,sy){
  cancelLongPress(); cancelPortArm(); portCursor={show:false,x:0,y:0};
  if(drag && drag.kind==="wire"){
    const pt=hitPort(sx,sy); const o=drag.origin;
    // 端子上で離せば接続（向きが合う場合）。十分離れた場所で離すとワイヤー削除（付け替えは既に外してある）。
    if(pt){
      if(o.isInput && !pt.isInput){ recordUndo(); connect(pt.node, pt.port, o.node, o.port); }
      else if(!o.isInput && pt.isInput){ recordUndo(); connect(o.node, o.port, pt.node, pt.port); }
    }
  }
  if(drag && drag.kind==="parentwire"){
    recordUndo();
    const child=nodeById(drag.node);
    let target=null;
    for(let i=nodes.length-1;i>=0;i--){ const p=nodes[i]; if(!isCandidateParent(child,p)) continue;
      const bp=childPortPos(p); const nearPort=Math.hypot(sx-bp.x,sy-bp.y)<PORT_R*view.s+24;
      const tl=w2s(p.x-NS/2,p.y-NS/2), w=NS*view.s;
      const inBody = sx>=tl.x&&sx<=tl.x+w&&sy>=tl.y&&sy<=tl.y+w;
      if(nearPort||inBody){ target=p; break; } }
    if(child){ child.parentNodeId = target ? target.id : null; if(target) recomputeLocal(child); } // 空きで離すと解除
  }
  if(drag && drag.kind==="selbox"){
    const x0=Math.min(drag.x0,drag.x1), x1=Math.max(drag.x0,drag.x1);
    const y0=Math.min(drag.y0,drag.y1), y1=Math.max(drag.y0,drag.y1);
    multiSel.clear();
    for(const n of nodes){ const p=w2s(n.x,n.y); if(p.x>=x0&&p.x<=x1&&p.y>=y0&&p.y<=y1) multiSel.add(n.id); }
  }
  if(drag && drag.kind==="selboxL"){
    const x0=Math.min(drag.x0,drag.x1), x1=Math.max(drag.x0,drag.x1);
    const y0=Math.min(drag.y0,drag.y1), y1=Math.max(drag.y0,drag.y1);
    multiSel.clear();
    for(const n of nodes){ if(!showsInLayout(n)) continue; const c=objCenter(n); if(c.x>=x0&&c.x<=x1&&c.y>=y0&&c.y<=y1) multiSel.add(n.id); }
  }
  drag=null;
}

// ===== Play中の画面コントロール（STICK/BUTTON/TOUCH）=====
function playDown(pid,sx,sy){
  touchDown=1; touchX=sx-W/2; touchY=sy-H/2; // TOUCHノード用
  // 上のものから判定
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; const d=NODE_TYPES[n.type];
    if(!(d.stage==="stick"||d.stage==="button")) continue;
    if(uiCtrlHidden(n)) continue;
    const l=playObjToLocal(n,sx,sy); const R=Math.min(n.w||150,n.h||150)/2;
    const hit = (d.stage==="stick") ? (Math.hypot(l.x,l.y)<=R) : (Math.abs(l.x)<=(n.w||150)/2 && Math.abs(l.y)<=(n.h||150)/2);
    if(hit){
      if(d.stage==="stick"){ n.stickPid=pid; updateStick(n,l,R); }
      else { n.btnPid=pid; n.pressed=1; }
      return;
    }
  }
}
// STICK/BUTTONの表示・当たり判定を隠すか（STYLE=OFF / VISIBLE=false / Hide on PC）
function uiCtrlHidden(n){ if((n.style||"frame")==="off") return true; if(n.visible===false) return true;
  if(n.hideOnPc && !IS_TOUCH) return true;
  if(conns.some(c=>c.b===n.id&&c.bi===0) && inputValue(n,0)===0) return true; // 入力0=可視性(V)
  return false; }
// オブジェクト/テキストの可視性入力（Rect/Circle 入力2, Text 入力1）が0なら非表示。Visibleプロパティも反映
function objHidden(n){
  if(NODE_TYPES[n.type].object && n.visible===false) return true; // Visibleプロパティ
  if(n.type==="rect"||n.type==="circle"){ return conns.some(c=>c.b===n.id&&c.bi===2) && inputValue(n,2)===0; }
  if(n.type==="text"){ return conns.some(c=>c.b===n.id&&c.bi===1) && inputValue(n,1)===0; }
  return false; }
function updateStick(n,l,R){ let x=l.x/R, y=l.y/R; const m=Math.hypot(x,y); if(m>1){ x/=m; y/=m; } n.stickX=x; n.stickY=y; }
// Play中のローカル座標（画面固定・1:1。レイアウトのズーム/パンに依存しない）
function playObjToLocal(n,sx,sy){ const a=-((n.playAngle!=null?n.playAngle:(n.angle||0))*Math.PI/180);
  const dx=sx-(W/2+(n.playX||0)), dy=sy-(H/2+(n.playY||0));
  return { x:dx*Math.cos(a)-dy*Math.sin(a), y:dx*Math.sin(a)+dy*Math.cos(a) }; }
function playMove(pid,sx,sy){
  touchX=sx-W/2; touchY=sy-H/2;
  for(const n of nodes){ const d=NODE_TYPES[n.type];
    if(d.stage==="stick" && n.stickPid===pid){ const R=Math.min(n.w||150,n.h||150)/2; updateStick(n,playObjToLocal(n,sx,sy),R); }
  }
}
function playUp(pid){
  touchDown=0;
  for(const n of nodes){ const d=NODE_TYPES[n.type];
    if(d.stage==="stick" && n.stickPid===pid){ n.stickPid=null; n.stickX=0; n.stickY=0; }
    if(d.stage==="button" && n.btnPid===pid){ n.btnPid=null; n.pressed=0; }
  }
}

// ===== テクスチャエディタ =====
let texEditNode=null, texColor="#ffffff", texMode="draw", texPressed=false, texGeom=null; // texMode: draw / erase / pick
// 作業用パレット（8色）＋選択インデックス。長押しで通常パレットから色変更可
let texWork=["#ffffff","#000000","#ff5a5a","#4ade80","#3ba7ff","#ffe08a","#e0892b","#c084fc"];
let texSel=0;
function updateTexModeUI(){
  const d=document.getElementById("texDraw"), e=document.getElementById("texErase"), pk=document.getElementById("texPick");
  if(d) d.classList.toggle("active", texMode==="draw");
  if(e) e.classList.toggle("active", texMode==="erase");
  if(pk) pk.classList.toggle("active", texMode==="pick");
}
function buildTexWork(){
  const cont=document.getElementById("texWork"); if(!cont) return; cont.innerHTML="";
  texWork.forEach((col,i)=>{
    const sw=document.createElement("div"); sw.className="tsw"+(i===texSel?" sel":""); sw.style.background=col;
    let lp=null;
    sw.addEventListener("pointerdown",ev=>{ ev.stopPropagation();
      lp=setTimeout(()=>{ lp=null; openColorPicker(texWork[i], c=>{ texWork[i]=c; texSel=i; texColor=c; texMode="draw"; updateTexModeUI(); buildTexWork(); }); }, 500); });
    sw.addEventListener("pointerup",ev=>{ ev.stopPropagation(); if(lp){ clearTimeout(lp); lp=null; texSel=i; texColor=texWork[i]; if(texMode==="erase")texMode="draw"; updateTexModeUI(); buildTexWork(); } });
    sw.addEventListener("pointercancel",()=>{ if(lp){clearTimeout(lp);lp=null;} });
    cont.appendChild(sw);
  });
}
// テクスチャのサイズ変更（画像をなるべく残す＝最近傍リサンプル）
function resizeTexture(n,newN){ const oldN=n.texW||16; if(newN===oldN) return;
  const np=new Array(newN*newN).fill(null);
  for(let y=0;y<newN;y++) for(let x=0;x<newN;x++){ const sx=Math.min(oldN-1,Math.floor(x*oldN/newN)), sy=Math.min(oldN-1,Math.floor(y*oldN/newN));
    np[y*newN+x]=n.pixels[sy*oldN+sx]; }
  n.texW=newN; n.texH=newN; n.pixels=np;
}
function openTexEditor(id){ texEditNode=id; mode="texedit"; propNode=null; refreshProp();
  buildTexWork(); texColor=texWork[texSel]; texMode="draw"; updateTexModeUI();
  document.getElementById("texBar").style.display="flex";
  document.getElementById("texCloseBtn").style.display="block";
  document.getElementById("menuBtn").style.display="none";
  document.getElementById("playBtn").style.display="none";
}
function closeTexEditor(){ texEditNode=null; mode="edit";
  document.getElementById("texBar").style.display="none";
  document.getElementById("texCloseBtn").style.display="none";
  document.getElementById("menuBtn").style.display="flex";
  document.getElementById("playBtn").style.display="flex";
}
function drawTexEditor(){
  ctx.fillStyle="#0d1017"; ctx.fillRect(0,0,W,H);
  const n=nodeById(texEditNode); if(!n){ texGeom=null; return; }
  const N=n.texW||16;
  const leftPad=104; // 左のツールパネル分をあける
  const avail=Math.min(W-leftPad-24, H-70);
  const cell=Math.floor(avail/N), size=cell*N;
  const ox=leftPad + Math.floor((W-leftPad-size)/2), oy=Math.floor((H-size)/2)+8;
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){ const px=ox+x*cell, py=oy+y*cell;
    ctx.fillStyle=((x+y)&1)?"#20242e":"#171a22"; ctx.fillRect(px,py,cell,cell);  // 透明チェッカー
    const col=n.pixels[y*N+x]; if(col){ ctx.fillStyle=col; ctx.fillRect(px,py,cell,cell); } }
  ctx.strokeStyle="rgba(255,255,255,.10)"; ctx.lineWidth=1;
  for(let i=0;i<=N;i++){ ctx.beginPath(); ctx.moveTo(ox+i*cell,oy); ctx.lineTo(ox+i*cell,oy+size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox,oy+i*cell); ctx.lineTo(ox+size,oy+i*cell); ctx.stroke(); }
  texGeom={ox,oy,cell,N};
}
function texPaint(sx,sy){ const n=nodeById(texEditNode); if(!n||!texGeom) return;
  const {ox,oy,cell,N}=texGeom; const x=Math.floor((sx-ox)/cell), y=Math.floor((sy-oy)/cell);
  if(x<0||y<0||x>=N||y>=N) return;
  if(texMode==="pick"){ const c=n.pixels[y*N+x]; if(c){ texWork[texSel]=c; texColor=c; buildTexWork(); } return; } // 色をPick
  n.pixels[y*N+x]= (texMode==="erase") ? null : texColor;
}
document.getElementById("texDraw").onclick=()=>{ texMode="draw"; updateTexModeUI(); };
document.getElementById("texErase").onclick=()=>{ texMode="erase"; updateTexModeUI(); };
document.getElementById("texPick").onclick=()=>{ texMode="pick"; updateTexModeUI(); };
document.getElementById("texCloseBtn").onclick=closeTexEditor;

// pointer events（Editor/Layout は2本指ピンチでズーム＆パン）
const ptrs=new Map(); let pinchPrev=null;
function activeView(){ return mode==="layout"?layoutView:view; }
function doPinch(){
  const pts=[...ptrs.values()]; if(pts.length<2) return;
  const a=pts[0], b=pts[1];
  const dist=Math.hypot(a.x-b.x,a.y-b.y), mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  if(pinchPrev){
    const V=activeView(); const minS=(mode==="layout")?0.075:0.15;
    const bx=(mx-W/2)/V.s+V.x, by=(my-H/2)/V.s+V.y;
    V.s=Math.min(3,Math.max(minS, V.s*(dist/pinchPrev.dist)));
    const ax=(mx-W/2)/V.s+V.x, ay=(my-H/2)/V.s+V.y;
    V.x+=bx-ax; V.y+=by-ay;                         // ピンチ中心を固定
    V.x-=(mx-pinchPrev.mx)/V.s; V.y-=(my-pinchPrev.my)/V.s; // 2本指の移動でパン
  }
  pinchPrev={dist,mx,my};
}
cv.addEventListener("pointerdown", e=>{ cv.setPointerCapture(e.pointerId);
  if(mode==="play"){ playDown(e.pointerId,e.clientX,e.clientY); return; }
  if(mode==="texedit"){ texPressed=true; texPaint(e.clientX,e.clientY); return; }
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if((mode==="edit"||mode==="layout") && ptrs.size>=2){ drag=null; cancelLongPress(); pinchPrev=null; return; }
  onDown(e.clientX,e.clientY); });
cv.addEventListener("pointermove", e=>{
  if(mode==="play"){ playMove(e.pointerId,e.clientX,e.clientY); return; }
  if(mode==="texedit"){ if(texPressed) texPaint(e.clientX,e.clientY); return; }
  if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if((mode==="edit"||mode==="layout") && ptrs.size>=2){ doPinch(); return; }
  onMove(e.clientX,e.clientY); });
cv.addEventListener("pointerup",   e=>{
  if(mode==="play"){ playUp(e.pointerId); return; }
  if(mode==="texedit"){ texPressed=false; return; }
  ptrs.delete(e.pointerId); pinchPrev=null;
  onUp(e.clientX,e.clientY); });
cv.addEventListener("pointercancel", e=>{ ptrs.delete(e.pointerId); pinchPrev=null;
  if(mode==="play"){ playUp(e.pointerId); return; } texPressed=false; drag=null; cancelLongPress();});
// wheel zoom（Editor と Layout）
cv.addEventListener("wheel", e=>{ e.preventDefault();
  const f = e.deltaY<0?1.2:0.8; // 変化量を倍に（±0.1→±0.2相当）
  if(mode==="edit"){
    const before=s2w(e.clientX,e.clientY);
    view.s=Math.min(3,Math.max(0.15,view.s*f)); // ズームアウト限界を拡大（0.3→0.15）
    const after=s2w(e.clientX,e.clientY);
    view.x+=before.x-after.x; view.y+=before.y-after.y;
  } else if(mode==="layout"){
    const before=screenToStageLayout(e.clientX,e.clientY);
    layoutView.s=Math.min(3,Math.max(0.075,layoutView.s*f));
    const after=screenToStageLayout(e.clientX,e.clientY);
    layoutView.x+=before.x-after.x; layoutView.y+=before.y-after.y;
  }
},{passive:false});

// =====================================================================
//  キーボード / オンスクリーンパッド
// =====================================================================
let keys={}, pad={};
let heldKeys=new Set();  // KEYBOARDノード/ボタン用：押下中のキー(小文字)
const KMAP={ArrowUp:"U",ArrowDown:"D",ArrowLeft:"L",ArrowRight:"R",w:"U",s:"D",a:"L",d:"R",W:"U",S:"D",A:"L",D:"R"};
// STICK/BUTTONのKEYBOARDモード別キーセット（Off以外）
const KEYSETS={
  wasd:{u:"w",d:"s",l:"a",r:"d"},
  ijkl:{u:"i",d:"k",l:"j",r:"l"},
  cursor:{u:"arrowup",d:"arrowdown",l:"arrowleft",r:"arrowright"},
  "8462":{u:"8",d:"2",l:"4",r:"6"},
};
function keyModeAxis(km){ const s=KEYSETS[km]; if(!s) return {x:0,y:0};
  return { x:(heldKeys.has(s.r)?1:0)-(heldKeys.has(s.l)?1:0),
           y:(heldKeys.has(s.d)?1:0)-(heldKeys.has(s.u)?1:0) }; }
// ===== ゲームパッド（Gamepad API）=====
function getPad(){ try{ const ps=navigator.getGamepads?navigator.getGamepads():[]; for(const g of ps){ if(g) return g; } }catch(e){} return null; }
function padStickAxis(mode){ const g=getPad(); if(!g) return {x:0,y:0};
  const dz=v=>Math.abs(v)<0.18?0:v, ax=g.axes||[], bt=g.buttons||[];
  if(mode==="lstick") return {x:dz(ax[0]||0), y:dz(ax[1]||0)};
  if(mode==="rstick") return {x:dz(ax[2]||0), y:dz(ax[3]||0)};
  if(mode==="dpad"){ const L=bt[14]&&bt[14].pressed, R=bt[15]&&bt[15].pressed, U=bt[12]&&bt[12].pressed, D=bt[13]&&bt[13].pressed;
    return {x:(R?1:0)-(L?1:0), y:(D?1:0)-(U?1:0)}; }
  return {x:0,y:0}; }
const PAD_BTN={a:0,b:1,x:2,y:3,lb:4,rb:5,lt:6,rt:7};
function padButtonPressed(name){ const g=getPad(); if(!g||!(name in PAD_BTN)) return false; const b=(g.buttons||[])[PAD_BTN[name]]; return !!(b&&b.pressed); }
window.addEventListener("keydown", e=>{
  // 入力欄の編集中はショートカット・削除を無効化（CONST値編集でノードが消えるのを防ぐ）
  const ae=document.activeElement; if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return;
  const k=KMAP[e.key]; if(k){ keys[k]=true; e.preventDefault(); }
  heldKeys.add(e.key.toLowerCase());
  if(mode==="play" && (e.key==="Tab"||e.key==="Escape"||e.key===" ")) e.preventDefault(); // ゲームキーの既定動作を抑止
  if((e.key==="Delete"||e.key==="Backspace") && mode==="edit"){
    if(multiSel.size){ recordUndo(); [...multiSel].forEach(id=>removeNode(id)); multiSel.clear(); selected=null; }
    else if(selected){ recordUndo(); removeNode(selected); selected=null; }
  }
  if((e.ctrlKey||e.metaKey) && (e.key==="z"||e.key==="Z")){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); }
  if((e.ctrlKey||e.metaKey) && (e.key==="y"||e.key==="Y")){ e.preventDefault(); redo(); }
});
window.addEventListener("keyup", e=>{ const k=KMAP[e.key]; if(k) keys[k]=false; heldKeys.delete(e.key.toLowerCase()); });
// TOUCHノード用グローバル状態（Play中のポインタ）
let touchX=0, touchY=0, touchDown=0;
document.querySelectorAll("#pad .k").forEach(el=>{
  const d=el.dataset.d;
  const on=e=>{e.preventDefault(); pad[d]=true;}, off=e=>{e.preventDefault(); pad[d]=false;};
  el.addEventListener("pointerdown",on); el.addEventListener("pointerup",off);
  el.addEventListener("pointerleave",off); el.addEventListener("pointercancel",off);
});

const createMenu=document.getElementById("createMenu");
(function buildCreateMenu(){
  const hd=document.createElement("div"); hd.style.cssText="display:flex;align-items:center;margin-bottom:8px";
  const title=document.createElement("div"); title.className="title"; title.textContent="CREATE NEW NODE"; title.style.padding="2px 4px 0";
  const cl=document.createElement("button"); cl.className="pclose"; cl.textContent="×"; cl.onclick=(e)=>{ e.stopPropagation(); hideCreateMenu(); };
  hd.appendChild(title); hd.appendChild(cl);
  const row=document.createElement("div"); row.className="row";
  PALETTE.forEach(t=>{ const d=NODE_TYPES[t];
    const b=document.createElement("div"); b.className="ci";
    b.textContent=d.label; b.style.background=d.color;                 // ボタン背景＝カテゴリ色
    b.onclick=(e)=>{ e.stopPropagation();
      recordUndo();
      const w=createMenu._w||s2w(W/2,H/2);
      const n=addNode(t, w.x, w.y);
      if(mode==="layout" && isStage(n) && createMenu._sx!=null){ const lp=screenToStageLayout(createMenu._sx, createMenu._sy); n.layoutX=lp.x; n.layoutY=lp.y; }
      hideCreateMenu(); };
    row.appendChild(b);
  });
  createMenu.appendChild(hd); createMenu.appendChild(row);
})();
function showCreateMenu(sx,sy){
  createMenu._w=s2w(sx,sy); createMenu._sx=sx; createMenu._sy=sy;
  createMenu.style.display="block";
  const landscape = W>H;
  const row=createMenu.querySelector(".row");
  if(landscape){
    // 横画面：幅=画面の85%。ボタンが狭くなりすぎないよう1列あたり約108px
    const width=Math.round(W*0.85);
    createMenu.style.width=width+"px"; createMenu.style.maxWidth="none";
    const cols=Math.max(4, Math.floor(width/108));
    row.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  } else {
    // 縦画面：左の隙間なし（ほぼ全幅）。1列あたり約102px
    const width=W-16;
    createMenu.style.width=width+"px"; createMenu.style.maxWidth="none";
    const cols=Math.max(3, Math.floor(width/102));
    row.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  }
  const mw=createMenu.offsetWidth||220, mh=createMenu.offsetHeight||180;
  const left = landscape ? (W - mw - 12) : 8;      // 横=右寄せ / 縦=ほぼ全幅
  const top  = Math.max(8, Math.round((H - mh)/2)); // 上下は常に画面中央
  createMenu.style.left=left+"px"; createMenu.style.top=top+"px";
}
function hideCreateMenu(){ createMenu.style.display="none"; createMenu._w=null; }
function isCreateMenuOpen(){ return createMenu.style.display==="block"; }

// 複数選択メニュー（Duplicate / Delete）
const multiMenu=document.getElementById("multiMenu");
(function buildMultiMenu(){
  const dup=document.createElement("div"); dup.className="mi dup"; dup.textContent="DUPLICATE";
  dup.onclick=(e)=>{ e.stopPropagation(); multiSel=duplicateNodes([...multiSel]); selected=null; hideMultiMenu(); };
  const del=document.createElement("div"); del.className="mi del"; del.textContent="DELETE";
  del.onclick=(e)=>{ e.stopPropagation(); recordUndo(); removeNodes([...multiSel]); multiSel.clear(); selected=null; hideMultiMenu(); };
  multiMenu.appendChild(dup); multiMenu.appendChild(del);
})();
function showMultiMenu(sx,sy){
  multiMenu.style.display="block";
  const mw=multiMenu.offsetWidth||200, mh=multiMenu.offsetHeight||130;
  multiMenu.style.left=Math.max(6,Math.min(W-mw-6, sx-mw/2))+"px";
  multiMenu.style.top =Math.max(10,Math.min(H-mh-6, sy-10))+"px";
}
function hideMultiMenu(){ multiMenu.style.display="none"; }
function isMultiMenuOpen(){ return multiMenu.style.display==="block"; }

// プロパティパネル（ノード長押しで表示・編集・削除）
let propNode=null; // Property を表示中のノードID（長押しで設定）
const propPanel=document.getElementById("propPanel");
const propBackdrop=document.getElementById("propBackdrop");
// バックドロップ（プロパティ表示中の背後）をタップしたらパネルを閉じる
propBackdrop.addEventListener("pointerdown",(e)=>{ e.stopPropagation(); e.preventDefault(); propNode=null; refreshProp(); });
function openProp(id){ propNode=id; refreshProp(); }
function refreshProp(){
  const n = (propNode!=null) ? nodeById(propNode) : null;
  if(!n || (mode!=="edit" && mode!=="layout")){ propPanel.style.display="none"; propBackdrop.style.display="none"; return; }
  propBackdrop.style.display="block"; // 背後をブロック＆外タップで閉じる
  const d=NODE_TYPES[n.type];
  propPanel.innerHTML="";
  const t=document.createElement("div"); t.className="pt";
  t.innerHTML=`<span class="swatch" style="background:${(d.object)?n.color:d.color}"></span>${d.label}`;
  const numRow=(label,get,set,step)=>{ const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent=label;
    const inp=document.createElement("input"); inp.type="number"; if(step)inp.step=step;
    inp.value = step ? get() : Math.round(get()); // stepありは小数そのまま表示
    inp.oninput=()=>{ const v=parseFloat(inp.value); if(!isNaN(v)) set(v); };
    r.appendChild(lb); r.appendChild(inp); propPanel.appendChild(r); };
  const chkRow=(label,get,set)=>{ const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent=label;
    const c=document.createElement("input"); c.type="checkbox"; c.checked=!!get();
    c.onchange=()=>set(c.checked); r.appendChild(lb); r.appendChild(c); propPanel.appendChild(r); };
  const selRow=(label,opts,get,set)=>{ const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent=label;
    const s=document.createElement("select"); opts.forEach(o=>{ const op=document.createElement("option");
      op.value=o.value; op.textContent=o.label; if(get()===o.value) op.selected=true; s.appendChild(op); });
    s.onchange=()=>set(s.value); r.appendChild(lb); r.appendChild(s); propPanel.appendChild(r); };
  const txtRow=(label,get,set)=>{ const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent=label;
    const inp=document.createElement("input"); inp.type="text"; inp.value=get()||"";
    inp.oninput=()=>set(inp.value); r.appendChild(lb); r.appendChild(inp); propPanel.appendChild(r); };
  const OBJ_COLORS=UNITY_PALETTE;
  const colRow=(label,palette,get,set)=>{ const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent=label;
    const cur=document.createElement("div"); // 現在色＋タップでパレットを開く
    cur.style.cssText=`width:56px;height:38px;border-radius:8px;background:${get()};cursor:pointer;border:2px solid #fff`;
    cur.onclick=()=> openColorPicker(get(), col=>{ set(col); refreshProp(); });
    r.appendChild(lb); r.appendChild(cur); propPanel.appendChild(r); };
  const cl=document.createElement("button"); cl.className="pclose"; cl.textContent="×";
  cl.onclick=()=>{ propNode=null; refreshProp(); };
  t.appendChild(cl);
  propPanel.appendChild(t);
  if(n.type==="const"){
    const row=document.createElement("div"); row.className="prow";
    const lb=document.createElement("label"); lb.textContent="Value";
    const inp=document.createElement("input"); inp.type="number"; inp.value=n.value;
    inp.oninput=()=>{ const v=parseFloat(inp.value); if(!isNaN(v)) n.value=v; };
    row.appendChild(lb); row.appendChild(inp); propPanel.appendChild(row);
  }
  if(n.type==="text"){
    // TEXT 文字列とフォントサイズ
    const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent="Text";
    const inp=document.createElement("input"); inp.type="text"; inp.value=n.text||"";
    inp.oninput=()=>{ n.text=inp.value; };
    r.appendChild(lb); r.appendChild(inp); propPanel.appendChild(r);
    selRow("Align", [{value:"left",label:"Left"},{value:"center",label:"Center"},{value:"right",label:"Right"}], ()=>n.align||"center", v=>{ n.align=v; });
    colRow("Color", OBJ_COLORS, ()=>n.textColor||"#ffffff", v=>{ n.textColor=v; });
    chkRow("Outline", ()=>n.outline, v=>{ n.outline=v; });
  }
  const STYLE_OPTS=[{value:"frame",label:"FRAME"},{value:"fill",label:"FILL"},{value:"off",label:"OFF"}];
  const STICK_STYLE_OPTS=[{value:"frame",label:"FRAME"},{value:"fill",label:"FILL"},{value:"inner",label:"INNER"},{value:"off",label:"OFF"}];
  const KEYMODE_OPTS=[{value:"off",label:"Off"},{value:"wasd",label:"WASD"},{value:"ijkl",label:"IJKL"},{value:"cursor",label:"Cursor"},{value:"8462",label:"8462"}];
  const CNTL_OPTS=[{value:"off",label:"Off"},{value:"lstick",label:"L-Stick"},{value:"rstick",label:"R-Stick"},{value:"dpad",label:"DPAD"}];
  const BTN_CNTL_OPTS=[{value:"off",label:"Off"},{value:"a",label:"A"},{value:"b",label:"B"},{value:"x",label:"X"},{value:"y",label:"Y"},
    {value:"lb",label:"LB"},{value:"rb",label:"RB"},{value:"lt",label:"LT"},{value:"rt",label:"RT"}];
  const KEY_OPTS=KEYBOARD_OPTS; // 全アルファベット・数字・記号・Tab/Escを含む（下部で定義）
  if(n.type==="stick"){
    selRow("Style",  STICK_STYLE_OPTS, ()=>n.style||"frame", v=>{ n.style=v; });
    colRow("Color",  OBJ_COLORS, ()=>n.color||"#e0892b", v=>{ n.color=v; });
    selRow("Signal", [{value:"analog",label:"Analog"},{value:"digital",label:"Digital"}], ()=>n.mode||"analog", v=>{ n.mode=v; refreshProp(); });
    if(n.mode==="digital"){
      numRow("Threshold %", ()=>Math.round((n.threshold||0.3)*100), v=>{ n.threshold=Math.min(1,Math.max(0,v/100)); });
      chkRow("Limit Axis",  ()=>n.limitAxis, v=>{ n.limitAxis=v; });
    }
    selRow("Keyboard",   KEYMODE_OPTS, ()=>n.keyMode||"off", v=>{ n.keyMode=v; });
    selRow("Controller", CNTL_OPTS,    ()=>n.cntlMode||"off", v=>{ n.cntlMode=v; });
    chkRow("Hide on PC", ()=>n.hideOnPc, v=>{ n.hideOnPc=v; });
  }
  if(n.type==="button"){
    selRow("Style",  STYLE_OPTS, ()=>n.style||"frame", v=>{ n.style=v; });
    colRow("Color",  OBJ_COLORS, ()=>n.color||"#e0892b", v=>{ n.color=v; });
    numRow("Width",  ()=>n.w||150, v=>{ n.w=Math.max(24,v); }); // Unity: RECT WIDTH/HEIGHT
    numRow("Height", ()=>n.h||150, v=>{ n.h=Math.max(24,v); });
    selRow("Keyboard",   KEY_OPTS,  ()=>n.keyCode||"", v=>{ n.keyCode=v; });
    selRow("Controller", BTN_CNTL_OPTS, ()=>n.cntlBtn||"off", v=>{ n.cntlBtn=v; });
    chkRow("Hide on PC", ()=>n.hideOnPc, v=>{ n.hideOnPc=v; });
  }
  if(n.type==="keyboard"){
    selRow("Key", KEY_OPTS.filter(o=>o.value!==""), ()=>n.keyCode||" ", v=>{ n.keyCode=v; });
  }
  if(n.type==="compare"){
    selRow("Operator", [{value:"eq",label:"＝"},{value:"gt",label:"＞"},{value:"lt",label:"＜"},
      {value:"ne",label:"≠"},{value:"ge",label:"≧"},{value:"le",label:"≦"}],
      ()=>n.compareMode||"gt", v=>{ n.compareMode=v; });
  }
  if(n.type==="random"){
    numRow("Number", ()=>n.rndNum!=null?n.rndNum:6, v=>{ n.rndNum=Math.max(1,Math.round(v)); }); // 出力=0〜Number-1
    chkRow("Use Seed", ()=>n.useSeed, v=>{ n.useSeed=v; refreshProp(); });
    if(n.useSeed) numRow("Seed", ()=>n.seed||0, v=>{ n.seed=Math.round(v); });
  }
  if(n.type==="trigger"){
    numRow("Delay (F)", ()=>n.triggerDelay||0, v=>{ n.triggerDelay=Math.max(0,Math.round(v)); });
  }
  if(n.type==="counter"){
    selRow("Type", [{value:"none",label:"None"},{value:"clamp",label:"Clamp"},{value:"loop",label:"Loop"}],
      ()=>n.cntType||"none", v=>{ n.cntType=v; refreshProp(); });
    if(n.cntType==="clamp"||n.cntType==="loop"){
      numRow("Min", ()=>n.cntMin!=null?n.cntMin:0, v=>{ n.cntMin=v; });
      numRow("Max", ()=>n.cntMax!=null?n.cntMax:100, v=>{ n.cntMax=v; });
    }
  }
  if(n.type==="int"){
    selRow("Round", [{value:"floor",label:"Floor"},{value:"round",label:"Round"},{value:"ceil",label:"Ceil"},{value:"trunc",label:"Trunc"}],
      ()=>n.intType||"floor", v=>{ n.intType=v; });
  }
  if(n.type==="var"){ numRow("Init", ()=>n.varInit||0, v=>{ n.varInit=v; }); } // 初期値
  if(n.type==="array"){ txtRow("Values", ()=>n.arrInit||"", v=>{ n.arrInit=v; }); // 初期値（, か | 区切り）
    const ex=document.createElement("div"); ex.textContent="ex) 5,-2,0.18|5,-7|-12.6";
    ex.style.cssText="color:#8a92a6;font-size:12px;margin:-4px 0 8px 2px"; propPanel.appendChild(ex); }
  if(n.type==="sound"){ numRow("Tone", ()=>n.tone!=null?n.tone:0, v=>{ n.tone=Math.round(v); }); // 0=ド,1=レ,2=ミ…
    selRow("Wave", [{value:"square",label:"Square"},{value:"sine",label:"Sine"},{value:"triangle",label:"Triangle"},{value:"sawtooth",label:"Saw"}], ()=>n.wave||"square", v=>{ n.wave=v; });
    numRow("Volume", ()=>n.volume!=null?n.volume:10, v=>{ n.volume=Math.max(0,Math.min(20,v)); }); } // 0〜20, 既定10

  }
  // 幾何プロパティ（STICK/BUTTON/SHOTは独自UIなので除外）＝ Unity順: W/H → Angle → Color/Flip/Dynamics → Tag → Layer
  const hasGeom = d.object || d.stage==="text" || d.stage==="rotate";

    selRow("Style", [{value:"fill",label:"Fill"},{value:"frame",label:"Frame"}], ()=>n.objStyle||"fill", v=>{ n.objStyle=v; }); // ObjectStyle
    chkRow("Flip",     ()=>n.flip, v=>{ n.flip=v; });
    // Dynamics: Unity RigidBody2D.bodyType 準拠（Off=物理無/Static=不動壁/Kinematic=速度で動く壁/Dynamic=重力あり）
    selRow("Dynamics", [{value:"off",label:"OFF"},{value:"static",label:"STATIC"},{value:"kinematic",label:"KINEMATIC"},{value:"dynamic",label:"DYNAMIC"}],
      ()=>n.bodyType||"static", v=>{ n.bodyType=v; });
    selRow("Coord", [{value:"world",label:"World"},{value:"local",label:"Local"}], ()=>n.coordMode||"local", v=>{ n.coordMode=v; }); // 入力座標系
    chkRow("Visible", ()=>n.visible!==false, v=>{ n.visible=v; });
  }
  // Tag → Destroyed の順（SOUND以外の全オブジェクト＋SHOT＋TEXT）。DestroyedはNone or シーン内のTag一覧
  if(d.object || n.type==="shot" || n.type==="text"){
    txtRow("Tag", ()=>n.tag||"", v=>{ n.tag=v; }); // 入力中はrefreshしない（フォーカス維持）
    const tagSet=new Set(); nodes.forEach(m=>{ if(m.tag) tagSet.add(m.tag); });
    const dOpts=[{value:"",label:"None"}, ...[...tagSet].map(t=>({value:t,label:t}))];
    selRow("Destroyed", dOpts, ()=>n.destroyedBy||"", v=>{ n.destroyedBy=v; }); // このタグの弾で破壊される
  }
  if(hasGeom){
    numRow("Layer", ()=>n.layer||50, v=>{ n.layer=Math.round(v); });
  }
  if(d.target){ // GETPOS / GETROT の対象オブジェクト
    const r=document.createElement("div"); r.className="prow";
    const lb=document.createElement("label"); lb.textContent="TARGET";
    const sel=document.createElement("select");
    const none=document.createElement("option"); none.value=""; none.textContent="(none)"; sel.appendChild(none);
    nodes.filter(m=>NODE_TYPES[m.type].object).forEach(o=>{
      const op=document.createElement("option"); op.value=String(o.id);
      op.textContent=NODE_TYPES[o.type].label+" #"+o.id;
      if(n.target===o.id) op.selected=true; sel.appendChild(op); });
    sel.onchange=()=>{ n.target = sel.value ? parseInt(sel.value) : null; };
    r.appendChild(lb); r.appendChild(sel); propPanel.appendChild(r);
  }
  if(n.type==="getpos"||n.type==="getrot"){
    selRow("Coord", [{value:"world",label:"World"},{value:"local",label:"Local"}], ()=>n.getCoord||"world", v=>{ n.getCoord=v; });
  }
  // 親子構造は端子ワイヤーで設定するため、Propertyには出さない
  // テクスチャ編集
  if(d.tex){
    selRow("Size", [{value:"8",label:"8"},{value:"16",label:"16"},{value:"32",label:"32"}],
      ()=>String(n.texW||16), v=>{ resizeTexture(n, parseInt(v)); }); // サイズ変更で画像をなるべく残す
    const eb=document.createElement("button"); eb.className="del"; eb.style.background="#c79a10"; eb.style.borderColor="#e0c020";
    eb.textContent="EDIT TEXTURE";
    eb.onclick=()=> openTexEditor(n.id);
    propPanel.appendChild(eb);
  }
  // Duplicate / Delete を1行に（幅 4:3 でDeleteを狭く）
  const ddRow=document.createElement("div"); ddRow.style.cssText="display:flex;gap:8px;margin-top:8px";
  const dup=document.createElement("button"); dup.className="del"; dup.style.background="#2f7a4a"; dup.style.borderColor="#3fa060";
  dup.style.flex="4"; dup.style.margin="0"; dup.textContent="DUPLICATE";
  dup.onclick=()=>{ const s=[...duplicateNodes([n.id])]; multiSel.clear(); selected=s[0]||null; propNode=null; refreshProp(); }; // 複製→新ノードを選択して閉じる
  const del=document.createElement("button"); del.className="del"; del.style.flex="3"; del.style.margin="0"; del.textContent="DELETE";
  del.onclick=()=>{ recordUndo(); removeNode(n.id); if(selected===n.id) selected=null; propNode=null; refreshProp(); };
  ddRow.appendChild(dup); ddRow.appendChild(del); propPanel.appendChild(ddRow);
  // タイトルとDuplicate/Delete以外を pbody にまとめて、収まらなければ2列→スクロール
  const pbody=document.createElement("div"); pbody.className="pbody";
  [...propPanel.children].forEach(ch=>{ if(ch!==t && ch!==ddRow) pbody.appendChild(ch); });
  propPanel.insertBefore(pbody, ddRow);
  propPanel.style.display="block";
  layoutPropPanel(pbody);
}
// プロパティを画面に収める：はみ出たら2列、それでも/縦画面で収まらなければpbodyをスクロール
function layoutPropPanel(pbody){
  pbody.style.gridTemplateColumns="1fr"; pbody.style.maxHeight=""; pbody.style.overflowY=""; pbody.style.background=""; pbody.style.columnGap="16px";

  }
  if(propPanel.offsetHeight > avail){ const chrome = propPanel.offsetHeight - pbody.offsetHeight;
    pbody.style.maxHeight = Math.max(120, avail - chrome) + "px"; pbody.style.overflowY="auto"; }

// =====================================================================
const menuBtn=document.getElementById("menuBtn");
const flick=document.getElementById("flick");
const FLICK_ITEMS=[
  { key:"newnode", label:"NEW NODE", color:"#2f5a8a", run:()=>{ if(mode==="edit"||mode==="layout") showCreateMenu(W/2, Math.max(120,H*0.4)); } },

  { key:"undo", label:"UNDO", color:"#6b5bd0", run:()=>undo() },

  { key:"fit",  label:"FIT",  color:"#1f7a3a", run:fitView },

  { key:"setting", label:"SETTING", color:"#8a6d3b", run:()=>openAppSettings() },
];
let flickEls=[], flickHot=null;
function openFlick(){
  flick.innerHTML=""; flickEls=[]; flickHot=null;
  const modeItem = (mode==="layout")
    ? { label:"EDITOR", color:"#1f7a3a", run:()=>setMode("edit") }   // Editorテーマ=緑
    : { label:"LAYOUT", color:"#21b3d6", run:()=>setMode("layout") }; // Layoutテーマ=水色
  const items=[modeItem, ...FLICK_ITEMS];
  const leftKeys=new Set(["save","load","new","setting"]);
  const rightCol = items.filter(it=>!leftKeys.has(it.key));
  const leftCol  = items.filter(it=> leftKeys.has(it.key));
  // コントロールの現在位置に合わせて配置
  const fw=105, gap=10, rowH=68, btn=72;
  const r = IS_TOUCH ? (W<=H?14:36) : 14;
  const t = IS_TOUCH ? (W<=H?40:14) : 14;
  let col2X, col1X, startY;
  if(W<=H){ // 縦画面：MENUボタンの下に表示
    col2X = W - r - fw; col1X = col2X - fw - gap;
    startY = t + 84 + btn + 8;
  } else {   // 横画面：▶ボタンの左に表示
    const playLeft = W - r - btn;
    col2X = playLeft - fw - gap; col1X = col2X - fw - gap;
    startY = t;
  }
  const place=(list,colX)=>{ list.forEach((it,i)=>{
    const el=document.createElement("div"); el.className="fi"; el.textContent=it.label;
    el.style.background=it.color; el.style.left=colX+"px"; el.style.top=(startY + i*rowH)+"px";
    el._it=it; flick.appendChild(el); flickEls.push(el);
    el.addEventListener("pointerup", ev=>{ ev.stopPropagation(); const run=it.run; closeFlick(false); run(); });
  }); };
  place(rightCol, col2X);
  place(leftCol,  col1X);
  flick.style.display="block";
}
function updateFlick(sx,sy){
  flickHot=null;
  for(const el of flickEls){
    const r=el.getBoundingClientRect();
    const hit = sx>=r.left&&sx<=r.right&&sy>=r.top&&sy<=r.bottom;
    el.classList.toggle("hot", hit);
    if(hit) flickHot=el._it;
  }
}
function closeFlick(run){
  if(run && flickHot) flickHot.run();
  flick.style.display="none"; flickEls=[]; flickHot=null;
}
function isFlickOpen(){ return flick.style.display==="block"; }
let flickMoved=false, flickDown={x:0,y:0};
menuBtn.addEventListener("pointerdown", e=>{ e.preventDefault();
  if(isFlickOpen()){ closeFlick(false); return; }   // 開いていれば閉じる（トグル）
  menuBtn.setPointerCapture(e.pointerId); openFlick(); flickMoved=false; flickDown={x:e.clientX,y:e.clientY}; });
menuBtn.addEventListener("pointermove", e=>{ if(!isFlickOpen()) return;
  if(Math.hypot(e.clientX-flickDown.x,e.clientY-flickDown.y)>12) flickMoved=true;
  updateFlick(e.clientX,e.clientY); });
menuBtn.addEventListener("pointerup", e=>{ if(!isFlickOpen()) return;
  try{ menuBtn.releasePointerCapture(e.pointerId); }catch(_){}
  if(flickMoved){ updateFlick(e.clientX,e.clientY); closeFlick(true); } // フリック：離した項目を実行
  else { updateFlick(-1,-1); }                                          // タップ：開いたまま項目選択待ち
});
menuBtn.addEventListener("pointercancel",()=>closeFlick(false));
// 項目外（オーバーレイ）タップで閉じる
flick.addEventListener("pointerdown", e=>{ if(e.target===flick) closeFlick(false); });

function serialize(){ return JSON.stringify({nodes,conns,nextId}); }
function deserialize(s){ const o=JSON.parse(s); nodes=o.nodes||[]; conns=o.conns||[]; nextId=o.nextId||1; selected=null; propNode=null; if(typeof multiSel!=="undefined") multiSel.clear();
  // 旧データ移行（size → w/h/angle など）
  nodes.forEach(n=>{ if(NODE_TYPES[n.type]&&isStage(n)){
    if(n.w==null) n.w=n.size||80; if(n.h==null) n.h=n.size||80; if(n.angle==null) n.angle=0;
    if(n.layoutX==null) n.layoutX=0; if(n.layoutY==null) n.layoutY=0;
    if(n.layer==null) n.layer=50; if(n.tag==null) n.tag="";
    if(n.type==="character"&&n.flip==null) n.flip=true;
    if(n.type==="text"&&n.text==null) n.text="TEXT";
    if(n.type==="text"&&n.fontSize==null) n.fontSize=40;
    if(n.type==="stick"){ if(n.mode==null)n.mode="analog"; if(n.threshold==null)n.threshold=0.3;
      if(n.limitAxis==null)n.limitAxis=false; if(n.visible==null)n.visible=true;
      if(n.style==null)n.style="frame"; if(n.keyMode==null)n.keyMode=(n.useKey?"wasd":"off");
      if(n.cntlMode==null)n.cntlMode="off"; if(n.hideOnPc==null)n.hideOnPc=false; }
    if(n.type==="button"){ if(n.visible==null)n.visible=true;
      if(n.style==null)n.style="frame"; if(n.keyCode==null)n.keyCode=(n.useKey?" ":"");
      if(n.cntlBtn==null)n.cntlBtn="off"; if(n.hideOnPc==null)n.hideOnPc=false; }
  } });
  nodes.forEach(n=>{ if(NODE_TYPES[n.type]&&n.type==="keyboard"&&n.keyCode==null) n.keyCode=" "; });
  nodes.forEach(n=>{ if(n.type==="compare"&&n.compareMode==null) n.compareMode="gt";
    if(n.type==="random"){ if(n.rndNum==null)n.rndNum=6; if(n.useSeed==null)n.useSeed=false; if(n.seed==null)n.seed=0; }
    if(n.type==="trigger"&&n.triggerDelay==null) n.triggerDelay=0;
    if(n.type==="counter"){ if(n.cntType==null)n.cntType="none"; if(n.cntMin==null)n.cntMin=0; if(n.cntMax==null)n.cntMax=100; }
    if(n.type==="int"&&n.intType==null) n.intType="floor";
    if(n.type==="var"&&n.varInit==null) n.varInit=0;
    if(n.type==="array"&&n.arrInit==null) n.arrInit="";
    if((n.type==="getpos"||n.type==="getrot")&&n.getCoord==null) n.getCoord="world";
    if(n.type==="sound"){ if(n.volume==null)n.volume=10; if(n.tone==null)n.tone=0; }
    if(attachesToObject(n)){ if(n.w==null)n.w=60; if(n.h==null)n.h=60; if(n.angle==null)n.angle=0;
      if(n.layoutX==null){ const oc=nodes.filter(m=>showsInLayout(m)).length; n.layoutX=(oc%5)*100-200; n.layoutY=Math.floor(oc/5)*100-100; } }
    if(n.type==="setting"){ if(n.dynamics==null)n.dynamics=true; if(n.setFriction==null)n.setFriction=0.4; if(n.setBounce==null)n.setBounce=0.0; if(n.setDrag==null)n.setDrag=0.0; if(n.stopBtnColor==null)n.stopBtnColor="#ffffff";
      if(n.gravity==null)n.gravity=9.8; else if(n.gravity>50)n.gravity=n.gravity/2000;
      if(n._gv!==2){ n.gravity=(n.gravity||1)*9.8; n._gv=2; } } // 旧倍率→9.8表示へ一度だけ変換
    if(n.type==="contact"){ if(n.contactTarget==null)n.contactTarget="all"; n.contactShape="rect"; } // SENSOR: Rect固定
    if(n.type==="onbreak"){ if(n.breakColor==null)n.breakColor="#ffffff"; if(n.breakEffect==null)n.breakEffect="none"; if(n.breakTag==null)n.breakTag=""; n.h=n.w=(n.w||60); } // 正方形
    if(n.type==="text"&&n.outline==null) n.outline=false;
    if(n.type==="shot"){ if(n.bulletCount==null)n.bulletCount=1; if(n.bulletInterval==null)n.bulletInterval=0;
      if(n.size==null)n.size=(n.bulletSize||28); if(n.bulletShape==null)n.bulletShape="circle"; }
    if(NODE_TYPES[n.type]&&NODE_TYPES[n.type].object){ if(n.objStyle==null)n.objStyle="fill"; if(n.coordMode==null)n.coordMode="local"; if(n.visible==null)n.visible=true; if(n.destroyedBy==null)n.destroyedBy="";
      if(n.bodyType==null){ n.bodyType = (n.dyn===true)?"dynamic":(n.type==="character"?"dynamic":"static"); } } // 旧dyn→bodyType
    if(n.type==="circle"){ const r=Math.min(n.w||80,n.h||80); n.w=r; n.h=r; } }); // 真円：幅=高さに正規化
  nodes.forEach(n=>{ if(isStage(n)&&n.parentNodeId) recomputeLocal(n); }); // 親子ローカル復元
}

function fitView(){
  if(nodes.length===0){ view={x:0,y:0,s:1}; return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const n of nodes){
    minx=Math.min(minx,n.x-NS/2); maxx=Math.max(maxx,n.x+NS/2);
    miny=Math.min(miny,n.y-NS/2); maxy=Math.max(maxy,n.y+NS/2); }
  const pad=50; const bw=maxx-minx+pad*2, bh=maxy-miny+pad*2;
  view.s=Math.min(1.4,Math.max(0.3, Math.min(W/bw,(H-20)/bh)));
  view.x=(minx+maxx)/2; view.y=(miny+maxy)/2;
}
// スマホ向け：全体を詰め込まず、読みやすい倍率で中央に寄せる
function centerReadable(){
  if(nodes.length===0){ view={x:0,y:0,s:1}; return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const n of nodes){ const h=nodeHeight(n.type);
    minx=Math.min(minx,n.x); maxx=Math.max(maxx,n.x);
    miny=Math.min(miny,n.y); maxy=Math.max(maxy,n.y); }
  view.x=(minx+maxx)/2; view.y=(miny+maxy)/2;
  view.s=0.75; // 文字が読みやすい倍率
}

// =====================================================================
//  デフォルトのサンプル（KEYで RECT を動かす）
// =====================================================================
function sample(){
  // 初期画面：Constant（値1）→ Text だけ
  const c=addNode("const",-120,0); c.value=1;
  const tx=addNode("text",120,0); tx.layoutX=0; tx.layoutY=0;
  connect(c.id,0, tx.id,0);
  centerReadable();
}
sample();

// =====================================================================
//  メインループ
// =====================================================================
let lastPropNode="__init__", lastMode="";
let playAcc=0, autoAcc=0;
// ドラッグ中にポインタが画面端へ来たらビューを自動スクロール（Edit/Layout）
const EDGE_SCROLL_KINDS = new Set(["wire","parentwire","selbox","selboxL","node","nodegroup","layout","layoutgroup","resize","rotate"]);
function edgeScroll(dt){
  if(!drag) return;
  let kind=drag.kind;
  if(kind==="portpending"){ if(!drag.armed) return; } // arm前(パン判定中)はスクロールしない
  else if(!EDGE_SCROLL_KINDS.has(kind)) return;
  const margin=60;                          // 端からこの距離でスクロール開始
  const maxSpeed=900;                        // 端での最大スクロール速度(px/秒, 画面座標)
  const x=lastPtr.x, y=lastPtr.y;
  let dx=0, dy=0;
  if(x < margin)      dx = -(margin-x)/margin;
  else if(x > W-margin) dx = (x-(W-margin))/margin;
  if(y < margin)      dy = -(margin-y)/margin;
  else if(y > H-margin) dy = (y-(H-margin))/margin;
  if(dx===0 && dy===0) return;
  const V = (mode==="layout") ? layoutView : view;
  // 画面座標の移動量→ワールド量（ズーム補正）。ビューを動かす＝内容が逆向きに見えるので符号に注意
  V.x += dx*maxSpeed*dt/V.s;
  V.y += dy*maxSpeed*dt/V.s;
  // ビューが動いた分、カーソル下のドラッグ対象を追従させる（同じ画面位置で onMove を再適用）
  onMove(lastPtr.x, lastPtr.y);
}
function loop(t){
  const dt=Math.min(0.05,(t-lastT)/1000)||0; lastT=t;
  if(mode==="edit"||mode==="layout") edgeScroll(dt);
  if(mode==="play"){
    const setN=nodes.find(n=>n.type==="setting"); const fps=setN?(setN.fps||60):60;
    playAcc+=dt; const step=1/fps;
    // 指定FPSでゲームを更新
    let guard=0; while(playAcc>=step && guard++<5){ playStep(step); playAcc-=step; }
  }
  // 自動セーブ（AUTO SAVEオンのスロットを30秒ごと）
  autoAcc+=dt; if(autoAcc>=30){ autoAcc=0; if(currentFile && getAuto(currentFile) && mode!=="play"){ try{ localStorage.setItem("ng_slot_"+currentFile, serialize()); }catch(e){} } }
  if(propNode!==lastPropNode || mode!==lastMode){ lastPropNode=propNode; lastMode=mode; refreshProp(); }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
